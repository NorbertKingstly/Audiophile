<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

/* THEMES */

body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --cyan:#e60023;
    --purple:#ff2d55;
    --pink:#ff7b92;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    height:100vh;
    height:100dvh;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
}

.logo span{
    background:linear-gradient(
    90deg,
    var(--cyan),
    var(--purple),
    var(--pink));

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(
    90deg,
    color-mix(in srgb,var(--cyan) 16%,transparent),
    color-mix(in srgb,var(--purple) 16%,transparent));
    color:var(--text);
}

/* MAIN */

.main{
    overflow-y:auto;
    padding:30px 34px 180px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:100%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(
    135deg,
    var(--cyan),
    var(--purple));

    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    font-weight:900;
}

/* TITLE */

.page-title{
    background:linear-gradient(
    135deg,
    color-mix(in srgb,var(--cyan) 10%,white),
    color-mix(in srgb,var(--purple) 10%,white));

    border:1px solid var(--border);
    border-radius:34px;
    padding:34px;
    margin-bottom:24px;
}

.page-title small{
    color:var(--purple);
    font-weight:900;
}

.page-title h1{
    font-size:48px;
    margin:10px 0;
}

.page-title p{
    color:var(--muted);
}

/* SONG LIST */

.song-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:14px 18px;
    display:grid;
    grid-template-columns:
    50px
    65px
    minmax(0,1fr)
    minmax(0,1fr)
    120px;

    gap:14px;
    align-items:center;
    overflow:hidden;
}

.song-row:hover{
    border-color:var(--purple);
}

.song-no{
    color:var(--muted);
    font-weight:800;
}

.song-cover{
    width:60px;
    height:60px;
    border-radius:16px;
    overflow:hidden;
    background:var(--card2);
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-title,
.song-artist{
    min-width:0;
    overflow:hidden;
}

.song-title h3,
.song-title p,
.song-artist{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-title p,
.song-artist{
    color:var(--muted);
    font-size:13px;
}

.song-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
}

.song-actions button{
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:800;
}

.play-small{
    padding:10px 14px;
    background:linear-gradient(
    90deg,
    var(--cyan),
    var(--purple));

    color:white;
}

.unfav-btn{
    width:42px;
    height:42px;
    background:var(--card2);
    color:#f59e0b;
    font-size:18px;
}

/* PLAYER */

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);

    display:grid;
    grid-template-columns:1fr 1.4fr 1fr;

    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:999;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    overflow:hidden;
    background:var(--card2);

    display:flex;
    justify-content:center;
    align-items:center;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.player-details{
    min-width:0;
}

.player-details h4,
.player-details p{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.player-details p{
    color:var(--muted);
    font-size:13px;
}

.controls{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:10px;
}

.buttons button{
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    cursor:pointer;
}

.buttons .play{
    background:linear-gradient(
    90deg,
    var(--cyan),
    var(--purple));

    color:white;
}

.progress{
    height:7px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(
    90deg,
    var(--cyan),
    var(--purple),
    var(--pink));
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-top:6px;
    color:var(--muted);
}

.volume{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
}

.volume input{
    width:130px;
}

/* POPUP */

.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(14px);
    z-index:9999;

    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.music-card-overlay.show{
    display:flex;
}

.music-card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border-radius:32px;
    padding:24px;
}

.big-cover{
    width:100%;
    height:320px;
    border-radius:24px;
    overflow:hidden;
    background:var(--card2);
    margin-bottom:20px;
}

.big-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.music-card h2{
    text-align:center;
    font-size:26px;
    margin-bottom:6px;
}

.music-card p{
    text-align:center;
    color:var(--muted);
    margin-bottom:22px;
}

.card-buttons{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-bottom:22px;
}

.card-buttons button{
    width:58px;
    height:58px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    cursor:pointer;
}

.big-play{
    width:72px !important;
    height:72px !important;
    background:linear-gradient(
    90deg,
    var(--cyan),
    var(--purple)) !important;

    color:white;
}

.card-progress{
    height:7px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.card-progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(
    90deg,
    var(--cyan),
    var(--purple),
    var(--pink));
}

.card-time{
    display:flex;
    justify-content:space-between;
    margin-top:6px;
    margin-bottom:16px;
    font-size:12px;
    color:var(--muted);
}

.card-volume input{
    width:100%;
    margin-top:8px;
}

/* MOBILE */

.mobile-nav{
    display:none;
}

@media(max-width:900px){

    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .main{
        padding:20px 16px 190px;
    }

    .song-row{
        grid-template-columns:
        34px
        56px
        minmax(0,1fr)
        auto;

        padding:12px;
        gap:10px;
    }

    .song-artist{
        display:none;
    }

    .player{
        left:0;
        bottom:64px;
        height:72px;
        grid-template-columns:1fr auto;
        padding:10px 16px;
    }

    .progress,
    .time,
    .volume{
        display:none;
    }

    .buttons button{
        display:none;
    }

    .buttons .play{
        display:flex;
        justify-content:center;
        align-items:center;
        width:44px;
        height:44px;
    }

    .player-cover{
        width:44px;
        height:44px;
        border-radius:10px;
    }

    .player-details h4{
        font-size:13px;
    }

    .player-details p{
        font-size:11px;
    }

    .mobile-nav{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:64px;
        background:var(--card);
        border-top:1px solid var(--border);

        justify-content:space-around;
        align-items:center;

        z-index:9999;
    }

    .mobile-nav-item{
        display:flex;
        flex-direction:column;
        align-items:center;
        text-decoration:none;
        color:var(--muted);
        font-size:10px;
        gap:4px;
    }

    .mobile-nav-item.active{
        color:var(--purple);
    }

    .mobile-nav-icon{
        font-size:18px;
    }
}

</style>
</head>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>

let audio =
document.getElementById("audio");

let favoriteList =
document.getElementById("favoriteList");

let searchInput =
document.getElementById("searchInput");

let playBtn =
document.getElementById("playBtn");

let cardPlayBtn =
document.getElementById("cardPlayBtn");

let progressFill =
document.getElementById("progressFill");

let cardProgressFill =
document.getElementById("cardProgressFill");

let currentTime =
document.getElementById("currentTime");

let durationTime =
document.getElementById("durationTime");

let cardCurrentTime =
document.getElementById("cardCurrentTime");

let cardDurationTime =
document.getElementById("cardDurationTime");

let currentSongIndex =
parseInt(
localStorage.getItem("currentSongIndex")
) || 0;

let isPlaying =
localStorage.getItem("globalIsPlaying")
=== "true";

/* APPLY THEME */

function applyTheme(){

let theme =
localStorage.getItem(
"audiophile_theme"
) || "white";

document.body.classList.remove(
"theme-white",
"theme-musicred"
);

document.body.classList.add(
"theme-" + theme
);

}

applyTheme();

/* RESTORE SONG */

let savedSrc =
localStorage.getItem("globalAudioSrc");

let savedTime =
parseFloat(
localStorage.getItem("globalAudioTime")
) || 0;

if(savedSrc){

audio.src = savedSrc;

audio.addEventListener(
"loadedmetadata",
()=>{

if(savedTime < audio.duration){

audio.currentTime = savedTime;

}

});

if(isPlaying){

setTimeout(()=>{

audio.play().catch(()=>{});

},300);

}

}

/* SONGS */

function getSongs(){

return typeof songs !== "undefined"
? songs : [];

}

function getFavorites(){

return JSON.parse(
localStorage.getItem(
"audiophile_favorites"
)
) || [];

}

/* RENDER */

function renderFavorites(){

let allSongs = getSongs();

let favs = getFavorites();

favoriteList.innerHTML = favs.map(
(index,i)=>{

let song = allSongs[index];

if(!song) return "";

return `

<div class="song-row"
onclick="playSong(${index})">

<div class="song-no">
${i+1}
</div>

<div class="song-cover">

<img src="${song.cover}">

</div>

<div class="song-title">

<h3>${song.title}</h3>

<p>${song.album || "Single"}</p>

</div>

<div class="song-artist">

${song.artist || ""}

</div>

<div class="song-actions">

<button class="play-small">
▶
</button>

<button class="unfav-btn"
onclick="removeFav(${index},event)">

★

</button>

</div>

</div>

`;

}).join("");

}

/* REMOVE */

function removeFav(index,event){

event.stopPropagation();

let favs =
getFavorites().filter(i=>i!==index);

localStorage.setItem(
"audiophile_favorites",
JSON.stringify(favs)
);

renderFavorites();

}

/* PLAY */

function playSong(index){

let allSongs = getSongs();

if(!allSongs[index]) return;

currentSongIndex = index;

let song =
allSongs[currentSongIndex];

audio.src = song.audio;

audio.play();

isPlaying = true;

localStorage.setItem(
"globalAudioSrc",
audio.src
);

localStorage.setItem(
"currentSongIndex",
currentSongIndex
);

localStorage.setItem(
"globalIsPlaying",
"true"
);

updatePlayerUI(song);

}

/* PLAYER UI */

function updatePlayerUI(song){

if(!song) return;

playBtn.innerText =
isPlaying ? "⏸" : "▶";

cardPlayBtn.innerText =
isPlaying ? "⏸" : "▶";

document.getElementById(
"playerTitle"
).innerText = song.title;

document.getElementById(
"playerArtist"
).innerText = song.artist || "Unknown";

document.getElementById(
"cardSongTitle"
).innerText = song.title;

document.getElementById(
"cardSongArtist"
).innerText =
song.artist || "Unknown";

if(song.cover){

document.getElementById(
"playerCover"
).innerHTML =
`<img src="${song.cover}">`;

document.getElementById(
"bigCover"
).innerHTML =
`<img src="${song.cover}">`;

}

}

/* TOGGLE */

function togglePlay(){

if(!audio.src){

playSong(currentSongIndex);

return;

}

if(isPlaying){

audio.pause();

isPlaying = false;

}else{

audio.play();

isPlaying = true;

}

localStorage.setItem(
"globalIsPlaying",
isPlaying
);

playBtn.innerText =
isPlaying ? "⏸" : "▶";

cardPlayBtn.innerText =
isPlaying ? "⏸" : "▶";

}

/* NEXT */

function nextSong(){

let favs = getFavorites();

if(favs.length===0) return;

let i =
favs.indexOf(currentSongIndex);

playSong(
favs[(i+1)%favs.length]
);

}

/* PREV */

function prevSong(){

let favs = getFavorites();

if(favs.length===0) return;

let i =
favs.indexOf(currentSongIndex);

playSong(
favs[(i-1+favs.length)%favs.length]
);

}

/* TIME */

function formatTime(s){

if(isNaN(s)) return "0:00";

let m = Math.floor(s/60);

let sec = Math.floor(s%60);

return m + ":" +
(sec<10 ? "0"+sec : sec);

}

/* UPDATE PROGRESS */

audio.addEventListener(
"timeupdate",
()=>{

let pct =
(audio.currentTime /
audio.duration) * 100;

if(isNaN(pct)) pct = 0;

progressFill.style.width =
pct + "%";

cardProgressFill.style.width =
pct + "%";

currentTime.innerText =
formatTime(audio.currentTime);

durationTime.innerText =
formatTime(audio.duration);

cardCurrentTime.innerText =
formatTime(audio.currentTime);

cardDurationTime.innerText =
formatTime(audio.duration);

localStorage.setItem(
"globalAudioTime",
audio.currentTime
);

});

/* SEEK */

function setProgress(event){

if(!audio.duration) return;

audio.currentTime =
(event.offsetX /
event.currentTarget.clientWidth)
* audio.duration;

}

function setCardProgress(event){

if(!audio.duration) return;

audio.currentTime =
(event.offsetX /
event.currentTarget.clientWidth)
* audio.duration;

}

/* VOLUME */

function changeVolume(value){

audio.volume = value;

document.getElementById(
"globalVolumeSlider"
).value = value;

document.getElementById(
"popupVolumeSlider"
).value = value;

localStorage.setItem(
"globalVolume",
value
);

}

/* POPUP */

function openMusicCard(){

if(!audio.src) return;

document.getElementById(
"musicCardOverlay"
).classList.add("show");

}

document.getElementById(
"musicCardOverlay"
).addEventListener(
"click",
function(e){

if(
e.target.id ===
"musicCardOverlay"
){

document.getElementById(
"musicCardOverlay"
).classList.remove("show");

}

}
);

/* INIT */

renderFavorites();

let savedVolume =
localStorage.getItem(
"globalVolume"
) || 0.8;

changeVolume(savedVolume);

updatePlayerUI(
getSongs()[currentSongIndex]
);

</script>

</body>
</html>
