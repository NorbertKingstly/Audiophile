<!-- Login -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#050505;
    --card:#111111;
    --card2:#181818;
    --text:#ffffff;
    --muted:#9ca3af;
    --cyan:#22d3ee;
    --purple:#8b5cf6;
    --border:#262626;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left, rgba(34,211,238,0.18), transparent 35%),
    radial-gradient(circle at bottom right, rgba(139,92,246,0.18), transparent 35%),
    var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
    color:white;
}

.bg-blur1{
    position:absolute;
    width:320px;
    height:320px;
    background:#22d3ee;
    filter:blur(140px);
    opacity:0.12;
    top:-80px;
    left:-80px;
}

.bg-blur2{
    position:absolute;
    width:320px;
    height:320px;
    background:#8b5cf6;
    filter:blur(140px);
    opacity:0.12;
    bottom:-80px;
    right:-80px;
}

.login-box{
    position:relative;
    z-index:2;
    width:100%;
    max-width:440px;
    background:rgba(17,17,17,0.88);
    border:1px solid var(--border);
    border-radius:30px;
    padding:40px;
    backdrop-filter:blur(18px);
    box-shadow:0 0 40px rgba(34,211,238,0.12);
}

.logo{
    text-align:center;
    margin-bottom:32px;
}

.logo h1{
    font-size:42px;
    font-weight:800;
    letter-spacing:1px;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.logo p{
    margin-top:10px;
    color:var(--muted);
    font-size:15px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#d4d4d8;
}

.form-group input{
    width:100%;
    padding:15px 16px;
    border-radius:16px;
    border:1px solid var(--border);
    background:var(--card2);
    color:white;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.form-group input:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(34,211,238,0.12);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
    margin-bottom:24px;
    font-size:14px;
}

.options label{
    color:var(--muted);
}

.options a{
    color:var(--cyan);
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(34,211,238,0.25);
}

.divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:28px 0;
    color:var(--muted);
    font-size:13px;
}

.divider::before,
.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--border);
}

.create{
    text-align:center;
    color:var(--muted);
    font-size:15px;
}

.create a{
    color:white;
    font-weight:700;
    text-decoration:none;
}

.create a:hover{
    text-decoration:underline;
}

.message{
    margin-top:18px;
    text-align:center;
    display:none;
    font-size:14px;
}

@media(max-width:480px){
    .login-box{
        padding:30px 22px;
    }

    .logo h1{
        font-size:34px;
    }
}
</style>
</head>

<body>

<div class="bg-blur1"></div>
<div class="bg-blur2"></div>

<div class="login-box">

    <div class="logo">
        <h1>Audio<span>phile</span></h1>
        <p>Feel every beat. Hear every detail.</p>
    </div>

    <form onsubmit="loginUser(event)">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember me
            </label>

            <a href="forgot.html">Forgot Password?</a>
        </div>

        <button class="login-btn" type="submit">Login</button>

        <p class="message" id="message"></p>
    </form>

    <div class="divider">or</div>

    <p class="create">
        New to Audiophile?
        <a href="register.html">Create Account</a>
    </p>

</div>

<script>
function loginUser(event){
    event.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let message = document.getElementById("message");

    let users = JSON.parse(localStorage.getItem("audiophile_users")) || [];

    let validUser = users.find(function(user){
        return user.email === email && user.password === password;
    });

    if(validUser){
        localStorage.setItem("audiophile_loggedIn", "true");
        localStorage.setItem("audiophile_currentUser", validUser.name);
        localStorage.setItem("audiophile_userEmail", validUser.email);

        message.style.display = "block";
        message.style.color = "#22d3ee";
        message.innerText = "Login successful...";

        setTimeout(function(){
            window.location.href = "home.html";
        }, 1000);
    }
    else{
        message.style.display = "block";
        message.style.color = "#ff4d4d";
        message.innerText = "Account not found or wrong password! Create account first.";
    }
}
</script>

</body>
</html>
