<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#050505;
    --card:#111111;
    --card2:#181818;
    --text:#ffffff;
    --muted:#9ca3af;
    --cyan:#22d3ee;
    --purple:#8b5cf6;
    --border:#262626;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left, rgba(34,211,238,0.18), transparent 35%),
    radial-gradient(circle at bottom right, rgba(139,92,246,0.18), transparent 35%),
    var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
    color:white;
}

.bg-blur1{
    position:absolute;
    width:320px;
    height:320px;
    background:#22d3ee;
    filter:blur(140px);
    opacity:0.12;
    top:-80px;
    left:-80px;
}

.bg-blur2{
    position:absolute;
    width:320px;
    height:320px;
    background:#8b5cf6;
    filter:blur(140px);
    opacity:0.12;
    bottom:-80px;
    right:-80px;
}

.forgot-box{
    position:relative;
    z-index:2;
    width:100%;
    max-width:430px;
    background:rgba(17,17,17,0.88);
    border:1px solid var(--border);
    border-radius:30px;
    padding:40px;
    backdrop-filter:blur(18px);
    box-shadow:0 0 40px rgba(34,211,238,0.12);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:42px;
    font-weight:800;
    letter-spacing:1px;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.logo p{
    margin-top:10px;
    color:var(--muted);
    font-size:15px;
    line-height:1.6;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#d4d4d8;
}

.form-group input{
    width:100%;
    padding:15px 16px;
    border-radius:16px;
    border:1px solid var(--border);
    background:var(--card2);
    color:white;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.form-group input:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(34,211,238,0.12);
}

.reset-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.reset-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(34,211,238,0.25);
}

.bottom{
    margin-top:24px;
    text-align:center;
    color:var(--muted);
    font-size:15px;
}

.bottom a{
    color:white;
    text-decoration:none;
    font-weight:700;
}

.bottom a:hover{
    text-decoration:underline;
}

.message{
    margin-top:18px;
    text-align:center;
    display:none;
    font-size:14px;
    line-height:1.5;
}

@media(max-width:480px){
    .forgot-box{
        padding:30px 22px;
    }
    .logo h1{
        font-size:34px;
    }
}
</style>
</head>

<body>

<div class="bg-blur1"></div>
<div class="bg-blur2"></div>

<div class="forgot-box">

    <div class="logo">
        <h1>Audio<span>phile</span></h1>
        <p id="instructionText">
            Enter your registered email address to verify your account
        </p>
    </div>

    <form id="forgotForm" onsubmit="handleEmailVerification(event)">

        <div class="form-group" id="inputContainer">
            <label id="inputLabel">Email Address</label>
            <input 
                type="email"
                id="email"
                placeholder="Enter your registered email"
                required
            >
        </div>

        <button type="submit" class="reset-btn" id="actionBtn">
            Verify Email
        </button>

        <p class="message" id="message"></p>

    </form>

    <div class="bottom">
        Back to <a href="index.html">Login</a>
    </div>

</div>

<script>
// Keep global reference trackers
let verifiedEmail = "";
let usersList = [];

function handleEmailVerification(event){
    event.preventDefault();

    let emailInput = document.getElementById("email");
    let message = document.getElementById("message");
    let instructionText = document.getElementById("instructionText");
    let inputLabel = document.getElementById("inputLabel");
    let actionBtn = document.getElementById("actionBtn");

    let enteredEmail = emailInput.value.trim();

    usersList = JSON.parse(localStorage.getItem("audiophile_users")) || [];

    // Find if user exists
    let userIndex = usersList.findIndex(user => user.email.toLowerCase() === enteredEmail.toLowerCase());

    if(userIndex !== -1){
        // Save the verified context email globally
        verifiedEmail = enteredEmail;

        // Clean message field
        message.style.display = "none";

        // Mutate form fields dynamically to allow entering a new password on screen
        instructionText.innerText = "Email verified! Choose a strong new password for your account below.";
        inputLabel.innerText = "New Password";
        
        emailInput.type = "password";
        emailInput.id = "newPassword";
        emailInput.value = "";
        emailInput.placeholder = "Enter your new password";
        
        actionBtn.innerText = "Update Password";

        // Swap the form submission action over to update phase
        document.getElementById("forgotForm").setAttribute("onsubmit", "handlePasswordUpdate(event)");
    }
    else{
        message.style.display = "block";
        message.style.color = "#ff4d4d";
        message.innerText = "No account found with this email address!";
    }
}

function handlePasswordUpdate(event){
    event.preventDefault();

    let newPassword = document.getElementById("newPassword").value;
    let message = document.getElementById("message");

    if(newPassword.length < 4){
        message.style.display = "block";
        message.style.color = "#ff4d4d";
        message.innerText = "Password must be at least 4 characters long!";
        return;
    }

    // Double check mutations safe guard matching array references
    let userIndex = usersList.findIndex(user => user.email.toLowerCase() === verifiedEmail.toLowerCase());

    if(userIndex !== -1){
        // Update user properties
        usersList[userIndex].password = newPassword;
        
        // Save updated list cleanly back to local store
        localStorage.setItem("audiophile_users", JSON.stringify(usersList));

        message.style.display = "block";
        message.style.color = "#22d3ee";
        message.innerText = "Password updated successfully! Redirecting to login...";

        // Redirect back safely after 2 seconds
        setTimeout(functionName => {
            window.location.href = "index.html";
        }, 2000);
    } else {
        message.style.display = "block";
        message.style.color = "#ff4d4d";
        message.innerText = "Something went wrong. Please refresh and try again.";
    }
}
</script>

</body>
</html>
