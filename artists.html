<!-- Artists -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Audiophile - Artists</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --cyan:#e60023;
    --purple:#ff2d55;
    --pink:#ff7b92;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    height:100vh;
    height:100dvh;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
    height:100dvh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
    overflow-y:auto;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
    transition:0.3s;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(90deg,
    color-mix(in srgb,var(--cyan) 16%,transparent),
    color-mix(in srgb,var(--purple) 16%,transparent));
    color:var(--text);
}

.mobile-nav{
    display:none;
}

.main{
    height:100vh;
    height:100dvh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:30px 34px 170px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:100%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
    color:white;
    overflow:hidden;
    flex-shrink:0;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.page-title{
    background:linear-gradient(135deg,
    color-mix(in srgb,var(--cyan) 10%,white),
    color-mix(in srgb,var(--purple) 10%,white));
    border:1px solid var(--border);
    border-radius:34px;
    padding:34px;
    margin-bottom:24px;
    display:flex;
    gap:28px;
    align-items:center;
}

.artist-hero-cover{
    width:220px;
    height:220px;
    border-radius:30px;
    background:var(--card2);
    overflow:hidden;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:900;
    flex-shrink:0;
}

.artist-hero-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}

.page-title small{
    color:var(--purple);
    font-weight:900;
    letter-spacing:1px;
}

.page-title h1{
    font-size:52px;
    margin:12px 0;
}

.page-title p{
    color:var(--muted);
}

.back-btn{
    display:none;
    margin-bottom:20px;
    border:none;
    padding:14px 22px;
    border-radius:18px;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    font-weight:800;
    cursor:pointer;
}

.artist-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.artist-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:18px;
    cursor:pointer;
    transition:0.3s;
}

.artist-card:hover{
    transform:translateY(-5px);
    border-color:var(--purple);
}

.artist-cover{
    width:100%;
    height:220px;
    border-radius:24px;
    overflow:hidden;
    background:var(--card2);
    margin-bottom:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:54px;
    font-weight:900;
}

.artist-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}

.artist-card h3{
    font-size:19px;
    margin-bottom:4px;
}

.artist-card p{
    color:var(--muted);
    font-size:14px;
}

.song-list{
    display:none;
    flex-direction:column;
    gap:14px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:16px 20px;
    display:grid;
    grid-template-columns:55px 64px 1fr 170px;
    gap:16px;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.song-row:hover{
    transform:translateY(-3px);
    border-color:var(--purple);
}

.song-no{
    color:var(--muted);
    font-weight:900;
}

.song-cover{
    width:58px;
    height:58px;
    border-radius:16px;
    background:var(--card2);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}

.song-title h3{
    font-size:18px;
    margin-bottom:4px;
}

.song-title p{
    color:var(--muted);
    font-size:14px;
}

.song-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.song-actions button{
    border:none;
    padding:10px 16px;
    border-radius:14px;
    font-weight:800;
    cursor:pointer;
}

.play-small{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.fav-small{
    background:var(--card2);
    color:#f59e0b;
    font-size:18px;
}

/* PLAYER */

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:128px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:999;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    min-width:0;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:900;
    flex-shrink:0;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.player-details{
    min-width:0;
    flex:1;
}

.player-details h4{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.player-details p{
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.controls{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:10px;
}

.buttons button{
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    cursor:pointer;
    color:var(--text);
    font-size:16px;
}

.buttons .play{
    width:58px;
    height:58px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.progress,
.popup-progress{
    height:7px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.progress-fill,
.popup-progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
}

.time,
.popup-time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
}

.volume{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:12px;
}

.volume input{
    width:130px;
}

/* POPUP */

.music-popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(12px);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.music-popup.show{
    display:flex;
}

.popup-card{
    width:100%;
    max-width:430px;
    background:var(--card);
    border-radius:34px;
    padding:24px;
    border:1px solid var(--border);
}

.popup-cover{
    width:100%;
    height:310px;
    border-radius:28px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:80px;
    font-weight:900;
    margin-bottom:20px;
}

.popup-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.popup-card h2{
    text-align:center;
    margin-bottom:6px;
    font-size:28px;
}

.popup-card p{
    text-align:center;
    color:var(--muted);
    margin-bottom:18px;
}

.popup-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    margin:22px 0;
}

.popup-buttons button{
    width:54px;
    height:54px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    font-size:18px;
    cursor:pointer;
}

.popup-buttons .popup-play{
    width:70px;
    height:70px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
    font-size:24px;
}

.popup-volume{
    margin-top:18px;
}

.popup-volume span{
    color:var(--muted);
    font-weight:800;
    font-size:14px;
}

.popup-volume input{
    width:100%;
    margin-top:10px;
}

/* MOBILE */

@media(max-width:900px){

    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .main{
        padding:20px 16px 200px;
    }

    .page-title{
        flex-direction:column;
        align-items:flex-start;
        padding:22px;
    }

    .page-title h1{
        font-size:34px;
    }

    .artist-hero-cover{
        width:180px;
        height:180px;
    }

    .artist-grid{
        grid-template-columns:repeat(2,1fr);
        gap:14px;
    }

    .artist-cover{
        height:160px;
    }

    .artist-card{
        padding:12px;
        border-radius:20px;
    }

    .artist-card h3{
        font-size:15px;
    }

    .song-row{
        grid-template-columns:42px 58px 1fr;
        padding:12px;
    }

    .song-actions{
        grid-column:3;
        justify-content:flex-start;
    }

    /* MOBILE PLAYER */

    .player{
        left:0 !important;
        right:0 !important;
        bottom:64px !important;
        grid-template-columns:1.2fr 1fr;
        height:68px !important;
        padding:8px 16px !important;
        gap:10px;
    }

    .player-cover{
        width:44px;
        height:44px;
        border-radius:10px;
    }

    .player-details h4{
        font-size:14px;
    }

    .player-details p{
        font-size:12px;
    }

    .buttons button{
        display:none;
    }

    .buttons button.play{
        display:flex;
        justify-content:center;
        align-items:center;
        width:42px;
        height:42px;
        font-size:14px;
    }

    .progress,
    .time,
    .volume{
        display:none;
    }

    /* MOBILE NAV */

    .mobile-nav{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:64px;
        background:var(--card);
        border-top:1px solid var(--border);
        z-index:1000;
        justify-content:space-around;
        align-items:center;
    }

    .mobile-nav-item{
        display:flex;
        flex-direction:column;
        align-items:center;
        text-decoration:none;
        color:var(--muted);
        font-size:10px;
        font-weight:600;
        gap:4px;
        width:16%;
    }

    .mobile-nav-item.active{
        color:var(--purple);
    }

    .mobile-nav-icon{
        font-size:18px;
    }

}

</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo" onclick="window.location.href='home.html'">
            Audio<span>phile</span>
        </div>

        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html" class="active">Artists</a>
            <a href="favorites.html">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>

    </aside>

    <main class="main">

        <div class="topbar">

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search artists...">
            </div>

            <div class="profile" onclick="window.location.href='settings.html'">
                <span id="homeProfileInitial">A</span>
                <img id="homeProfileImage" src="">
            </div>

        </div>

        <section class="page-title">

            <div class="artist-hero-cover" id="artistHeroCover">A</div>

            <div>
                <small id="heroSmall">TOP MUSIC DIRECTORS</small>
                <h1 id="heroTitle">Artists</h1>
                <p id="heroText">Touch artist card to open all songs from that artist.</p>
            </div>

        </section>

        <button class="back-btn" id="backBtn" onclick="showArtists()">
            ← Back To Artists
        </button>

        <div class="artist-grid" id="artistGrid"></div>

        <div class="song-list" id="songList"></div>

    </main>

</div>

<!-- PLAYER -->

<div class="player">

    <div class="player-info" onclick="openPopup()">

        <div class="player-cover" id="playerCover">A</div>

        <div class="player-details">
            <h4 id="playerTitle">Select a song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>

    </div>

    <div class="controls">

        <div class="buttons">
            <button onclick="prevSong()">⏮</button>

            <button class="play" id="playBtn" onclick="togglePlay()">
                ▶
            </button>

            <button onclick="nextSong()">⏭</button>
        </div>

        <div class="progress" onclick="setProgress(event)">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>

    </div>

    <div class="volume">
        <span>Volume</span>

        <input
        id="volumeRange"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.8"
        oninput="changeVolume(this.value)">
    </div>

</div>

<!-- MOBILE NAV -->

<nav class="mobile-nav">

    <a href="home.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-house"></i>
        </span>
        <span>Home</span>
    </a>

    <a href="songs.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-music"></i>
        </span>
        <span>Songs</span>
    </a>

    <a href="albums.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-compact-disc"></i>
        </span>
        <span>Albums</span>
    </a>

    <a href="artists.html" class="mobile-nav-item active">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-user-astronaut"></i>
        </span>
        <span>Artists</span>
    </a>

    <a href="favorites.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-heart"></i>
        </span>
        <span>Favorites</span>
    </a>

    <a href="settings.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-gear"></i>
        </span>
        <span>Settings</span>

</nav>

<!-- POPUP -->

<div class="music-popup" id="musicPopup">

    <div class="popup-card">

        <div class="popup-cover" id="popupCover">A</div>

        <h2 id="popupTitle">Select a song</h2>

        <p id="popupArtist">Audiophile</p>

        <div class="popup-buttons">

            <button onclick="prevSong()">⏮</button>

            <button class="popup-play" id="popupPlayBtn" onclick="togglePlay()">
                ▶
            </button>

            <button onclick="nextSong()">⏭</button>

        </div>

        <div class="popup-progress" onclick="setPopupProgress(event)">
            <div class="popup-progress-fill" id="popupProgressFill"></div>
        </div>

        <div class="popup-time">
            <span id="popupCurrentTime">0:00</span>
            <span id="popupDurationTime">0:00</span>
        </div>

        <div class="popup-volume">

            <span>Volume</span>

            <input
            id="popupVolumeRange"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.8"
            oninput="changeVolume(this.value)">

        </div>

    </div>

</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>

/* FULL JS SAME WORKING */

let audio = document.getElementById("audio");

let currentSongIndex =
parseInt(localStorage.getItem("currentSongIndex")) || 0;

let isPlaying =
localStorage.getItem("globalIsPlaying") === "true";

const artistImages = {
    "A.R. Rahman":"/image/AR Rahman.jpg",
    "Anirudh Ravichander":"/image/Anirudh Ravichander.jpg",
    "G.V.Prakash Kumar":"/image/G.V.Prakash Kumar.jpg",
    "Yuvan Shankar Raja":"/image/Yuvan Shankar Raja.jpg",
    "Santhosh Narayanan":"/image/santhosh narayanan.jpg",
    "Harris Jayaraj":"/image/Harris Jayaraj.jpg",
    "D Imman":"/image/D Imman.jpg",
    "Sai Abhyankkar":"/image/Sai Abhyankkar.jpg",
    "Vishnu Vijay":"/image/Vishnu Vijay.jpg",
    "Sushin Shyam":"/image/Sushin Shyam.jpg",
    "Dhibu Ninan Thomas":"/image/Dhibu Ninan Thomas.jpg"
};

let savedSrc = localStorage.getItem("globalAudioSrc");
let savedTime =
parseFloat(localStorage.getItem("globalAudioTime")) || 0;

if(savedSrc){
    audio.src = savedSrc;
    audio.currentTime = savedTime;
}

function applySavedTheme(){

    let theme =
    localStorage.getItem("audiophile_theme") || "white";

    document.body.classList.remove(
        "theme-white",
        "theme-musicred"
    );

    document.body.classList.add("theme-" + theme);

}

function loadHomeProfile(){

    let currentUser =
    localStorage.getItem("audiophile_currentUser") || "Guest";

    let profileImage =
    localStorage.getItem("audiophile_profileImage") || "";

    let initial =
    document.getElementById("homeProfileInitial");

    let image =
    document.getElementById("homeProfileImage");

    initial.innerText =
    currentUser.charAt(0).toUpperCase();

    if(profileImage){

        image.src = profileImage;
        image.style.display = "block";
        initial.style.display = "none";

    }else{

        image.style.display = "none";
        initial.style.display = "block";

    }

}

function getSongs(){
    return typeof songs !== "undefined"
    && Array.isArray(songs)
    ? songs : [];
}

function getFavorites(){
    return JSON.parse(
        localStorage.getItem("audiophile_favorites")
    ) || [];
}

function saveFavorites(favorites){
    localStorage.setItem(
        "audiophile_favorites",
        JSON.stringify(favorites)
    );
}

function getArtistImage(name,fallback){
    return artistImages[name] || fallback || "";
}

function renderArtists(list){

    let uniqueArtists = [];

    list.forEach(song=>{

        if(!uniqueArtists.find(a => a.artist === song.artist)){

            uniqueArtists.push({
                artist:song.artist,
                cover:getArtistImage(song.artist,song.cover),
                songs:getSongs().filter(
                    x => x.artist === song.artist
                )
            });

        }

    });

    artistGrid.innerHTML = uniqueArtists.map(artist=>`

        <div class="artist-card"
        onclick="openArtist('${encodeURIComponent(artist.artist)}')">

            <div class="artist-cover">

                ${
                    artist.cover
                    ? `<img src="${artist.cover}"
                    onerror="this.style.display='none';
                    this.parentElement.innerHTML='${artist.artist.charAt(0)}';">`
                    : artist.artist.charAt(0)
                }

            </div>

            <h3>${artist.artist}</h3>

            <p>${artist.songs.length} Songs</p>

        </div>

    `).join("");

}

function openArtist(encodedName){

    let name = decodeURIComponent(encodedName);

    let filtered =
    getSongs().filter(song => song.artist === name);

    let favorites = getFavorites();

    artistGrid.style.display = "none";
    songList.style.display = "flex";
    backBtn.style.display = "inline-block";

    heroSmall.innerText = "ARTIST SONGS";
    heroTitle.innerText = name;
    heroText.innerText =
    filtered.length + " songs available.";

    artistHeroCover.style.display = "flex";

    let artistImg =
    getArtistImage(name,filtered[0]?.cover);

    if(artistImg){

        artistHeroCover.innerHTML =
        `<img src="${artistImg}">`;

    }else{

        artistHeroCover.innerText =
        name.charAt(0);

    }

    songList.innerHTML = filtered.map((song,index)=>{

        let realIndex = getSongs().indexOf(song);

        let isFav =
        favorites.includes(realIndex);

        return `

        <div class="song-row"
        onclick="playSong(${realIndex})">

            <div class="song-no">
                ${index + 1}
            </div>

            <div class="song-cover">

                ${
                    song.cover
                    ? `<img src="${song.cover}"
                    onerror="this.style.display='none';
                    this.parentElement.innerHTML='${song.title.charAt(0)}';">`
                    : song.title.charAt(0)
                }

            </div>

            <div class="song-title">
                <h3>${song.title}</h3>
                <p>${song.album || "Single"}</p>
            </div>

            <div class="song-actions">

                <button class="play-small"
                onclick="playSong(${realIndex});
                event.stopPropagation();">
                    ▶ Play
                </button>

                <button class="fav-small"
                onclick="toggleFavorite(${realIndex},event)">
                    ${isFav ? "★" : "☆"}
                </button>

            </div>

        </div>

        `;

    }).join("");

}

function showArtists(){

    artistGrid.style.display = "grid";
    songList.style.display = "none";
    backBtn.style.display = "none";

    heroSmall.innerText =
    "TOP MUSIC DIRECTORS";

    heroTitle.innerText = "Artists";

    heroText.innerText =
    "Touch artist card to open all songs from that artist.";

    artistHeroCover.style.display = "none";

}

function toggleFavorite(index,event){

    event.stopPropagation();

    let favorites = getFavorites();

    if(favorites.includes(index)){

        favorites =
        favorites.filter(item => item !== index);

    }else{

        favorites.push(index);

    }

    saveFavorites(favorites);

    openArtist(
        encodeURIComponent(heroTitle.innerText)
    );

}

function savePlayerState(){

    localStorage.setItem(
        "currentSongIndex",
        currentSongIndex
    );

    if(audio.src){
        localStorage.setItem(
            "globalAudioSrc",
            audio.src
        );
    }

    localStorage.setItem(
        "globalAudioTime",
        audio.currentTime || 0
    );

    localStorage.setItem(
        "globalIsPlaying",
        isPlaying ? "true" : "false"
    );

}

function updatePlayerUI(song){

    if(!song) return;

    playBtn.innerText =
    isPlaying ? "⏸" : "▶";

    popupPlayBtn.innerText =
    isPlaying ? "⏸" : "▶";

    playerTitle.innerText = song.title;

    playerArtist.innerText =
    song.artist || "Unknown Artist";

    popupTitle.innerText = song.title;

    popupArtist.innerText =
    (song.artist || "Unknown Artist")
    + " • " +
    (song.album || "Single");

    if(song.cover){

        playerCover.innerHTML =
        `<img src="${song.cover}">`;

        popupCover.innerHTML =
        `<img src="${song.cover}">`;

    }else{

        playerCover.innerText =
        song.title.charAt(0);

        popupCover.innerText =
        song.title.charAt(0);

    }

}

function playSong(index){

    let allSongs = getSongs();

    if(!allSongs[index]) return;

    currentSongIndex = index;

    let song = allSongs[currentSongIndex];

    audio.src = song.audio;

    audio.play().then(()=>{

        isPlaying = true;

        savePlayerState();

        updatePlayerUI(song);

    }).catch(()=>{

        isPlaying = false;

        savePlayerState();

        updatePlayerUI(song);

    });

}

function togglePlay(){

    if(!audio.src){

        playSong(currentSongIndex);

        return;

    }

    if(isPlaying){

        audio.pause();

        isPlaying = false;

    }else{

        audio.play().then(()=>{

            isPlaying = true;

            savePlayerState();

            updatePlayerUI(
                getSongs()[currentSongIndex]
            );

        }).catch(()=>{

            isPlaying = false;

            savePlayerState();

            updatePlayerUI(
                getSongs()[currentSongIndex]
            );

        });

        return;

    }

    savePlayerState();

    updatePlayerUI(
        getSongs()[currentSongIndex]
    );

}

function nextSong(){

    currentSongIndex++;

    if(currentSongIndex >= getSongs().length){
        currentSongIndex = 0;
    }

    playSong(currentSongIndex);

}

function prevSong(){

    currentSongIndex--;

    if(currentSongIndex < 0){
        currentSongIndex = getSongs().length - 1;
    }

    playSong(currentSongIndex);

}

function changeVolume(value){

    audio.volume = value;

    volumeRange.value = value;

    popupVolumeRange.value = value;

    localStorage.setItem(
        "globalVolume",
        value
    );

}

function formatTime(seconds){

    if(isNaN(seconds)) return "0:00";

    let min =
    Math.floor(seconds / 60);

    let sec =
    Math.floor(seconds % 60);

    if(sec < 10){
        sec = "0" + sec;
    }

    return min + ":" + sec;

}

audio.addEventListener("timeupdate",()=>{

    localStorage.setItem(
        "globalAudioTime",
        audio.currentTime || 0
    );

    let percent =
    (audio.currentTime / audio.duration) * 100;

    if(isNaN(percent)) percent = 0;

    progressFill.style.width =
    percent + "%";

    popupProgressFill.style.width =
    percent + "%";

    currentTime.innerText =
    formatTime(audio.currentTime);

    durationTime.innerText =
    formatTime(audio.duration);

    popupCurrentTime.innerText =
    formatTime(audio.currentTime);

    popupDurationTime.innerText =
    formatTime(audio.duration);

});

audio.addEventListener("ended",()=>{
    nextSong();
});

function setProgress(event){

    if(!audio.duration) return;

    let width =
    event.currentTarget.clientWidth;

    let clickX = event.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;

    savePlayerState();

}

function setPopupProgress(event){

    if(!audio.duration) return;

    let width =
    event.currentTarget.clientWidth;

    let clickX = event.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;

    savePlayerState();

}

function openPopup(){

    if(!audio.src) return;

    musicPopup.classList.add("show");

}

musicPopup.addEventListener("click",function(e){

    if(e.target.id === "musicPopup"){

        musicPopup.classList.remove("show");

    }

});

searchInput.addEventListener("input",function(){

    let value =
    this.value.toLowerCase();

    let filtered =
    getSongs().filter(song =>

        (song.artist || "")
        .toLowerCase()
        .includes(value)

    );

    renderArtists(filtered);

});

window.addEventListener("beforeunload",()=>{
    savePlayerState();
});

applySavedTheme();

loadHomeProfile();

renderArtists(getSongs());

let savedVolume =
localStorage.getItem("globalVolume") || 0.8;

changeVolume(savedVolume);

if(getSongs().length > 0){

    updatePlayerUI(
        getSongs()[currentSongIndex]
    );

}

if(savedSrc && isPlaying){

    setTimeout(()=>{

        audio.play().then(()=>{

            isPlaying = true;

            updatePlayerUI(
                getSongs()[currentSongIndex]
            );

        }).catch(()=>{

            isPlaying = false;

            updatePlayerUI(
                getSongs()[currentSongIndex]
            );

        });

    },300);

}

</script>

</body>
</html>
