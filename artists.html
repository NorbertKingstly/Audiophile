<!-- Artists -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ❌ YOUR FULL CSS IS SAME (NO CHANGE) */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}
body{background:var(--bg);color:var(--text);overflow:hidden;}
.app{display:grid;grid-template-columns:250px 1fr;height:100vh;}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:28px 20px;overflow-y:auto;}
.logo{font-size:32px;font-weight:900;margin-bottom:34px;cursor:pointer;}
.logo span{background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));background-clip:text;-webkit-background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
.menu{display:flex;flex-direction:column;gap:14px;}
.menu a{color:var(--muted);text-decoration:none;padding:15px 18px;border-radius:18px;font-size:16px;font-weight:700;transition:0.3s;}
.menu a.active,.menu a:hover{background:linear-gradient(90deg,rgba(99,102,241,0.12),rgba(34,211,238,0.12));color:var(--text);}
.main{height:100vh;overflow-y:auto;padding:30px 34px 150px;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:28px;}
.search-box{width:100%;}
.search-box input{width:100%;padding:17px 24px;border-radius:40px;border:1px solid var(--border);outline:none;background:var(--card);color:var(--text);font-size:15px;}
.profile{width:60px;height:60px;border-radius:50%;overflow:hidden;flex-shrink:0;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--purple));color:white;display:flex;align-items:center;justify-content:center;font-weight:900;}
.profile img{width:100%;height:100%;object-fit:cover;display:none;}
.page-title{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(34,211,238,0.08));border:1px solid var(--border);border-radius:34px;padding:34px;margin-bottom:26px;display:flex;gap:26px;align-items:center;}
.artist-hero-cover{width:220px;height:220px;border-radius:32px;overflow:hidden;background:var(--card2);display:none;justify-content:center;align-items:center;color:white;font-size:70px;font-weight:900;flex-shrink:0;}
.artist-hero-cover img{width:100%;height:100%;object-fit:contain;background:var(--card2);display:block;}
.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
.artist-card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:18px;cursor:pointer;}
.artist-cover{width:100%;height:220px;border-radius:24px;overflow:hidden;background:var(--card2);display:flex;justify-content:center;align-items:center;color:white;font-size:54px;font-weight:900;}
.song-list{display:none;flex-direction:column;gap:14px;}
.player{position:fixed;left:250px;right:0;bottom:0;height:118px;background:var(--card);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1.5fr 1fr;align-items:center;gap:18px;padding:16px 34px;z-index:99;}
.buttons button{width:44px;height:44px;border:none;border-radius:50%;background:var(--card2);cursor:pointer;}
.buttons .play{background:linear-gradient(90deg,var(--cyan),var(--purple));color:white;}
</style>
</head>

<body>

<div class="app">

<aside class="sidebar">
    <div class="logo" onclick="window.location.href='home.html'">
        Audio<span>phile</span>
    </div>
</aside>

<main class="main">

<div class="topbar">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search artists...">
    </div>

    <div class="profile" onclick="window.location.href='settings.html'">
        <span id="homeProfileInitial">L</span>
        <img id="homeProfileImage">
    </div>
</div>

<section class="page-title">
    <div class="artist-hero-cover" id="artistHeroCover">A</div>
    <div>
        <small id="heroSmall">TOP MUSIC DIRECTORS</small>
        <h1 id="heroTitle">Artists</h1>
        <p id="heroText">Touch artist card to open all songs from that artist.</p>
    </div>
</section>

<div class="artist-grid" id="artistGrid"></div>
<div class="song-list" id="songList"></div>

</main>
</div>

<!-- PLAYER -->
<div class="player">
    <div class="player-info">
        <div class="player-cover" id="playerCover">A</div>
        <div>
            <h4 id="playerTitle">Select a song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>
    </div>

    <div class="controls">
        <div class="buttons">
            <button onclick="prevSong()">⏮</button>
            <button class="play" id="playBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>

/* ✅ ONLY FIX: MISSING DOM REFERENCES (IMPORTANT) */
const artistGrid = document.getElementById("artistGrid");
const songList = document.getElementById("songList");
const searchInput = document.getElementById("searchInput");
const heroTitle = document.getElementById("heroTitle");
const heroSmall = document.getElementById("heroSmall");
const heroText = document.getElementById("heroText");
const artistHeroCover = document.getElementById("artistHeroCover");
const playBtn = document.getElementById("playBtn");
const playerTitle = document.getElementById("playerTitle");
const playerArtist = document.getElementById("playerArtist");
const playerCover = document.getElementById("playerCover");
const musicPopup = document.getElementById("musicPopup");

let audio = document.getElementById("audio");

/* बाकी உன் ORIGINAL JS 그대로 (NO CHANGE) */
let currentSongIndex = 0;
let isPlaying = false;

/* KEEP ALL YOUR EXISTING FUNCTIONS AS IT IS */
function getSongs(){
    return typeof songs !== "undefined" ? songs : [];
}

function renderArtists(list){
    let uniqueArtists = [];

    list.forEach(song=>{
        if(!uniqueArtists.find(a => a.artist === song.artist)){
            uniqueArtists.push({
                artist:song.artist,
                songs:getSongs().filter(x => x.artist === song.artist)
            });
        }
    });

    artistGrid.innerHTML = uniqueArtists.map(a=>`
        <div class="artist-card" onclick="openArtist('${encodeURIComponent(a.artist)}')">
            <div class="artist-cover">${a.artist.charAt(0)}</div>
            <h3>${a.artist}</h3>
            <p>${a.songs.length} Songs</p>
        </div>
    `).join("");
}

function openArtist(name){
    let artist = decodeURIComponent(name);
    let filtered = getSongs().filter(s=>s.artist===artist);

    artistGrid.style.display="none";
    songList.style.display="flex";

    heroTitle.innerText = artist;
    heroText.innerText = filtered.length + " songs";
}

function playSong(i){
    let song = getSongs()[i];
    audio.src = song.audio;
    audio.play();
    playerTitle.innerText = song.title;
    playerArtist.innerText = song.artist;
}

function nextSong(){
    playSong(++currentSongIndex);
}

function prevSong(){
    playSong(--currentSongIndex);
}

function togglePlay(){
    if(audio.paused) audio.play();
    else audio.pause();
}

renderArtists(getSongs());

</script>

</body>
</html>
