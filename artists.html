<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile - Artists</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --border:rgba(0,0,0,0.08);
    --purple:#6366f1;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

/* sidebar */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:30px;
    font-weight:900;
    margin-bottom:30px;
}

.logo span{color:var(--purple);}

.menu a{
    display:block;
    padding:14px;
    text-decoration:none;
    color:var(--muted);
    border-radius:12px;
}

.menu a:hover,.menu a.active{
    background:var(--card2);
    color:var(--text);
}

/* main */
.main{
    overflow-y:auto;
    padding:25px;
}

.search-box input{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:1px solid var(--border);
    outline:none;
}

/* artist grid */
.artist-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:18px;
    margin-top:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:15px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.cover{
    height:180px;
    border-radius:16px;
    background:var(--card2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    overflow:hidden;
}

/* 🔥 FIXED IMAGE HANDLING */
.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* song list */
.song-list{
    display:none;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
}

.song-row{
    padding:14px;
    background:var(--card);
    border-radius:16px;
    border:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.song-cover{
    width:55px;
    height:55px;
    border-radius:12px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 🔥 FIX ICON FALLBACK */
.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
<div class="logo">Audio<span>phile</span></div>
<nav class="menu">
<a href="home.html">Home</a>
<a href="songs.html">Songs</a>
<a class="active">Artists</a>
<a href="favorites.html">Favorites</a>
</nav>
</aside>

<!-- MAIN -->
<main class="main">

<div class="search-box">
<input id="searchInput" placeholder="Search artists...">
</div>

<div id="artistGrid" class="artist-grid"></div>
<div id="songList" class="song-list"></div>

</main>
</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>
let audio=document.getElementById("audio");
let index=0;

function getSongs(){
return songs || [];
}

/* 🔥 ARTIST IMAGE SAFE RENDER */
function renderArtists(){
let artists=[...new Set(getSongs().map(s=>s.artist))];

document.getElementById("artistGrid").innerHTML=
artists.map(a=>`
<div class="card" onclick="openArtist('${a}')">

<div class="cover">
<img src="/image/${a}.jpg"
onerror="this.style.display='none';this.parentElement.innerHTML='🎵';">
</div>

<h3>${a}</h3>

</div>
`).join("");
}

function openArtist(name){
let list=getSongs().filter(s=>s.artist===name);

document.getElementById("artistGrid").style.display="none";
document.getElementById("songList").style.display="flex";

document.getElementById("songList").innerHTML=
list.map((s,i)=>`
<div class="song-row" onclick="play(${getSongs().indexOf(s)})">
<div class="song-cover">
<img src="${s.cover}"
onerror="this.style.display='none';this.parentElement.innerHTML='🎵';">
</div>
<div>
<h4>${s.title}</h4>
<p>${s.artist}</p>
</div>
</div>
`).join("");
}

function play(i){
audio.src=getSongs()[i].audio;
audio.play();
index=i;
}

renderArtists();
</script>

</body>
</html>
