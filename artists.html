<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Audiophile - Artists</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
    :root { --bg:#f5f5f7; --card:#ffffff; --card2:#eef0f4; --text:#111827; --muted:#64748b; --cyan:#111827; --purple:#6366f1; --pink:#22d3ee; --border:rgba(0,0,0,0.08); }
    body { background:var(--bg); color:var(--text); overflow:hidden; height:100vh; height:100dvh; }

    .app { display:grid; grid-template-columns:250px 1fr; height:100vh; height:100dvh; }
    .sidebar { background:var(--card); border-right:1px solid var(--border); padding:28px 20px; overflow-y:auto; }
    .logo { font-size:32px; font-weight:900; margin-bottom:34px; cursor:pointer; color:var(--text); }
    .logo span { background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink)); background-clip:text; -webkit-background-clip:text; color:transparent; }
    .menu { display:flex; flex-direction:column; gap:14px; }
    .menu a { color:var(--muted); text-decoration:none; padding:15px 18px; border-radius:18px; font-size:16px; font-weight:700; display:flex; align-items:center; gap:14px; transition:0.3s; }
    .menu a.active, .menu a:hover { background:linear-gradient(90deg, color-mix(in srgb,var(--cyan) 16%,transparent), color-mix(in srgb,var(--purple) 16%,transparent)); color:var(--text); }

    .main { height:100vh; height:100dvh; overflow-y:auto; padding:30px 34px 170px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:18px; margin-bottom:28px; }
    .search-box { width:70%; }
    .search-box input { width:100%; padding:17px 24px; border-radius:40px; border:1px solid var(--border); background:var(--card); outline:none; }

    /* GRID & CARDS */
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:18px; cursor:pointer; text-align:center; transition:0.3s; }
    .card:hover { transform:translateY(-6px); }
    .cover { width:140px; height:140px; background:linear-gradient(135deg, var(--purple), var(--pink)); border-radius:50% !important; margin:0 auto 14px; display:flex; align-items:center; justify-content:center; color:white; font-size:44px; overflow:hidden; }
    .cover img { width:100%; height:100%; object-fit:cover; }

    /* PLAYER */
    .player { position:fixed; left:250px; right:0; bottom:0; height:120px; background:var(--card); border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1.5fr 1fr; align-items:center; padding:16px 34px; z-index:999; }
    .buttons { display:flex; justify-content:center; align-items:center; gap:20px; }
    .buttons button { border:none; background:none; cursor:pointer; font-size:22px; color:var(--text); width:40px; height:40px; }
    .buttons .play { width:55px; height:55px; background:var(--text); color:white; border-radius:50%; }

    /* MOBILE RESPONSIVE FIX */
    @media(max-width:900px){
        .app { grid-template-columns:1fr; }
        .sidebar { display:none; }
        .main { padding:20px 16px 100px; }
        .player { left:0; bottom:64px; height:70px; padding:0 15px; grid-template-columns: 1fr auto; }
        
        /* Fixed Icon sizes for mobile */
        .buttons button { font-size: 20px !important; }
        .buttons .play { width:45px !important; height:45px !important; font-size: 18px !important; }
        
        .mobile-nav { display:flex; position:fixed; bottom:0; width:100%; height:64px; background:var(--card); border-top:1px solid var(--border); justify-content:space-around; align-items:center; z-index:1000; }
        .mobile-nav-item { display:flex; flex-direction:column; align-items:center; text-decoration:none; color:var(--muted); font-size:11px; }
        .mobile-nav-item i { font-size: 22px !important; margin-bottom: 4px; } /* Icon size fixed */
        .mobile-nav-item.active { color: var(--purple); }
    }
</style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">Audio<span>phile</span></div>
        <nav class="menu">
            <a href="home.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="songs.html"><i class="fa-solid fa-music"></i> Songs</a>
            <a href="artists.html" class="active"><i class="fa-solid fa-user-astronaut"></i> Artists</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="search-box"><input id="searchInput" type="text" placeholder="Search..."></div>
        </div>
        <div id="artistGrid" class="grid"></div>
    </main>
</div>

<div class="player">
    <div class="player-info" id="playerInfo"><h4>Select Song</h4></div>
    <div class="buttons">
        <button onclick="prevSong()"><i class="fa-solid fa-backward-step"></i></button>
        <button class="play" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
        <button onclick="nextSong()"><i class="fa-solid fa-forward-step"></i></button>
    </div>
</div>

<nav class="mobile-nav">
    <a href="home.html" class="mobile-nav-item"><i class="fa-solid fa-house"></i>Home</a>
    <a href="songs.html" class="mobile-nav-item"><i class="fa-solid fa-music"></i>Songs</a>
    <a href="artists.html" class="mobile-nav-item active"><i class="fa-solid fa-user-astronaut"></i>Artists</a>
</nav>

<script>
    // JS Logic remains same, ensure your songs.js is linked
</script>
</body>
</html>
