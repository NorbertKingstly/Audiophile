<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --cyan:#e60023;
    --purple:#ff2d55;
    --pink:#ff7b92;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    height: 100vh;
    height: 100dvh;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
    height:100dvh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
    overflow-y:auto;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
    color:var(--text);
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
    transition:0.3s;
}

.menu a.active, .menu a:hover{
    background:linear-gradient(90deg, color-mix(in srgb,var(--cyan) 16%,transparent), color-mix(in srgb,var(--purple) 16%,transparent));
    color:var(--text);
}

.main{
    height:100vh;
    height:100dvh;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    padding:30px 34px 170px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:70%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
    color:white;
    overflow:hidden;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

/* ARTISTS PAGE CONTENT STYLES */
h2{
    font-size:28px;
    font-weight:800;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:24px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:18px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 30px rgba(0,0,0,0.05);
}

.cover{
    width:100%;
    aspect-ratio:1;
    background:var(--card2);
    border-radius:50%; /* Rounded Circular Cover for Artists */
    margin-bottom:14px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:48px;
    font-weight:900;
    color:white;
    overflow:hidden;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card h3{
    font-size:16px;
    font-weight:700;
    margin-bottom:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-align:center;
}

.card p{
    font-size:14px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-align:center;
}

/* BACK BUTTON FOR SONGS VIEW */
.back-btn{
    background:var(--card2);
    color:var(--text);
    border:none;
    padding:12px 24px;
    border-radius:14px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    margin-bottom:20px;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

/* PLAYER STYLES */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:128px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:999;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    min-width: 0;
    width: 100%;
}

.player-details{
    min-width: 0;
    flex: 1;
}

.player-details h4{
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
}

.player-details p{
    font-size: 14px;
    color:var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:900;
    color:white;
    overflow:hidden;
    background:var(--card2);
    flex-shrink: 0;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

.controls{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    margin-bottom:8px;
}

.buttons button{
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    cursor:pointer;
    font-size:16px;
}

.buttons .play{
    width:58px;
    height:58px;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    color:white;
}

.progress, .card-progress{
    height:6px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.progress-fill, .card-progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
}

.time, .card-time{
    display:flex;
    justify-content:space-between;
    color:var(--muted);
    font-size:13px;
    margin-top:6px;
}

.volume{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:14px;
}

.volume input{
    accent-color:var(--cyan);
}

/* MOBILE NAV */
.mobile-nav {
    display: none;
}

/* MUSIC POPUP OVERLAY */
.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(14px);
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.music-card-overlay.show{
    display:flex;
}

.music-card{
    width:100%;
    max-width:430px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:34px;
    padding:24px;
    box-shadow:0 30px 80px rgba(0,0,0,0.25);
}

.big-cover{
    width:100%;
    height:310px;
    border-radius:28px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:90px;
    font-weight:900;
    overflow:hidden;
    margin-bottom:22px;
    background:var(--card2);
}

.big-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

.music-card h2, .music-card p {
    text-align:center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.music-card h2 {
    font-size:26px;
    margin-bottom:6px;
}

.music-card p {
    color:var(--muted);
    margin-bottom:20px;
}

.card-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    margin:22px 0;
}

.card-buttons button{
    width:54px;
    height:54px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    font-size:18px;
    cursor:pointer;
}

.card-buttons .big-play{
    width:70px;
    height:70px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
    font-size:24px;
}

.card-volume{
    margin-top:20px;
}

.card-volume span{
    color:var(--muted);
    font-weight:800;
    font-size:14px;
}

.card-volume input{
    width:100%;
    margin-top:10px;
}

@media(max-width:900px){
    .app{
        grid-template-columns:1fr;
    }
    .sidebar{
        display:none;
    }
    .main{
        padding: 20px 16px 200px !important;
    }
    .topbar{
        gap: 12px;
        margin-bottom: 20px;
    }
    .search-box{
        width:calc(100% - 64px);
    }
    .search-box input{
        padding: 14px 20px;
        font-size: 14px;
    }
    .profile{
        width: 52px;
        height: 52px;
    }
    .player{
        left:0 !important;
        right:0 !important;
        bottom:64px !important;
        grid-template-columns: 1.2fr 1fr;
        height: 68px !important;
        padding: 8px 16px !important;
        box-shadow: 0 -6px 20px rgba(0,0,0,0.06);
        gap: 10px;
        background: var(--card) !important;
        border-top: 1px solid var(--border);
        align-items: center;
    }
    .player-info {
        display: flex !important;
        align-items: center !important;
        width: 100% !important;
        min-width: 0 !important;
        gap: 10px;
    }
    .player-details {
        min-width: 0 !important;
        flex: 1 !important;
    }
    .player-details h4, .player-details p {
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
    }
    .player-details h4 {
        font-size: 14px !important;
    }
    .player-details p {
        font-size: 12px !important;
    }
    .player-cover {
        width: 44px !important;
        height: 44px !important;
        border-radius: 8px !important;
        font-size: 18px !important;
    }
    .controls {
        width: 100%;
        display: flex;
        justify-content: flex-end;
        align-items: center;
    }
    .buttons {
        gap: 12px !important;
        margin-bottom: 0px !important;
    }
    .buttons button {
        display: none;
    }
    .buttons button.play {
        display: flex !important;
        justify-content: center;
        align-items: center;
        width: 42px !important;
        height: 42px !important;
        font-size: 14px !important;
    }
    .progress, .time, .volume {
        display: none !important;
    }
    .mobile-nav {
        display: flex;
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 64px;
        background: var(--card);
        border-top: 1px solid var(--border);
        z-index: 1000;
        justify-content: space-around;
        align-items: center;
        padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .mobile-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        color: var(--muted);
        font-size: 10px;
        font-weight: 600;
        gap: 4px;
        width: 16%;
        text-align: center;
    }
    .mobile-nav-item.active {
        color: var(--purple);
    }
    .mobile-nav-icon {
        font-size: 18px;
        line-height: 1;
    }
    .grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 16px;
    }
    .card {
        padding: 12px;
        border-radius: 18px;
    }
    .cover {
        font-size: 36px;
    }
    .card h3 {
        font-size: 14px;
    }
    .card p {
        font-size: 12px;
    }
}
</style>
</head>
<body class="theme-white">

<audio id="audio"></audio>

<script src="songs.js"></script>
<script>
/* CORE COOKIE LOCALSTORAGE ENGINE OPERATIONS MANAGEMENT CODE */
let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;
let isPlaying = localStorage.getItem("globalIsPlaying") === "true";
let savedSrc = localStorage.getItem("globalAudioSrc");
let savedTime = parseFloat(localStorage.getItem("globalAudioTime")) || 0;

let audio = window.globalAudio || document.getElementById("audio");
window.globalAudio = audio;

if(savedSrc && !audio.src){
    audio.src = savedSrc;
    audio.currentTime = savedTime;
}

let artistGrid = document.getElementById("artistGrid");
let artistTitleContainer = document.getElementById("artistTitleContainer");
let backBtnContainer = document.getElementById("backBtnContainer");
let currentArtistSongs = [];

function getSongs(){
    if(typeof songs !== "undefined" && Array.isArray(songs) && songs.length > 0){
        return songs;
    }
    return [];
}

function getArtists(){
    let allSongs = getSongs();
    let artistsMap = {};
    
    allSongs.forEach(function(song){
        if(song.artist){
            if(!artistsMap[song.artist]){
                artistsMap[song.artist] = {
                    name: song.artist,
                    cover: song.cover || "" // Uses track cover or falls back to initials
                };
            }
        }
    });
    return Object.values(artistsMap);
}

function renderArtists(artistsList){
    artistTitleContainer.innerHTML = "<h2>Artists</h2>";
    backBtnContainer.style.display = "none";
    
    if(artistsList.length === 0){
        artistGrid.innerHTML = "<p style='padding:20px; color:var(--muted);'>No artists found.</p>";
        return;
    }

    artistGrid.innerHTML = artistsList.map(function(artist){
        let fallbackLetter = artist.name.charAt(0).toUpperCase();
        let coverContent = artist.cover ? `<img src="${artist.cover}" alt="">` : fallbackLetter;
        return `
        <div class="card" onclick="openArtist('${artist.name.replace(/'/g, "\\'")}')">
            <div class="cover">${coverContent}</div>
            <h3>${artist.name}</h3>
            <p>Artist</p>
        </div>
        `;
    }).join('');
}

function openArtist(artistName){
    let allSongs = getSongs();
    currentArtistSongs = allSongs.filter(function(song){
        return song.artist === artistName;
    });

    artistTitleContainer.innerHTML = `<h2>${artistName}</h2>`;
    backBtnContainer.style.display = "block";

    if(currentArtistSongs.length === 0){
        artistGrid.innerHTML = "<p style='padding:20px; color:var(--muted);'>No tracks found for this artist.</p>";
        return;
    }

    // Displays matching tracks by clicked artist inside a regular square layout context grid
    artistGrid.innerHTML = currentArtistSongs.map(function(song){
        let allSongsIndex = allSongs.indexOf(song);
        let fallbackLetter = song.title ? song.title.charAt(0).toUpperCase() : "S";
        let coverContent = song.cover ? `<img src="${song.cover}" alt="">` : fallbackLetter;
        return `
        <div class="card" onclick="playSong(${allSongsIndex})">
            <div class="cover" style="border-radius:18px;">${coverContent}</div>
            <h3 style="text-align:left;">${song.title || 'Untitled'}</h3>
            <p style="text-align:left;">${song.album || 'Single'}</p>
        </div>
        `;
    }).join('');
}

function showArtistsGrid(){
    document.getElementById("searchInput").value = "";
    renderArtists(getArtists());
}

function updatePlayerUI(song){
    let playBtn = document.getElementById("playBtn");
    let cardPlayBtn = document.getElementById("cardPlayBtn");
    
    if(isPlaying){
        playBtn.innerText = "⏸";
        cardPlayBtn.innerText = "⏸";
    } else {
        playBtn.innerText = "▶";
        cardPlayBtn.innerText = "▶";
    }

    if(!song){
        document.getElementById("playerTitle").innerText = "Select a song";
        document.getElementById("playerArtist").innerText = "Audiophile";
        document.getElementById("cardSongTitle").innerText = "Select a song";
        document.getElementById("cardSongArtist").innerText = "Audiophile";
        document.getElementById("playerCover").innerText = "A";
        document.getElementById("bigCover").innerText = "A";
        return;
    }

    document.getElementById("playerTitle").innerText = song.title || "Untitled Track";
    let subStr = (song.artist || "Unknown Artist") + (song.album ? " • " + song.album : "");
    document.getElementById("playerArtist").innerText = subStr;

    document.getElementById("cardSongTitle").innerText = song.title || "Untitled Track";
    document.getElementById("cardSongArtist").innerText = subStr;

    if(song.cover){
        document.getElementById("playerCover").innerHTML = `<img src="${song.cover}" alt="">`;
        document.getElementById("bigCover").innerHTML = `<img src="${song.cover}" alt="">`;
    } else {
        let fallback = song.title ? song.title.charAt(0).toUpperCase() : "S";
        document.getElementById("playerCover").innerText = fallback;
        document.getElementById("bigCover").innerText = fallback;
    }
}

function playSong(index){
    let allSongs = getSongs();
    if(index < 0 || index >= allSongs.length) return;

    currentSongIndex = index;
    let song = allSongs[index];
    audio.src = song.audio;
    
    audio.play().then(function(){
        isPlaying = true;
        savePlayerState();
        updatePlayerUI(song);
    }).catch(function(err){
        console.log("Playback blocked:", err);
        isPlaying = false;
        updatePlayerUI(song);
    });
}

function togglePlay(){
    let allSongs = getSongs();
    if(allSongs.length === 0) return;

    if(isPlaying){
        audio.pause();
        isPlaying = false;
    } else {
        if(!audio.src && allSongs[currentSongIndex]){
            audio.src = allSongs[currentSongIndex].audio;
        }
        audio.play().then(function(){
            isPlaying = true;
            savePlayerState();
            updatePlayerUI(allSongs[currentSongIndex]);
        }).catch(function(e){
            console.log(e);
        });
    }
    savePlayerState();
    updatePlayerUI(allSongs[currentSongIndex]);
}

function nextSong(){
    let allSongs = getSongs();
    if(allSongs.length === 0) return;
    currentSongIndex = (currentSongIndex + 1) >= allSongs.length ? 0 : currentSongIndex + 1;
    playSong(currentSongIndex);
}

function prevSong(){
    let allSongs = getSongs();
    if(allSongs.length === 0) return;
    currentSongIndex = (currentSongIndex - 1) < 0 ? allSongs.length - 1 : currentSongIndex - 1;
    playSong(currentSongIndex);
}

function changeVolume(val){
    audio.volume = val;
    localStorage.setItem("globalVolume", val);
    let ranges = document.querySelectorAll("input[type='range']");
    ranges.forEach(function(r){ r.value = val; });
}

function formatTime(secs){
    if(isNaN(secs) || !isFinite(secs)) return "0:00";
    let m = Math.floor(secs / 60);
    let s = Math.floor(secs % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
}

function savePlayerState(){
    localStorage.setItem("currentSongIndex", currentSongIndex);
    localStorage.setItem("globalIsPlaying", isPlaying ? "true" : "false");
    if(audio.src) {
        localStorage.setItem("globalAudioSrc", audio.src);
        localStorage.setItem("globalAudioTime", audio.currentTime);
    }
}

audio.addEventListener("timeupdate", function(){
    if(!audio.duration) return;
    localStorage.setItem("globalAudioTime", audio.currentTime);
    let pct = (audio.currentTime / audio.duration) * 100;
    
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("cardProgressFill").style.width = pct + "%";

    let curFormat = formatTime(audio.currentTime);
    let durFormat = formatTime(audio.duration);

    document.getElementById("currentTime").innerText = curFormat;
    document.getElementById("durationTime").innerText = durFormat;
    document.getElementById("cardCurrentTime").innerText = curFormat;
    document.getElementById("cardDurationTime").innerText = durFormat;
});

audio.addEventListener("ended", function(){
    nextSong();
});

function setProgress(e){
    if(!audio.duration) return;
    let w = e.currentTarget.clientWidth;
    audio.currentTime = (e.offsetX / w) * audio.duration;
}

function setCardProgress(e){
    if(!audio.duration) return;
    let w = e.currentTarget.clientWidth;
    audio.currentTime = (e.offsetX / w) * audio.duration;
}

function openMusicCard(){
    if(!audio.src) return;
    document.getElementById("musicCardOverlay").classList.add("show");
}

function closeMusicCard(){
    document.getElementById("musicCardOverlay").classList.remove("show");
}

document.getElementById("musicCardOverlay").addEventListener("click", function(e){
    if(e.target.id === "musicCardOverlay"){
        closeMusicCard();
    }
});

function applySavedTheme(){
    let theme = localStorage.getItem("audiophile_theme") || "white";
    document.body.classList.remove("theme-white", "theme-musicred");
    document.body.classList.add("theme-" + theme);
}

function loadHomeProfile(){
    let user = localStorage.getItem("audiophile_currentUser") || "Liyo Clevert";
    let imgData = localStorage.getItem("audiophile_profileImage") || "";
    document.getElementById("homeProfileInitial").innerText = user.charAt(0).toUpperCase();
    
    let pImg = document.getElementById("homeProfileImage");
    let pInit = document.getElementById("homeProfileInitial");
    if(imgData !== ""){
        pImg.src = imgData;
        pImg.style.display = "block";
        pInit.style.display = "none";
    } else {
        pImg.style.display = "none";
        pInit.style.display = "block";
    }
}

document.getElementById("searchInput").addEventListener("input", function(){
    let value = this.value.toLowerCase();

    if(artistGrid.style.display !== "none" && backBtnContainer.style.display === "none"){
        let filteredArtists = getArtists().filter(function(artist){
            return artist.name.toLowerCase().includes(value);
        });
        renderArtists(filteredArtists);
    } else {
        let filteredSongs = currentArtistSongs.filter(function(song){
            return (song.title && song.title.toLowerCase().includes(value)) || (song.album && song.album.toLowerCase().includes(value));
        });
        
        if(filteredSongs.length === 0){
            artistGrid.innerHTML = "<p style='padding:20px; color:var(--muted);'>No matching songs found.</p>";
            return;
        }
        let allSongs = getSongs();
        artistGrid.innerHTML = filteredSongs.map(function(song){
            let allSongsIndex = allSongs.indexOf(song);
            let fallbackLetter = song.title ? song.title.charAt(0).toUpperCase() : "S";
            let coverContent = song.cover ? `<img src="${song.cover}" alt="">` : fallbackLetter;
            return `
            <div class="card" onclick="playSong(${allSongsIndex})">
                <div class="cover" style="border-radius:18px;">${coverContent}</div>
                <h3 style="text-align:left;">${song.title || 'Untitled'}</h3>
                <p style="text-align:left;">${song.album || 'Single'}</p>
            </div>
            `;
        }).join('');
    }
});

window.addEventListener("beforeunload", function(){
    savePlayerState();
});

// Run Initialization Engines
applySavedTheme();
loadHomeProfile();
renderArtists(getArtists());

let savedVolume = localStorage.getItem("globalVolume") || 0.8;
changeVolume(savedVolume);

let globalSongsList = getSongs();
if(globalSongsList.length > 0 && globalSongsList[currentSongIndex]) {
    updatePlayerUI(globalSongsList[currentSongIndex]);
} else {
    updatePlayerUI(null);
}

if(savedSrc && isPlaying && globalSongsList.length > 0){
    setTimeout(function(){
        audio.play().then(function(){
            isPlaying = true;
            updatePlayerUI(globalSongsList[currentSongIndex]);
        }).catch(function(){
            isPlaying = false;
            updatePlayerUI(globalSongsList[currentSongIndex]);
        });
    }, 300);
}
</script>
</body>
</html>
