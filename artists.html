<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audiophile Full App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* CSS Styles */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        :root { --bg:#f5f5f7; --card:#ffffff; --card2:#eef0f4; --text:#111827; --muted:#64748b; --purple:#6366f1; --border:rgba(0,0,0,0.08); }
        body { background:var(--bg); color:var(--text); height: 100dvh; overflow:hidden; }
        .app { display:grid; grid-template-columns:250px 1fr; height:100dvh; }
        .sidebar { background:var(--card); border-right:1px solid var(--border); padding:28px 20px; }
        .logo { font-size:32px; font-weight:900; margin-bottom:34px; cursor:pointer; }
        .menu a { display:block; color:var(--muted); text-decoration:none; padding:15px; border-radius:12px; font-weight:700; margin-bottom:10px; }
        .menu a.active { background:var(--card2); color:var(--text); }
        .main { padding:30px; overflow-y:auto; padding-bottom: 200px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:24px; }
        .card { background:var(--card); padding:20px; border-radius:24px; cursor:pointer; text-align:center; }
        .cover { width:100%; aspect-ratio:1; background:var(--card2); border-radius:50%; margin-bottom:15px; display:flex; align-items:center; justify-content:center; font-size:40px; }
        
        /* Player */
        .player { position:fixed; bottom:0; width:100%; height:100px; background:white; border-top:1px solid var(--border); display:flex; align-items:center; padding:0 30px; justify-content:space-between; z-index:1000; }
        .player-info { display:flex; align-items:center; gap:15px; }
        .controls { display:flex; flex-direction:column; align-items:center; width:40%; }
        .buttons { display:flex; gap:20px; font-size:24px; margin-bottom:5px; }
        
        @media(max-width:900px) { .sidebar { display:none; } .app { grid-template-columns:1fr; } .player { bottom:60px; height:80px; } }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">Audio<span>phile</span></div>
        <nav class="menu">
            <a href="#" class="active">Artists</a>
            <a href="#">Songs</a>
        </nav>
    </aside>

    <main class="main" id="mainContent">
        <h2 id="pageTitle">Artists</h2>
        <div id="grid" class="grid"></div>
    </main>
</div>

<div class="player">
    <div class="player-info">
        <div class="cover" style="width:50px; height:50px; font-size:16px;">♪</div>
        <div>
            <h4 id="songTitle">No Song Selected</h4>
            <p id="artistName" style="color:var(--muted)">-</p>
        </div>
    </div>
    <div class="controls">
        <div class="buttons">
            <i class="fa-solid fa-backward" onclick="prevSong()"></i>
            <i class="fa-solid fa-play" id="playBtn" onclick="togglePlay()"></i>
            <i class="fa-solid fa-forward" onclick="nextSong()"></i>
        </div>
        <div style="width:100%; height:4px; background:#ddd; border-radius:2px;">
            <div id="progress" style="width:0%; height:100%; background:var(--purple);"></div>
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    // Song Data
    const songs = [
        { title: "Song 1", artist: "Artist A", audio: "path/to/song1.mp3" },
        { title: "Song 2", artist: "Artist A", audio: "path/to/song2.mp3" },
        { title: "Song 3", artist: "Artist B", audio: "path/to/song3.mp3" }
    ];

    let currentIdx = 0;
    let isPlaying = false;
    const audio = document.getElementById("audio");

    function renderArtists() {
        const artists = [...new Set(songs.map(s => s.artist))];
        document.getElementById("grid").innerHTML = artists.map(a => `
            <div class="card" onclick="showArtistSongs('${a}')">
                <div class="cover">${a[0]}</div>
                <h3>${a}</h3>
            </div>
        `).join('');
    }

    function showArtistSongs(artist) {
        document.getElementById("pageTitle").innerText = artist;
        const filtered = songs.filter(s => s.artist === artist);
        document.getElementById("grid").innerHTML = filtered.map((s, i) => `
            <div class="card" onclick="playSong(${songs.indexOf(s)})">
                <div class="cover" style="border-radius:15px">🎵</div>
                <h3>${s.title}</h3>
            </div>
        `).join('');
    }

    function playSong(idx) {
        currentIdx = idx;
        audio.src = songs[idx].audio;
        audio.play();
        isPlaying = true;
        document.getElementById("songTitle").innerText = songs[idx].title;
        document.getElementById("artistName").innerText = songs[idx].artist;
        document.getElementById("playBtn").className = "fa-solid fa-pause";
    }

    function togglePlay() {
        if(isPlaying) { audio.pause(); } else { audio.play(); }
        isPlaying = !isPlaying;
        document.getElementById("playBtn").className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
    }

    function nextSong() { playSong((currentIdx + 1) % songs.length); }
    function prevSong() { playSong((currentIdx - 1 + songs.length) % songs.length); }

    audio.addEventListener('timeupdate', () => {
        const progress = (audio.currentTime / audio.duration) * 100;
        document.getElementById("progress").style.width = progress + "%";
    });

    renderArtists();
</script>

</body>
</html>
