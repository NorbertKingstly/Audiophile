<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audiophile - Artists</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* CSS Root and Base */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        :root { --bg:#f5f5f7; --card:#ffffff; --text:#111827; --muted:#64748b; --purple:#6366f1; --border:rgba(0,0,0,0.08); }
        body { background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }

        .app { display:grid; grid-template-columns:250px 1fr; height:100vh; }
        .sidebar { background:var(--card); border-right:1px solid var(--border); padding:28px 20px; }
        .main { padding:30px; overflow-y:auto; }

        /* Grid */
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:24px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:18px; text-align:center; }
        .cover { width:140px; height:140px; border-radius:50%; background:#eef0f4; margin:0 auto 14px; display:flex; justify-content:center; align-items:center; font-size:40px; }

        /* Mobile Nav Fix */
        .mobile-nav {
            display: none;
            position: fixed; left: 0; right: 0; bottom: 0; height: 64px;
            background: var(--card); border-top: 1px solid var(--border);
            z-index: 1000; justify-content: space-around; align-items: center;
        }

        @media(max-width:900px){
            .app { grid-template-columns:1fr; }
            .sidebar { display:none; }
            .mobile-nav { display: flex; }
            .mobile-nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--muted); font-size: 10px; gap: 4px; }
            .mobile-nav-icon { font-size: 20px !important; line-height: 1; }
            .mobile-nav-item.active { color: var(--purple); }
        }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">Audio<span>phile</span></div>
        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="artists.html" class="active">Artists</a>
        </nav>
    </aside>

    <main class="main">
        <div id="artistGrid" class="grid"></div>
    </main>
</div>

<nav class="mobile-nav">
    <a href="home.html" class="mobile-nav-item">
        <span class="mobile-nav-icon"><i class="fa-solid fa-house"></i></span>
        <span>Home</span>
    </a>
    <a href="songs.html" class="mobile-nav-item">
        <span class="mobile-nav-icon"><i class="fa-solid fa-music"></i></span>
        <span>Songs</span>
    </a>
    <a href="artists.html" class="mobile-nav-item active">
        <span class="mobile-nav-icon"><i class="fa-solid fa-user-astronaut"></i></span>
        <span>Artists</span>
    </a>
</nav>

<script>
    // Just ensure your artist list is loaded here
    const artists = [{name: "Artist 1"}, {name: "Artist 2"}];
    const grid = document.getElementById("artistGrid");
    grid.innerHTML = artists.map(a => `
        <div class="card">
            <div class="cover">${a.name.charAt(0)}</div>
            <h3>${a.name}</h3>
        </div>
    `).join("");
</script>

</body>
</html>
