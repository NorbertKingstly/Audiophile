<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audiophile - Artists</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --bg: #f5f5f7; --card: #ffffff; --text: #111827; --purple: #6366f1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 150px; }

        /* Header & Grid */
        .container { padding: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        .card { background: var(--card); padding: 15px; border-radius: 20px; cursor: pointer; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .cover { width: 100%; aspect-ratio: 1; background: #eee; border-radius: 50%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
        .cover img { width: 100%; height: 100%; object-fit: cover; }

        /* Responsive Fix */
        @media(max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }

        /* Player Bar */
        .player { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; 
            background: white; border-top: 1px solid #ddd; display: flex; 
            align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="header-area"><h2>Artists</h2></div>
    <div id="artistGrid" class="grid"></div>
</div>

<div class="player">
    <div id="now-playing">Select a song</div>
    <div class="controls">
        <button onclick="prevSong()"><i class="fa fa-backward"></i></button>
        <button onclick="togglePlay()"><i class="fa fa-play"></i></button>
        <button onclick="nextSong()"><i class="fa fa-forward"></i></button>
    </div>
</div>

<script src="songs.js"></script> <!-- Unka songs data irukura file -->
<script>
    const grid = document.getElementById("artistGrid");
    
    // 1. Render Artists
    function renderArtists() {
        const uniqueArtists = [...new Set(songs.map(s => s.artist))];
        grid.innerHTML = uniqueArtists.map(artist => `
            <div class="card" onclick="showSongs('${artist}')">
                <div class="cover">${artist[0]}</div>
                <h3>${artist}</h3>
            </div>
        `).join('');
    }

    // 2. Filter Songs for Artist
    function showSongs(artistName) {
        document.getElementById("header-area").innerHTML = 
            `<button onclick="location.reload()">Back</button> <h2>${artistName}</h2>`;
        
        const artistSongs = songs.filter(s => s.artist === artistName);
        grid.innerHTML = artistSongs.map((s, i) => `
            <div class="card" onclick="playSong('${s.title}')">
                <div class="cover" style="border-radius:15px">🎵</div>
                <h3>${s.title}</h3>
            </div>
        `).join('');
    }

    // 3. Simple Play Logic
    function playSong(title) {
        document.getElementById("now-playing").innerText = "Playing: " + title;
        // Inga unga original play function-a call pannunga
    }

    renderArtists();
</script>

</body>
</html>
