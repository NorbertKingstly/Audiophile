<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    height: 100dvh;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100dvh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
    overflow-y:auto;
}

.logo{font-size:32px;font-weight:900;margin-bottom:34px;cursor:pointer;}
.logo span{background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));background-clip:text;-webkit-background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}

.menu{display:flex;flex-direction:column;gap:14px;}
.menu a{color:var(--muted);text-decoration:none;padding:15px 18px;border-radius:18px;font-size:16px;font-weight:700;transition:0.3s;}
.menu a.active, .menu a:hover{background:linear-gradient(90deg,rgba(99,102,241,0.12),rgba(34,211,238,0.12));color:var(--text);}

.main{height:100dvh;overflow-y:auto;padding:30px 34px 170px;}

.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:28px;}
.search-box{width:100%;}
.search-box input{width:100%;padding:17px 24px;border-radius:40px;border:1px solid var(--border);outline:none;background:var(--card);color:var(--text);font-size:15px;}

.profile{width:60px;height:60px;border-radius:50%;overflow:hidden;flex-shrink:0;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--purple));color:white;display:flex;align-items:center;justify-content:center;font-weight:900;}
.profile img{width:100%;height:100%;object-fit:cover;display:none;}

.page-title{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(34,211,238,0.08));border:1px solid var(--border);border-radius:34px;padding:34px;margin-bottom:26px;display:flex;gap:26px;align-items:center;}
.artist-hero-cover{width:220px;height:220px;border-radius:32px;overflow:hidden;background:var(--card2);display:none;justify-content:center;align-items:center;color:white;font-size:70px;font-weight:900;flex-shrink:0;}
.artist-hero-cover img{width:100%;height:100%;object-fit:contain;background:var(--card2);display:block;}

.page-title small{color:var(--cyan);font-weight:900;letter-spacing:1px;}
.page-title h1{font-size:54px;margin:12px 0;}
.page-title p{color:var(--muted);max-width:650px;}

.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
.artist-card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:18px;cursor:pointer;transition:0.3s;}
.artist-card:hover{transform:translateY(-5px);border-color:var(--purple);}

.artist-cover{width:100%;height:220px;border-radius:24px;overflow:hidden;background:var(--card2);margin-bottom:16px;display:flex;justify-content:center;align-items:center;color:white;font-size:54px;font-weight:900;}
.artist-cover img{width:100%;height:100%;object-fit:contain;background:var(--card2);display:block;}

.back-btn{display:none;margin-bottom:20px;border:none;padding:14px 22px;border-radius:18px;background:var(--card);border:1px solid var(--border);color:var(--text);font-weight:800;cursor:pointer;}

.song-list{display:none;flex-direction:column;gap:14px;}
.song-row{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:16px 20px;display:grid;grid-template-columns:55px 64px 1fr 170px;gap:16px;align-items:center;cursor:pointer;transition:0.3s;}
.song-row:hover{transform:translateY(-3px);border-color:var(--purple);}

.song-cover{width:58px;height:58px;border-radius:16px;background:var(--card2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;}
.song-cover img{width:100%;height:100%;object-fit:contain;background:var(--card2);display:block;}

.song-actions{display:flex;justify-content:flex-end;gap:10px;}
.play-small{border:none;padding:10px 16px;border-radius:14px;font-weight:800;cursor:pointer;background:linear-gradient(90deg,var(--cyan),var(--purple));color:white;}
.fav-small{border:none;padding:10px 16px;border-radius:14px;font-weight:800;cursor:pointer;background:var(--card2);color:#f59e0b;font-size:18px;}

/* PLAYER & MOBILE NAV */
.player{position:fixed;left:250px;right:0;bottom:0;height:128px;background:var(--card);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1.5fr 1fr;align-items:center;gap:18px;padding:16px 34px;z-index:999;}
.player-info{display:flex;align-items:center;gap:14px;cursor:pointer;}
.player-cover{width:64px;height:64px;border-radius:18px;background:var(--card2);display:flex;justify-content:center;align-items:center;color:white;font-weight:900;}
.player-cover img{width:100%;height:100%;object-fit:contain;display:block;}

.controls{text-align:center;}
.buttons{display:flex;justify-content:center;gap:14px;margin-bottom:8px;}
.buttons button{width:46px;height:46px;border:none;border-radius:50%;background:var(--card2);cursor:pointer;font-size:16px;}
.buttons .play{background:linear-gradient(135deg,var(--cyan),var(--purple));color:white;}

.progress{height:6px;background:var(--card2);border-radius:20px;overflow:hidden;cursor:pointer;}
.progress-fill{width:0%;height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));}
.time{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-top:6px;}

.volume{display:flex;justify-content:flex-end;align-items:center;gap:14px;}
.volume input{accent-color:var(--cyan);width:100px;}

.mobile-nav{display:none;position:fixed;left:0;right:0;bottom:0;height:64px;background:var(--card);border-top:1px solid var(--border);z-index:1000;justify-content:space-around;align-items:center;}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;color:var(--muted);text-decoration:none;font-size:10px;font-weight:600;gap:4px;}
.mobile-nav-item.active{color:var(--purple);}

.music-popup{position:fixed;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(14px);z-index:9999;display:none;justify-content:center;align-items:center;padding:20px;}
.music-popup.show{display:flex;}
.popup-card{width:100%;max-width:430px;background:var(--card);border-radius:34px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,0.25);}
.popup-cover{width:100%;height:310px;border-radius:28px;background:var(--card2);display:flex;justify-content:center;align-items:center;color:white;font-size:90px;font-weight:900;margin-bottom:22px;}
.popup-cover img{width:100%;height:100%;object-fit:contain;display:block;}
.popup-buttons{display:flex;justify-content:center;align-items:center;gap:18px;margin:22px 0;}
.popup-buttons button{width:54px;height:54px;border:none;border-radius:50%;background:var(--card2);font-size:18px;cursor:pointer;}
.popup-buttons .popup-play{width:70px;height:70px;background:linear-gradient(90deg,var(--cyan),var(--purple));color:white;}
.popup-progress{height:6px;background:var(--card2);border-radius:20px;overflow:hidden;cursor:pointer;}
.popup-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));}

@media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .main{padding:20px 16px 200px !important;}
    .player{left:0 !important;right:0 !important;bottom:64px !important;grid-template-columns:1.2fr 1fr;height:68px !important;padding:8px 16px !important;gap:10px;}
    .player-cover{width:44px !important;height:44px !important;border-radius:8px !important;}
    .buttons button{display:none;}
    .buttons button.play{display:flex !important;width:42px !important;height:42px !important;}
    .progress, .time, .volume {display:none !important;}
    .mobile-nav{display:flex;}
}
</style>
</head>

<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='home.html'">Audio<span>phile</span></div>
        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html" class="active">Artists</a>
            <a href="favorites.html">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="search-box"><input type="text" id="searchInput" placeholder="Search artists..."></div>
            <div class="profile" onclick="window.location.href='settings.html'">
                <span id="homeProfileInitial">L</span>
                <img id="homeProfileImage" src="">
            </div>
        </div>

        <section class="page-title">
            <div class="artist-hero-cover" id="artistHeroCover">A</div>
            <div>
                <small id="heroSmall">TOP MUSIC DIRECTORS</small>
                <h1 id="heroTitle">Artists</h1>
                <p id="heroText">Touch artist card to open all songs from that artist.</p>
            </div>
        </section>

        <button class="back-btn" id="backBtn" onclick="showArtists()">← Back To Artists</button>
        <div class="artist-grid" id="artistGrid"></div>
        <div class="song-list" id="songList"></div>
    </main>
</div>

<!-- Mobile Nav -->
<nav class="mobile-nav">
    <a href="home.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-house"></i></span><span>Home</span></a>
    <a href="songs.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-music"></i></span><span>Songs</span></a>
    <a href="albums.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-compact-disc"></i></span><span>Albums</span></a>
    <a href="artists.html" class="mobile-nav-item active"><span class="mobile-nav-icon"><i class="fa-solid fa-user-astronaut"></i></span><span>Artists</span></a>
    <a href="favorites.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-heart"></i></span><span>Favorites</span></a>
</nav>

<!-- Player Bar -->
<div class="player">
    <div class="player-info" onclick="openPopup()">
        <div class="player-cover" id="playerCover">A</div>
        <div>
            <h4 id="playerTitle">Select a song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>
    </div>
    <div class="controls">
        <div class="buttons">
            <button onclick="prevSong()">⏮</button>
            <button class="play" id="playBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>
        <div class="progress" onclick="setProgress(event)"><div class="progress-fill" id="progressFill"></div></div>
        <div class="time"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
    </div>
    <div class="volume">
        <span>Volume</span>
        <input id="volumeRange" type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)">
    </div>
</div>

<div class="music-popup" id="musicPopup">
    <div class="popup-card">
        <div class="popup-cover" id="popupCover">A</div>
        <h2 id="popupTitle">Select a song</h2>
        <p id="popupArtist">Audiophile</p>
        <div class="popup-buttons">
            <button onclick="prevSong()">⏮</button>
            <button class="popup-play" id="popupPlayBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>
        <div class="popup-progress" onclick="setPopupProgress(event)"><div class="popup-progress-fill" id="popupProgressFill"></div></div>
        <div class="popup-time"><span id="popupCurrentTime">0:00</span><span id="popupDurationTime">0:00</span></div>
        <div class="popup-volume"><span>Volume</span><input id="popupVolumeRange" type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)"></div>
    </div>
</div>

<audio id="audio"></audio>

</body>
</html>
