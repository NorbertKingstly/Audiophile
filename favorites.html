<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites - Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --text:#111827;
    --muted:#64748b;
    --border:rgba(0,0,0,0.08);
    --grad:linear-gradient(90deg,#111827,#6366f1,#22d3ee);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* layout */
.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

/* sidebar */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:24px;
}

.logo{
    font-size:28px;
    font-weight:900;
    margin-bottom:30px;
}

.logo span{background:var(--grad); -webkit-background-clip:text;color:transparent;}

.menu a{
    display:block;
    padding:14px;
    margin:8px 0;
    text-decoration:none;
    color:var(--muted);
    font-weight:700;
    border-radius:14px;
}

.menu a:hover,
.menu a.active{
    background:#eef2ff;
    color:var(--text);
}

/* main */
.main{
    padding:24px;
    overflow-y:auto;
}

/* song list */
.song-row{
    display:grid;
    grid-template-columns:50px 60px 1fr 120px;
    gap:12px;
    padding:12px;
    border:1px solid var(--border);
    border-radius:16px;
    margin-bottom:10px;
    align-items:center;
    cursor:pointer;
}

.song-cover{
    width:55px;height:55px;border-radius:12px;
    background:#eee;
    overflow:hidden;
}

.song-cover img{width:100%;height:100%;object-fit:cover;}

.song-actions button{
    padding:8px 12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.play-btn{
    background:#6366f1;
    color:white;
}

/* PLAYER BAR (IMPORTANT FIX) */
.player{
    position:fixed;
    bottom:0;
    left:250px;
    right:0;
    height:90px;
    background:white;
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
    z-index:999;
}

.player-info{
    display:flex;
    gap:10px;
    align-items:center;
}

.player-cover{
    width:50px;height:50px;
    border-radius:10px;
    background:#ddd;
    overflow:hidden;
}

.player-cover img{width:100%;height:100%;object-fit:cover;}

.controls button{
    padding:10px;
    border:none;
    border-radius:50%;
    margin:0 5px;
    cursor:pointer;
}

.play-main{
    background:#6366f1;
    color:white;
}

/* mobile */
@media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .player{left:0;}
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">Audio<span>phile</span></div>

    <div class="menu">
        <a href="home.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="albums.html">Albums</a>
        <a href="artists.html">Artists</a>
        <a href="favorites.html" class="active">Favorites</a>
        <a href="settings.html">Settings</a>
    </div>
</aside>

<!-- MAIN -->
<main class="main">
    <h2>Favorites</h2>
    <div id="favList"></div>
</main>

</div>

<!-- PLAYER BAR -->
<div class="player">
    <div class="player-info">
        <div class="player-cover" id="pCover">A</div>
        <div>
            <div id="pTitle">No song</div>
            <small id="pArtist">---</small>
        </div>
    </div>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button class="play-main" id="playBtn" onclick="toggle()">▶</button>
        <button onclick="next()">⏭</button>
    </div>

    <audio id="audio"></audio>
</div>

<script src="songs.js"></script>

<script>
let audio=document.getElementById("audio");
let favList=document.getElementById("favList");

let playBtn=document.getElementById("playBtn");
let pTitle=document.getElementById("pTitle");
let pArtist=document.getElementById("pArtist");
let pCover=document.getElementById("pCover");

let songsData = typeof songs !== "undefined" ? songs : [];
let favs = JSON.parse(localStorage.getItem("audiophile_favorites")) || [];

let current=0;
let isPlaying=false;

/* render */
function render(){
    favList.innerHTML=favs.map(i=>{
        let s=songsData[i];
        if(!s) return "";
        return `
        <div class="song-row">
            <div>${i+1}</div>
            <div class="song-cover">
                ${s.cover ? `<img src="${s.cover}">` : "A"}
            </div>
            <div>
                <b>${s.title}</b><br>
                <small>${s.artist}</small>
            </div>
            <div class="song-actions">
                <button class="play-btn" onclick="play(${i})">Play</button>
            </div>
        </div>`;
    }).join("");
}

/* play */
function play(i){
    current=i;
    let s=songsData[i];
    audio.src=s.audio;
    audio.play();

    pTitle.innerText=s.title;
    pArtist.innerText=s.artist;
    pCover.innerHTML=s.cover?`<img src="${s.cover}">`:"A";

    playBtn.innerText="⏸";
    isPlaying=true;
}

/* controls */
function toggle(){
    if(audio.paused){
        audio.play();
        playBtn.innerText="⏸";
    }else{
        audio.pause();
        playBtn.innerText="▶";
    }
}

function next(){
    if(favs.length===0) return;
    let idx=favs.indexOf(current);
    let n=favs[(idx+1)%favs.length];
    play(n);
}

function prev(){
    if(favs.length===0) return;
    let idx=favs.indexOf(current);
    let p=favs[(idx-1+favs.length)%favs.length];
    play(p);
}

render();
</script>

</body>
</html>
