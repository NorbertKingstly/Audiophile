<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
:root{--bg:#f5f5f7;--card:#ffffff;--card2:#eef0f4;--text:#111827;--muted:#64748b;--cyan:#111827;--purple:#6366f1;--pink:#22d3ee;--border:rgba(0,0,0,0.08);}
body{background:var(--bg);color:var(--text);overflow:hidden;}
.app{display:grid;grid-template-columns:250px 1fr;height:100vh;}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:28px 20px;}
.logo{font-size:32px;font-weight:900;margin-bottom:34px;cursor:pointer;}
.logo span{background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));background-clip:text;-webkit-background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
.menu{display:flex;flex-direction:column;gap:14px;}
.menu a{color:var(--muted);text-decoration:none;padding:15px 18px;border-radius:18px;font-size:16px;font-weight:700;}
.menu a.active, .menu a:hover{background:linear-gradient(90deg,rgba(99,102,241,0.12),rgba(34,211,238,0.12));color:var(--text);}
.main{height:100vh;overflow-y:auto;padding:30px 34px 150px;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:28px;}
.search-box{width:100%;}
.search-box input{width:100%;padding:17px 24px;border-radius:40px;border:1px solid var(--border);outline:none;background:var(--card);color:var(--text);font-size:15px;}
.page-title{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(34,211,238,0.08));border:1px solid var(--border);border-radius:34px;padding:34px;margin-bottom:24px;}
.song-row{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:14px 18px;display:grid;grid-template-columns:55px 70px 1.5fr 1fr 150px;gap:16px;align-items:center;cursor:pointer;transition:0.3s;margin-bottom:12px;}
.song-row:hover{transform:translateY(-3px);border-color:var(--purple);}
.song-cover{width:62px;height:62px;border-radius:16px;background:var(--card2);overflow:hidden;display:flex;justify-content:center;align-items:center;}
.song-cover img{width:100%;height:100%;object-fit:cover;}
.song-actions{display:flex;align-items:center;gap:10px;}
.star-btn{background:none;border:none;color:gold;font-size:22px;cursor:pointer;padding:5px;}
.play-small{background:linear-gradient(90deg,var(--cyan),var(--purple));color:white;border:none;padding:10px 16px;border-radius:15px;cursor:pointer;}
</style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='home.html'">Audio<span>phile</span></div>
        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>
    <main class="main">
        <div class="topbar">
            <div class="search-box"><input id="searchInput" type="text" placeholder="Search favorites..."></div>
        </div>
        <section class="page-title">
            <small>YOUR LIKED SONGS</small>
            <h1>Favorites</h1>
        </section>
        <div class="song-list" id="favoriteList"></div>
    </main>
</div>
<script src="songs.js"></script>
<script>
let favoriteList = document.getElementById("favoriteList");
let searchInput = document.getElementById("searchInput");

function getFavorites(){ return JSON.parse(localStorage.getItem("audiophile_favorites")) || []; }

function renderFavorites(){
    let favIndices = getFavorites();
    let allSongs = typeof songs !== "undefined" ? songs : [];
    
    if(favIndices.length === 0){
        favoriteList.innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px;">No favorites yet.</div>`;
        return;
    }

    favoriteList.innerHTML = favIndices.map((index, displayIndex) => {
        let song = allSongs[index];
        if(!song) return "";
        return `
        <div class="song-row">
            <div class="song-no">${displayIndex + 1}</div>
            <div class="song-cover">${song.cover ? `<img src="${song.cover}">` : song.title.charAt(0)}</div>
            <div class="song-title"><h3>${song.title}</h3><p>${song.album}</p></div>
            <div class="song-artist">${song.artist}</div>
            <div class="song-actions">
                <button class="star-btn">★</button>
                <button class="play-small" onclick="playSong(${index})">▶ Play</button>
            </div>
        </div>`;
    }).join("");
}

function playSong(index){ window.location.href = "home.html?play=" + index; }

renderFavorites();
</script>
</body>
</html>
