<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --cyan:#e60023;
    --purple:#ff2d55;
    --pink:#ff7b92;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    height: 100vh;
    height: 100dvh;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
    height:100dvh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
    overflow-y:auto;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
    color:var(--text);
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
    transition:0.3s;
}

.menu a.active, .menu a:hover{
    background:linear-gradient(90deg, color-mix(in srgb,var(--cyan) 16%,transparent), color-mix(in srgb,var(--purple) 16%,transparent));
    color:var(--text);
}

.main{
    height:100vh;
    height:100dvh;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    padding:30px 34px 170px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:70%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
    color:white;
    overflow:hidden;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

h2{
    font-size:28px;
    font-weight:800;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:24px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:18px;
    cursor:pointer;
    position:relative;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 30px rgba(0,0,0,0.05);
}

.cover{
    width:100%;
    aspect-ratio:1;
    background:var(--card2);
    border-radius:18px;
    margin-bottom:14px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:48px;
    font-weight:900;
    color:white;
    overflow:hidden;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card h3{
    font-size:16px;
    font-weight:700;
    margin-bottom:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding-right:24px;
}

.card p{
    font-size:14px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.fav-heart{
    position:absolute;
    bottom:20px;
    right:18px;
    font-size:18px;
    color:#ef4444;
    cursor:pointer;
    transition:0.2s;
    z-index:10;
}

.fav-heart:hover{
    transform:scale(1.2);
}

/* PLAYER STYLES */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:128px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:999;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    min-width: 0;
    width: 100%;
}

.player-details{
    min-width: 0;
    flex: 1;
}

.player-details h4{ font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-details p{ font-size: 14px; color:var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:900;
    color:white;
    overflow:hidden;
    background:var(--card2);
    flex-shrink: 0;
}

.player-cover img{ width:100%; height:100%; object-fit:contain; }

.controls{ text-align:center; }
.buttons{ display:flex; justify-content:center; align-items:center; gap:14px; margin-bottom:8px; }
.buttons button{ width:46px; height:46px; border:none; border-radius:50%; background:var(--card2); color:var(--text); cursor:pointer; }
.buttons .play{ width:58px; height:58px; background:linear-gradient(135deg,var(--cyan),var(--purple)); color:white; }

.progress, .card-progress{ height:6px; background:var(--card2); border-radius:20px; overflow:hidden; cursor:pointer; }
.progress-fill, .card-progress-fill{ height:100%; width:0%; background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink)); }
.time, .card-time{ display:flex; justify-content:space-between; color:var(--muted); font-size:13px; margin-top:6px; }

.volume{ display:flex; justify-content:flex-end; align-items:center; gap:14px; }
.mobile-nav { display: none; }

/* MUSIC POPUP SCREEN OVERLAY */
.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(14px);
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.music-card-overlay.show{ display:flex; }
.music-card{ width:100%; max-width:430px; background:var(--card); border:1px solid var(--border); border-radius:34px; padding:24px; }
.big-cover{ width:100%; height:310px; border-radius:28px; display:flex; justify-content:center; align-items:center; color:white; font-size:90px; font-weight:900; overflow:hidden; margin-bottom:22px; background:var(--card2); }
.big-cover img{ width:100%; height:100%; object-fit:contain; }
.music-card h2, .music-card p { text-align:center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-buttons{ display:flex; justify-content:center; align-items:center; gap:18px; margin:22px 0; }
.card-buttons button{ width:54px; height:54px; border:none; border-radius:50%; background:var(--card2); font-size:18px; cursor:pointer; }
.card-buttons .big-play{ width:70px; height:70px; background:linear-gradient(90deg,var(--cyan),var(--purple)); color:white; font-size:24px; }
.card-volume { margin-top:20px; }
.card-volume input { width:100%; margin-top:10px; }

@media(max-width:900px){
    .app{ grid-template-columns:1fr; }
    .sidebar{ display:none; }
    .main{ padding: 20px 16px 200px !important; }
    .player{ left:0 !important; right:0 !important; bottom:64px !important; grid-template-columns: 1.2fr 1fr; height: 68px !important; padding: 8px 16px !important; background: var(--card) !important; border-top: 1px solid var(--border); }
    .player-cover { width: 44px !important; height: 44px !important; }
    .controls { width: 100%; display: flex; justify-content: flex-end; }
    .buttons button { display: none; }
    .buttons button.play { display: flex !important; justify-content: center; align-items: center; width: 42px !important; height: 42px !important; }
    .progress, .time, .volume { display: none !important; }
    .mobile-nav { display: flex; position: fixed; left: 0; right: 0; bottom: 0; height: 64px; background: var(--card); border-top: 1px solid var(--border); z-index: 1000; justify-content: space-around; align-items: center; }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--muted); font-size: 10px; }
    .mobile-nav-item.active { color: var(--purple); }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
    .card { padding: 12px; border-radius: 18px; }
}
</style>
</head>
<body class="theme-white">

<div class="app">
    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='home.html'">Audio<span>phile</span></div>
        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="search-box">
                <input id="searchInput" type="text" placeholder="Search saved favorites...">
            </div>
            <div class="profile" onclick="window.location.href='settings.html'">
                <span id="homeProfileInitial">L</span>
                <img id="homeProfileImage" src="" alt="Profile">
            </div>
        </div>

        <h2>Favorites</h2>
        <div id="favoritesGrid" class="grid"></div>
    </main>
</div>

<div class="player">
    <div class="player-info" onclick="openMusicCard()">
        <div class="player-cover" id="playerCover">A</div>
        <div class="player-details">
            <h4 id="playerTitle">Select a song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>
    </div>
    <div class="controls">
        <div class="buttons">
            <button onclick="prevSong()">⏮</button>
            <button class="play" id="playBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>
        <div class="progress" onclick="setProgress(event)"><div class="progress-fill" id="progressFill"></div></div>
        <div class="time"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
    </div>
    <div class="volume">
        <h3>Volume</h3>
        <input type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)">
    </div>
</div>

<nav class="mobile-nav">
    <a href="home.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-house"></i></span><span>Home</span></a>
    <a href="songs.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-music"></i></span><span>Songs</span></a>
    <a href="albums.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-compact-disc"></i></span><span>Albums</span></a>
    <a href="artists.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-user-astronaut"></i></span><span>Artists</span></a>
    <a href="favorites.html" class="mobile-nav-item active"><span class="mobile-nav-icon"><i class="fa-solid fa-heart"></i></span><span>Favorites</span></a>
    <a href="settings.html" class="mobile-nav-item"><span class="mobile-nav-icon"><i class="fa-solid fa-gear"></i></span><span>Settings</span></a>
</nav>

<div class="music-card-overlay" id="musicCardOverlay">
    <div class="music-card">
        <div class="big-cover" id="bigCover">A</div>
        <h2 id="cardSongTitle">Select a song</h2>
        <p id="cardSongArtist">Audiophile</p>
        <div class="card-buttons">
            <button onclick="prevSong()">⏮</button>
            <button class="big-play" id="cardPlayBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>
        <div class="card-progress" onclick="setCardProgress(event)"><div class="card-progress-fill" id="cardProgressFill"></div></div>
        <div class="card-time"><span id="cardCurrentTime">0:00</span><span id="cardDurationTime">0:00</span></div>
        <div class="card-volume"><span>Volume</span><input type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)"></div>
    </div>
</div>

<audio id="audio"></audio>
<script src="songs.js"></script>
<script>
let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;
let isPlaying = localStorage.getItem("globalIsPlaying") === "true";
let savedSrc = localStorage.getItem("globalAudioSrc");
let savedTime = parseFloat(localStorage.getItem("globalAudioTime")) || 0;

let audio = window.globalAudio || document.getElementById("audio");
window.globalAudio = audio;

if(savedSrc && !audio.src){
    audio.src = savedSrc;
    audio.currentTime = savedTime;
}

let favoritesGrid = document.getElementById("favoritesGrid");

function getSongs(){
    return (typeof songs !== "undefined" && Array.isArray(songs)) ? songs : [];
}

function getFavoritesList(){
    let favData = localStorage.getItem("audiophile_favorites");
    if(favData) { try { return JSON.parse(favData); } catch(e) { return []; } }
    return [];
}

function renderFavorites(){
    let allSongs = getSongs();
    let favList = getFavoritesList();
    let query = document.getElementById("searchInput").value.toLowerCase();

    // Fixed: Filters exact items safely matching user storage array references
    let filteredSongs = allSongs.filter(function(song){
        let isFav = favList.includes(song.audio);
        let matchesQuery = (song.title && song.title.toLowerCase().includes(query)) || 
                           (song.artist && song.artist.toLowerCase().includes(query));
        return isFav && matchesQuery;
    });

    if(filteredSongs.length === 0){
        favoritesGrid.innerHTML = "<p style='padding:20px; color:var(--muted);'>No favorite tracks found.</p>";
        return;
    }

    favoritesGrid.innerHTML = filteredSongs.map(function(song){
        let realGlobalIndex = allSongs.indexOf(song); // Guaranteed real matching tracking index
        let fallbackLetter = song.title ? song.title.charAt(0).toUpperCase() : "S";
        let coverContent = song.cover ? `<img src="${song.cover}" alt="">` : fallbackLetter;
        
        return `
        <div class="card" onclick="playSong(${realGlobalIndex})">
            <div class="cover">${coverContent}</div>
            <h3>${song.title || 'Untitled'}</h3>
            <p>${song.artist || 'Unknown Artist'}</p>
            <i class="fa-solid fa-heart fav-heart" onclick="removeFav(event, '${song.audio.replace(/'/g, "\\'")}')"></i>
        </div>
        `;
    }).join('');
}

function removeFav(event, audioSrc){
    event.stopPropagation(); // Fixed: Prevents unwanted playback triggering upon removal clicks
    let favs = getFavoritesList();
    let index = favs.indexOf(audioSrc);
    if(index > -1){
        favs.splice(index, 1);
        localStorage.setItem("audiophile_favorites", JSON.stringify(favs));
    }
    renderFavorites();
}

function updatePlayerUI(song){
    let playBtn = document.getElementById("playBtn");
    let cardPlayBtn = document.getElementById("cardPlayBtn");
    if(isPlaying){ playBtn.innerText = "⏸"; cardPlayBtn.innerText = "⏸"; } 
    else { playBtn.innerText = "▶"; cardPlayBtn.innerText = "▶"; }

    if(!song) return;
    document.getElementById("playerTitle").innerText = song.title || "Untitled Track";
    let subStr = (song.artist || "Unknown Artist") + (song.album ? " • " + song.album : "");
    document.getElementById("playerArtist").innerText = subStr;
    document.getElementById("cardSongTitle").innerText = song.title || "Untitled Track";
    document.getElementById("cardSongArtist").innerText = subStr;

    if(song.cover){
        document.getElementById("playerCover").innerHTML = `<img src="${song.cover}" alt="">`;
        document.getElementById("bigCover").innerHTML = `<img src="${song.cover}" alt="">`;
    }
}

function playSong(index){
    let allSongs = getSongs();
    if(index < 0 || index >= allSongs.length) return;
    currentSongIndex = index;
    let song = allSongs[index];
    audio.src = song.audio;
    audio.play().then(function(){ isPlaying = true; savePlayerState(); updatePlayerUI(song); });
}

function togglePlay(){
    let allSongs = getSongs();
    if(isPlaying){ audio.pause(); isPlaying = false; } 
    else {
        if(!audio.src && allSongs[currentSongIndex]) audio.src = allSongs[currentSongIndex].audio;
        audio.play().then(function(){ isPlaying = true; savePlayerState(); updatePlayerUI(allSongs[currentSongIndex]); });
    }
    savePlayerState();
    updatePlayerUI(allSongs[currentSongIndex]);
}

function nextSong(){
    let allSongs = getSongs();
    currentSongIndex = (currentSongIndex + 1) % allSongs.length;
    playSong(currentSongIndex);
}

function prevSong(){
    let allSongs = getSongs();
    currentSongIndex = (currentSongIndex - 1 + allSongs.length) % allSongs.length;
    playSong(currentSongIndex);
}

function changeVolume(val){
    audio.volume = val;
    document.querySelectorAll("input[type='range']").forEach(function(r){ r.value = val; });
}

function formatTime(secs){
    if(isNaN(secs) || !isFinite(secs)) return "0:00";
    let m = Math.floor(secs / 60), s = Math.floor(secs % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
}

function savePlayerState(){
    localStorage.setItem("currentSongIndex", currentSongIndex);
    localStorage.setItem("globalIsPlaying", isPlaying ? "true" : "false");
    if(audio.src) { localStorage.setItem("globalAudioSrc", audio.src); localStorage.setItem("globalAudioTime", audio.currentTime); }
}

audio.addEventListener("timeupdate", function(){
    if(!audio.duration) return;
    let pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("cardProgressFill").style.width = pct + "%";
    document.getElementById("currentTime").innerText = formatTime(audio.currentTime);
    document.getElementById("durationTime").innerText = formatTime(audio.duration);
});

audio.addEventListener("ended", function(){ nextSong(); });
function setProgress(e){ audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration; }
function setCardProgress(e){ audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration; }
function openMusicCard(){ if(audio.src) document.getElementById("musicCardOverlay").classList.add("show"); }
function closeMusicCard(){ document.getElementById("musicCardOverlay").classList.remove("show"); }

document.getElementById("musicCardOverlay").addEventListener("click", function(e){ if(e.target.id === "musicCardOverlay") closeMusicCard(); });
document.getElementById("searchInput").addEventListener("input", function(){ renderFavorites(); });

applyTheme = () => { document.body.className = "theme-" + (localStorage.getItem("audiophile_theme") || "white"); };
applyTheme();
renderFavorites();
changeVolume(localStorage.getItem("globalVolume") || 0.8);
if(getSongs().length > 0) updatePlayerUI(getSongs()[currentSongIndex]);
</script>
</body>
</html>
