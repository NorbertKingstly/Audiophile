<!-- FAVORITES PAGE FIXED FULL CODE -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
    transition:.3s;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(90deg,rgba(99,102,241,0.12),rgba(34,211,238,0.12));
    color:var(--text);
}

.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 150px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:100%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    overflow:hidden;
    flex-shrink:0;
    cursor:pointer;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.page-title{
    background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(34,211,238,0.08));
    border:1px solid var(--border);
    border-radius:34px;
    padding:34px;
    margin-bottom:24px;
}

.page-title small{
    color:var(--cyan);
    font-weight:900;
    letter-spacing:1px;
}

.page-title h1{
    font-size:50px;
    margin:12px 0;
}

.page-title p{
    color:var(--muted);
}

.song-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:16px 20px;
    display:grid;
    grid-template-columns:55px 64px 1fr 160px;
    gap:16px;
    align-items:center;
    cursor:pointer;
    transition:.3s;
}

.song-row:hover{
    transform:translateY(-3px);
    border-color:var(--purple);
}

.song-no{
    color:var(--muted);
    font-weight:900;
}

.song-cover{
    width:58px;
    height:58px;
    border-radius:16px;
    background:var(--card2);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:900;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:var(--card2);
    display:block;
}

.song-title h3{
    font-size:18px;
    margin-bottom:4px;
}

.song-title p{
    color:var(--muted);
    font-size:14px;
}

.song-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.song-actions button{
    border:none;
    padding:10px 16px;
    border-radius:14px;
    font-weight:800;
    cursor:pointer;
}

.play-small{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.remove-fav{
    background:#fee2e2;
    color:#dc2626;
}

.empty{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:34px;
    text-align:center;
    color:var(--muted);
    font-weight:800;
}

/* PLAYER */

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:99;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:900;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:var(--card2);
    display:block;
}

.player-info p{
    color:var(--muted);
}

.controls{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:10px;
}

.buttons button{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    cursor:pointer;
    color:var(--text);
}

.buttons .play{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.progress{
    height:7px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
}

.volume{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:12px;
}

.volume input{
    width:130px;
}

/* POPUP */

.music-popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(12px);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.music-popup.show{
    display:flex;
}

.popup-card{
    width:100%;
    max-width:430px;
    background:var(--card);
    border-radius:34px;
    padding:24px;
    border:1px solid var(--border);
}

.popup-cover{
    width:100%;
    height:310px;
    border-radius:28px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:80px;
    font-weight:900;
    margin-bottom:20px;
}

.popup-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:var(--card2);
}

.popup-card h2{
    text-align:center;
    margin-bottom:6px;
    font-size:28px;
}

.popup-card p{
    text-align:center;
    color:var(--muted);
    margin-bottom:18px;
}

.popup-buttons{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:22px 0;
}

.popup-buttons button{
    width:54px;
    height:54px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    cursor:pointer;
}

.popup-buttons .popup-play{
    width:70px;
    height:70px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.popup-progress{
    height:7px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.popup-progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
}

.popup-time{
    display:flex;
    justify-content:space-between;
    color:var(--muted);
    font-size:12px;
    margin-top:6px;
}

.popup-volume{
    margin-top:18px;
}

.popup-volume input{
    width:100%;
    margin-top:10px;
}

@media(max-width:900px){

    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .main{
        padding:22px 18px 180px;
    }

    .song-row{
        grid-template-columns:42px 58px 1fr;
        padding:14px;
    }

    .song-actions{
        grid-column:3;
        justify-content:flex-start;
    }

    .player{
        left:0;
        grid-template-columns:1fr;
        height:auto;
    }

    .volume{
        display:none;
    }
}

</style>
</head>

<body>

<div class="app">

<aside class="sidebar">

<div class="logo" onclick="window.location.href='home.html'">
Audio<span>phile</span>
</div>

<nav class="menu">
<a href="home.html">Home</a>
<a href="songs.html">Songs</a>
<a href="albums.html">Albums</a>
<a href="artists.html">Artists</a>
<a href="favorites.html" class="active">Favorites</a>
<a href="settings.html">Settings</a>
</nav>

</aside>

<main class="main">

<div class="topbar">

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search favorite songs...">
</div>

<div class="profile" onclick="window.location.href='settings.html'">
<span id="profileInitial">L</span>
<img id="profileImage" src="">
</div>

</div>

<section class="page-title">
<small>YOUR FAVORITE SONGS</small>
<h1>Favorites</h1>
<p>Your liked songs collection.</p>
</section>

<div class="song-list" id="favoriteList"></div>

</main>

</div>

<!-- PLAYER -->

<div class="player">

<div class="player-info" onclick="openPopup()">

<div class="player-cover" id="playerCover">A</div>

<div>
<h4 id="playerTitle">Select a song</h4>
<p id="playerArtist">Audiophile</p>
</div>

</div>

<div class="controls">

<div class="buttons">
<button onclick="prevSong()">⏮</button>
<button class="play" id="playBtn" onclick="togglePlay()">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

<div class="progress" onclick="setProgress(event)">
<div class="progress-fill" id="progressFill"></div>
</div>

<div class="time">
<span id="currentTime">0:00</span>
<span id="durationTime">0:00</span>
</div>

</div>

<div class="volume">
<span>Volume</span>
<input id="volumeRange" type="range" min="0" max="1" step="0.01" value="0.8">
</div>

</div>

<!-- POPUP -->

<div class="music-popup" id="musicPopup">

<div class="popup-card">

<div class="popup-cover" id="popupCover">A</div>

<h2 id="popupTitle">Select a song</h2>
<p id="popupArtist">Audiophile</p>

<div class="popup-buttons">
<button onclick="prevSong()">⏮</button>
<button class="popup-play" id="popupPlayBtn" onclick="togglePlay()">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

<div class="popup-progress" onclick="setPopupProgress(event)">
<div class="popup-progress-fill" id="popupProgressFill"></div>
</div>

<div class="popup-time">
<span id="popupCurrentTime">0:00</span>
<span id="popupDurationTime">0:00</span>
</div>

<div class="popup-volume">
<span>Volume</span>
<input id="popupVolumeRange" type="range" min="0" max="1" step="0.01" value="0.8">
</div>

</div>

</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>

let audio = document.getElementById("audio");

let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;

let isPlaying = localStorage.getItem("globalIsPlaying") === "true";

let savedSrc = localStorage.getItem("globalAudioSrc");
let savedTime = parseFloat(localStorage.getItem("globalAudioTime")) || 0;

if(savedSrc){
    audio.src = savedSrc;
    audio.currentTime = savedTime;
}

function getSongs(){
    return typeof songs !== "undefined" ? songs : [];
}

function getFavorites(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

function loadProfile(){

    let currentUser =
    localStorage.getItem("audiophile_currentUser") || "Liyo";

    let profileImg =
    localStorage.getItem("audiophile_profileImage") || "";

    profileInitial.innerText =
    currentUser.charAt(0).toUpperCase();

    if(profileImg){

        profileImage.src = profileImg;
        profileImage.style.display = "block";
        profileInitial.style.display = "none";
    }
}

function renderFavorites(){

    let favorites = getFavorites();

    let allSongs = getSongs();

    let value = searchInput.value.toLowerCase();

    let filtered = favorites
    .map(index => ({song:allSongs[index],index:index}))
    .filter(item => item.song)
    .filter(item =>
        item.song.title.toLowerCase().includes(value) ||
        item.song.artist.toLowerCase().includes(value)
    );

    if(filtered.length === 0){

        favoriteList.innerHTML =
        `<div class="empty">No favorite songs found.</div>`;

        return;
    }

    favoriteList.innerHTML = filtered.map((item,index)=>`

    <div class="song-row" onclick="playSong(${item.index})">

        <div class="song-no">${index + 1}</div>

        <div class="song-cover">
        ${
            item.song.cover
            ? `<img src="${item.song.cover}">`
            : item.song.title.charAt(0)
        }
        </div>

        <div class="song-title">
            <h3>${item.song.title}</h3>
            <p>${item.song.artist}</p>
        </div>

        <div class="song-actions">

            <button class="play-small">
            ▶ Play
            </button>

            <button class="remove-fav"
            onclick="removeFavorite(${item.index},event)">
            ✕
            </button>

        </div>

    </div>

    `).join("");
}

function removeFavorite(index,event){

    event.stopPropagation();

    let favorites = getFavorites();

    favorites = favorites.filter(item => item !== index);

    localStorage.setItem(
        "audiophile_favorites",
        JSON.stringify(favorites)
    );

    renderFavorites();
}

function playSong(index){

    let allSongs = getSongs();

    let song = allSongs[index];

    if(!song) return;

    currentSongIndex = index;

    audio.src = song.audio;

    audio.play();

    isPlaying = true;

    updatePlayerUI(song);

    saveState();
}

function togglePlay(){

    if(!audio.src){
        playSong(currentSongIndex);
        return;
    }

    if(isPlaying){

        audio.pause();
        isPlaying = false;
    }
    else{

        audio.play();
        isPlaying = true;
    }

    updatePlayerUI(getSongs()[currentSongIndex]);

    saveState();
}

function nextSong(){

    currentSongIndex++;

    if(currentSongIndex >= getSongs().length){
        currentSongIndex = 0;
    }

    playSong(currentSongIndex);
}

function prevSong(){

    currentSongIndex--;

    if(currentSongIndex < 0){
        currentSongIndex = getSongs().length - 1;
    }

    playSong(currentSongIndex);
}

function updatePlayerUI(song){

    if(!song) return;

    playerTitle.innerText = song.title;
    playerArtist.innerText = song.artist;

    popupTitle.innerText = song.title;
    popupArtist.innerText = song.artist;

    playBtn.innerText = isPlaying ? "⏸" : "▶";
    popupPlayBtn.innerText = isPlaying ? "⏸" : "▶";

    if(song.cover){

        playerCover.innerHTML =
        `<img src="${song.cover}">`;

        popupCover.innerHTML =
        `<img src="${song.cover}">`;
    }
}

function saveState(){

    localStorage.setItem("currentSongIndex",currentSongIndex);

    localStorage.setItem("globalAudioSrc",audio.src);

    localStorage.setItem(
        "globalAudioTime",
        audio.currentTime
    );

    localStorage.setItem(
        "globalIsPlaying",
        isPlaying
    );
}

function changeVolume(value){

    audio.volume = value;

    volumeRange.value = value;

    popupVolumeRange.value = value;

    localStorage.setItem("globalVolume",value);
}

volumeRange.addEventListener("input",e=>{
    changeVolume(e.target.value);
});

popupVolumeRange.addEventListener("input",e=>{
    changeVolume(e.target.value);
});

function formatTime(seconds){

    if(isNaN(seconds)) return "0:00";

    let min = Math.floor(seconds / 60);

    let sec = Math.floor(seconds % 60);

    if(sec < 10){
        sec = "0" + sec;
    }

    return min + ":" + sec;
}

audio.addEventListener("timeupdate",()=>{

    let percent =
    (audio.currentTime / audio.duration) * 100;

    if(isNaN(percent)){
        percent = 0;
    }

    progressFill.style.width = percent + "%";
    popupProgressFill.style.width = percent + "%";

    currentTime.innerText =
    formatTime(audio.currentTime);

    durationTime.innerText =
    formatTime(audio.duration);

    popupCurrentTime.innerText =
    formatTime(audio.currentTime);

    popupDurationTime.innerText =
    formatTime(audio.duration);

    saveState();
});

audio.addEventListener("ended",()=>{
    nextSong();
});

function setProgress(event){

    let width = event.currentTarget.clientWidth;

    let clickX = event.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;
}

function setPopupProgress(event){

    let width = event.currentTarget.clientWidth;

    let clickX = event.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;
}

function openPopup(){

    if(!audio.src) return;

    musicPopup.classList.add("show");
}

musicPopup.addEventListener("click",(e)=>{

    if(e.target.id === "musicPopup"){
        musicPopup.classList.remove("show");
    }
});

searchInput.addEventListener("input",()=>{
    renderFavorites();
});

loadProfile();

renderFavorites();

let savedVolume =
localStorage.getItem("globalVolume") || 0.8;

changeVolume(savedVolume);

updatePlayerUI(getSongs()[currentSongIndex]);

if(savedSrc && isPlaying){

    setTimeout(()=>{

        audio.play();

        isPlaying = true;

        updatePlayerUI(
            getSongs()[currentSongIndex]
        );

    },300);
}

</script>

</body>
</html>
