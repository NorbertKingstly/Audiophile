<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

/* THEME FIX (from settings) */
body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
}

.logo span{
    color:var(--purple);
}

.menu a{
    display:block;
    padding:14px;
    text-decoration:none;
    color:var(--muted);
    border-radius:12px;
}

.menu a.active,
.menu a:hover{
    background:var(--card2);
    color:var(--text);
}

.main{
    padding:25px;
    overflow-y:auto;
    padding-bottom:140px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.topbar input{
    flex:1;
    padding:14px;
    border-radius:20px;
    border:1px solid var(--border);
    outline:none;
}

.profile{
    width:40px;
    height:40px;
    border-radius:50%;
    background:var(--purple);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* SONG CARD FIX */
.song{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    margin:10px 0;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    cursor:pointer;
}

.song img{
    width:55px;
    height:55px;
    border-radius:10px;
    object-fit:cover;
}

.song p{
    font-size:12px;
    color:var(--muted);
}

/* PLAYER FIX */
.player{
    position:fixed;
    bottom:60px;
    left:0;
    right:0;
    background:var(--card);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
}

.controls button{
    border:none;
    padding:10px;
    border-radius:50%;
    background:var(--card2);
}

.play{
    background:var(--purple);
    color:#fff;
}

/* BOTTOM NAV (RESTORED EXACT STYLE) */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:60px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.bottom-nav a{
    text-decoration:none;
    color:var(--muted);
    font-size:12px;
    text-align:center;
}

.bottom-nav a.active{
    color:var(--purple);
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <div class="logo">Audio<span>phile</span></div>
    <div class="menu">
        <a href="home.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="albums.html">Albums</a>
        <a href="artists.html">Artists</a>
        <a class="active" href="favorites.html">Favorites</a>
        <a href="settings.html">Settings</a>
    </div>
</div>

<div class="main">

<div class="topbar">
    <input id="searchInput" placeholder="Search favorites...">
    <div class="profile">F</div>
</div>

<h2 style="margin:15px 0;">Favorites</h2>

<div id="list"></div>

</div>
</div>

<!-- PLAYER (FIXED + SYNC) -->
<div class="player">
    <div>
        <h4 id="title">Select Song</h4>
        <p id="artist">---</p>
    </div>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button class="play" onclick="toggle()">▶</button>
        <button onclick="next()">⏭</button>
    </div>
</div>

<!-- BOTTOM NAV (ICONS FIXED EXACT SAME AS YOUR ORIGIN) -->
<div class="bottom-nav">
    <a href="home.html">🏠<br>Home</a>
    <a href="songs.html">🎵<br>Songs</a>
    <a href="albums.html">💿<br>Albums</a>
    <a href="artists.html">👤<br>Artists</a>
    <a class="active" href="favorites.html">❤️<br>Fav</a>
    <a href="settings.html">⚙️<br>Settings</a>
</div>

<audio id="audio"></audio>
<script src="songs.js"></script>

<script>

let audio=document.getElementById("audio");
let list=document.getElementById("list");

function getSongs(){return songs||[];}
function getFav(){return JSON.parse(localStorage.getItem("audiophile_favorites"))||[];}

/* THEME FIX */
function applyTheme(){
    let t=localStorage.getItem("audiophile_theme")||"white";
    document.body.classList.add("theme-"+t);
}

/* IMAGE FIX */
function safeImg(src,title){
    return src
    ? `<img src="${src}" onerror="this.style.display='none'">`
    : title.charAt(0);
}

/* RENDER */
function render(){
    let fav=getFav();
    let all=getSongs();

    if(fav.length==0){
        list.innerHTML="No Favorites";
        return;
    }

    list.innerHTML=fav.map(i=>{
        let s=all[i];
        if(!s) return "";
        return `
        <div class="song" onclick="playSong(${i})">
            ${safeImg(s.cover,s.title)}
            <div>
                <h4>${s.title}</h4>
                <p>${s.artist}</p>
            </div>
        </div>`;
    }).join("");
}

/* 🔥 FIX: BACKGROUND SYNC (IMPORTANT) */
function playSong(i){
    let s=getSongs()[i];
    if(!s) return;

    audio.src=s.audio;
    audio.play();

    document.getElementById("title").innerText=s.title;
    document.getElementById("artist").innerText=s.artist;

    localStorage.setItem("globalAudioSrc",s.audio);
    localStorage.setItem("currentSongIndex",i);
    localStorage.setItem("globalIsPlaying","true");
}

/* CONTROLS */
function toggle(){
    if(audio.paused) audio.play();
    else audio.pause();
}

function next(){
    let all=getSongs();
    let i=parseInt(localStorage.getItem("currentSongIndex")||0);
    i=(i+1)%all.length;
    playSong(i);
}

function prev(){
    let all=getSongs();
    let i=parseInt(localStorage.getItem("currentSongIndex")||0);
    i=(i-1+all.length)%all.length;
    playSong(i);
}

/* SEARCH FIX */
searchInput.addEventListener("input",function(e){
    let v=e.target.value.toLowerCase();
    let fav=getFav();
    let all=getSongs();

    list.innerHTML=fav
    .map(i=>({s:all[i],i}))
    .filter(x=>x.s && x.s.title.toLowerCase().includes(v))
    .map(x=>`
        <div class="song" onclick="playSong(${x.i})">
            ${safeImg(x.s.cover,x.s.title)}
            <div>
                <h4>${x.s.title}</h4>
                <p>${x.s.artist}</p>
            </div>
        </div>
    `).join("");
});

/* INIT */
applyTheme();
render();

</script>

</body>
</html>
