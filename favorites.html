<!-- FAVORITES PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    height:100vh;
    height:100dvh;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
    height:100dvh;
}

/* SIDEBAR */

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
    overflow-y:auto;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
    transition:.3s;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(90deg,
    color-mix(in srgb,var(--cyan) 16%,transparent),
    color-mix(in srgb,var(--purple) 16%,transparent));
    color:var(--text);
}

/* MAIN */

.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 180px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:100%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    font-weight:900;
}

/* TITLE */

.page-title{
    background:linear-gradient(135deg,
    color-mix(in srgb,var(--cyan) 10%,white),
    color-mix(in srgb,var(--purple) 10%,white));
    border:1px solid var(--border);
    border-radius:34px;
    padding:34px;
    margin-bottom:24px;
}

.page-title small{
    color:var(--purple);
    font-weight:900;
}

.page-title h1{
    font-size:48px;
    margin:10px 0;
}

.page-title p{
    color:var(--muted);
}

/* SONG LIST */

.song-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:14px 18px;
    display:grid;
    grid-template-columns:50px 65px minmax(0,1fr) minmax(0,1fr) 120px;
    gap:14px;
    align-items:center;
    overflow:hidden;
}

.song-row:hover{
    border-color:var(--purple);
}

.song-no{
    font-weight:800;
    color:var(--muted);
}

.song-cover{
    width:60px;
    height:60px;
    border-radius:16px;
    overflow:hidden;
    background:var(--card2);
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-title,
.song-artist{
    min-width:0;
    overflow:hidden;
}

.song-title h3,
.song-title p,
.song-artist{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-title p,
.song-artist{
    color:var(--muted);
    font-size:13px;
}

.song-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
}

.song-actions button{
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:800;
}

.play-small{
    padding:10px 14px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.unfav-btn{
    width:42px;
    height:42px;
    background:var(--card2);
    color:#f59e0b;
    font-size:20px;
}

/* PLAYER */

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:110px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    align-items:center;
    padding:16px 30px;
    z-index:999;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.player-details{
    min-width:0;
}

.player-details h4,
.player-details p{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.player-details p{
    color:var(--muted);
    font-size:13px;
}

.controls{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
}

.buttons button{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:var(--card2);
}

.buttons .play{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.volume{
    display:flex;
    justify-content:flex-end;
}

.volume input{
    width:130px;
}

/* POPUP */

.music-popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(14px);
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.music-popup.show{
    display:flex;
}

.popup-card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border-radius:30px;
    padding:24px;
}

.popup-cover{
    width:100%;
    height:320px;
    border-radius:24px;
    overflow:hidden;
    background:var(--card2);
    margin-bottom:20px;
}

.popup-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.popup-title{
    text-align:center;
    font-size:26px;
    font-weight:800;
    margin-bottom:6px;
}

.popup-artist{
    text-align:center;
    color:var(--muted);
    margin-bottom:24px;
}

.popup-controls{
    display:flex;
    justify-content:center;
    gap:16px;
}

.popup-controls button{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:var(--card2);
}

.popup-play{
    width:74px !important;
    height:74px !important;
    background:linear-gradient(90deg,var(--cyan),var(--purple)) !important;
    color:white;
}

/* MOBILE */

.mobile-nav{
    display:none;
}

@media(max-width:900px){

    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .main{
        padding:20px 16px 180px;
    }

    .page-title{
        padding:22px;
        border-radius:24px;
    }

    .page-title h1{
        font-size:34px;
    }

    .song-row{
        grid-template-columns:34px 56px minmax(0,1fr) auto;
        padding:12px;
        gap:10px;
    }

    .song-artist{
        display:none;
    }

    .song-cover{
        width:56px;
        height:56px;
        border-radius:12px;
    }

    .song-title h3{
        font-size:14px;
    }

    .song-title p{
        font-size:12px;
    }

    .song-actions{
        flex-direction:column;
    }

    .play-small{
        padding:8px 10px;
        font-size:11px;
    }

    .unfav-btn{
        width:36px;
        height:36px;
        font-size:16px;
    }

    .player{
        left:0;
        bottom:64px;
        height:70px;
        grid-template-columns:1fr auto;
        padding:8px 16px;
    }

    .volume{
        display:none;
    }

    .buttons button{
        display:none;
    }

    .buttons .play{
        display:flex;
        justify-content:center;
        align-items:center;
        width:44px;
        height:44px;
    }

    .player-cover{
        width:44px;
        height:44px;
        border-radius:10px;
    }

    .player-details h4{
        font-size:13px;
    }

    .player-details p{
        font-size:11px;
    }

    .mobile-nav{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:64px;
        background:var(--card);
        border-top:1px solid var(--border);
        justify-content:space-around;
        align-items:center;
        z-index:9999;
    }

    .mobile-nav-item{
        display:flex;
        flex-direction:column;
        align-items:center;
        text-decoration:none;
        color:var(--muted);
        font-size:10px;
        gap:4px;
    }

    .mobile-nav-item.active{
        color:var(--purple);
    }

    .mobile-nav-icon{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

    <div class="logo">
        Audio<span>phile</span>
    </div>

    <nav class="menu">
        <a href="home.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="songs.html"><i class="fa-solid fa-music"></i> Songs</a>
        <a href="albums.html"><i class="fa-solid fa-record-vinyl"></i> Albums</a>
        <a href="artists.html"><i class="fa-solid fa-microphone"></i> Artists</a>
        <a href="favorites.html" class="active"><i class="fa-solid fa-heart"></i> Favorites</a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>

</aside>

<!-- MAIN -->

<main class="main">

    <div class="topbar">

        <div class="search-box">
            <input id="searchInput" type="text"
            placeholder="Search favorite songs...">
        </div>

        <div class="profile">
            A
        </div>

    </div>

    <section class="page-title">
        <small>YOUR LIKED SONGS</small>
        <h1>❤️ Favorites</h1>
        <p>Your saved favorite songs will appear here.</p>
    </section>

    <div class="song-list" id="favoriteList"></div>

</main>

</div>

<!-- PLAYER -->

<div class="player">

    <div class="player-info" onclick="openPopup()">

        <div class="player-cover" id="playerCover">
            ♪
        </div>

        <div class="player-details">
            <h4 id="playerTitle">Select a song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>

    </div>

    <div class="controls">

        <div class="buttons">

            <button onclick="prevSong()">⏮</button>

            <button class="play"
            id="playBtn"
            onclick="togglePlay()">▶</button>

            <button onclick="nextSong()">⏭</button>

        </div>

    </div>

    <div class="volume">
        <input type="range"
        min="0"
        max="1"
        step="0.01"
        value="1"
        oninput="audio.volume=this.value">
    </div>

</div>

<!-- MOBILE NAV -->

<nav class="mobile-nav">

    <a href="home.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-house"></i>
        </span>
        <span>Home</span>
    </a>

    <a href="songs.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-music"></i>
        </span>
        <span>Songs</span>
    </a>

    <a href="albums.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-compact-disc"></i>
        </span>
        <span>Albums</span>
    </a>

    <a href="artists.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-user-astronaut"></i>
        </span>
        <span>Artists</span>
    </a>

    <a href="favorites.html"
    class="mobile-nav-item active">

        <span class="mobile-nav-icon">
            <i class="fa-solid fa-heart"></i>
        </span>

        <span>Favorites</span>

    </a>

    <a href="settings.html" class="mobile-nav-item">
        <span class="mobile-nav-icon">
            <i class="fa-solid fa-gear"></i>
        </span>
        <span>Settings</span>
    </a>

</nav>

<!-- POPUP -->

<div class="music-popup" id="musicPopup">

    <div class="popup-card">

        <div class="popup-cover"
        id="popupCover"></div>

        <div class="popup-title"
        id="popupTitle">
            Select Song
        </div>

        <div class="popup-artist"
        id="popupArtist">
            Audiophile
        </div>

        <div class="popup-controls">

            <button onclick="prevSong()">
                ⏮
            </button>

            <button class="popup-play"
            id="popupPlayBtn"
            onclick="togglePlay()">
                ▶
            </button>

            <button onclick="nextSong()">
                ⏭
            </button>

        </div>

    </div>

</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>

let audio = document.getElementById("audio");

let favoriteList =
document.getElementById("favoriteList");

let searchInput =
document.getElementById("searchInput");

let currentSongIndex =
parseInt(localStorage.getItem("currentSongIndex")) || 0;

let isPlaying =
localStorage.getItem("globalIsPlaying") === "true";

/* RESTORE SONG */

let savedSrc =
localStorage.getItem("globalAudioSrc");

let savedTime =
parseFloat(localStorage.getItem("globalAudioTime")) || 0;

if(savedSrc){

    audio.src = savedSrc;

    audio.addEventListener("loadedmetadata",()=>{

        if(savedTime < audio.duration){

            audio.currentTime = savedTime;
        }
    });

    if(isPlaying){

        setTimeout(()=>{

            audio.play().catch(()=>{});

        },300);
    }
}

/* HELPERS */

function getSongs(){

    return typeof songs !== "undefined"
    ? songs : [];
}

function getFavorites(){

    return JSON.parse(
        localStorage.getItem("audiophile_favorites")
    ) || [];
}

function saveFavorites(favs){

    localStorage.setItem(
        "audiophile_favorites",
        JSON.stringify(favs)
    );
}

function getCurrentlyRenderedFavs(){

    let allSongs = getSongs();

    let value =
    searchInput.value.toLowerCase();

    return getFavorites()

    .map(index=>({

        song:allSongs[index],
        index:index

    }))

    .filter(item=>item.song)

    .filter(item=>

        item.song.title.toLowerCase()
        .includes(value)

        ||

        (item.song.artist || "")
        .toLowerCase()
        .includes(value)
    );
}

/* RENDER */

function renderFavorites(){

    let favSongs =
    getCurrentlyRenderedFavs();

    if(favSongs.length === 0){

        favoriteList.innerHTML = `
        <div class="song-row">
            No favorite songs
        </div>
        `;

        return;
    }

    favoriteList.innerHTML =
    favSongs.map((item,displayIndex)=>`

    <div class="song-row"
    onclick="playSong(${item.index},event)">

        <div class="song-no">
            ${displayIndex + 1}
        </div>

        <div class="song-cover">

            ${item.song.cover

            ? `<img src="${item.song.cover}">`

            : item.song.title.charAt(0)}

        </div>

        <div class="song-title">

            <h3>
                ${item.song.title}
            </h3>

            <p>
                ${item.song.album || "Single"}
            </p>

        </div>

        <div class="song-artist">
            ${item.song.artist || ""}
        </div>

        <div class="song-actions">

            <button class="play-small"
            onclick="playSong(${item.index},event)">

                ▶ Play

            </button>

            <button class="unfav-btn"
            onclick="removeFav(${item.index},event)">

                ${true ? "★" : "☆"}

            </button>

        </div>

    </div>

    `).join("");
}

/* REMOVE */

function removeFav(index,event){

    event.stopPropagation();

    let favs =
    getFavorites().filter(i=>i!==index);

    saveFavorites(favs);

    renderFavorites();
}

/* PLAY */

function playSong(index,event){

    if(event) event.stopPropagation();

    let allSongs = getSongs();

    if(!allSongs[index]) return;

    currentSongIndex = index;

    let song =
    allSongs[currentSongIndex];

    audio.src = song.audio;

    audio.play();

    isPlaying = true;

    localStorage.setItem(
        "globalAudioSrc",
        audio.src
    );

    localStorage.setItem(
        "currentSongIndex",
        currentSongIndex
    );

    localStorage.setItem(
        "globalIsPlaying",
        "true"
    );

    updateUI(song);
}

/* UPDATE UI */

function updateUI(song){

    document.getElementById("playBtn")
    .innerText = isPlaying ? "⏸" : "▶";

    document.getElementById("popupPlayBtn")
    .innerText = isPlaying ? "⏸" : "▶";

    document.getElementById("playerTitle")
    .innerText = song.title;

    document.getElementById("playerArtist")
    .innerText = song.artist || "Unknown";

    document.getElementById("popupTitle")
    .innerText = song.title;

    document.getElementById("popupArtist")
    .innerText = song.artist || "Unknown";

    if(song.cover){

        document.getElementById("playerCover")
        .innerHTML =
        `<img src="${song.cover}">`;

        document.getElementById("popupCover")
        .innerHTML =
        `<img src="${song.cover}">`;
    }
}

/* TOGGLE */

function togglePlay(){

    if(!audio.src){

        playSong(currentSongIndex);

        return;
    }

    if(isPlaying){

        audio.pause();

        isPlaying = false;

    }else{

        audio.play();

        isPlaying = true;
    }

    localStorage.setItem(
        "globalIsPlaying",
        isPlaying
    );

    document.getElementById("playBtn")
    .innerText = isPlaying ? "⏸" : "▶";

    document.getElementById("popupPlayBtn")
    .innerText = isPlaying ? "⏸" : "▶";
}

/* NEXT */

function nextSong(){

    let favs =
    getCurrentlyRenderedFavs();

    if(favs.length === 0) return;

    let i =
    favs.findIndex(
        f=>f.index===currentSongIndex
    );

    playSong(
        favs[(i+1)%favs.length].index
    );
}

/* PREV */

function prevSong(){

    let favs =
    getCurrentlyRenderedFavs();

    if(favs.length === 0) return;

    let i =
    favs.findIndex(
        f=>f.index===currentSongIndex
    );

    playSong(
        favs[(i-1+favs.length)%favs.length].index
    );
}

/* SAVE TIME */

audio.addEventListener("timeupdate",()=>{

    localStorage.setItem(
        "globalAudioTime",
        audio.currentTime
    );
});

/* POPUP */

let popup =
document.getElementById("musicPopup");

function openPopup(){

    if(!audio.src) return;

    popup.classList.add("show");
}

popup.addEventListener("click",(e)=>{

    if(e.target.id==="musicPopup"){

        popup.classList.remove("show");
    }
});

/* SEARCH */

searchInput.addEventListener(
    "input",
    renderFavorites
);

/* INIT */

renderFavorites();

let allSongs = getSongs();

if(allSongs[currentSongIndex]){

    updateUI(
        allSongs[currentSongIndex]
    );
}

</script>

</body>
</html>
