<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

/* THEME */
body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --border:rgba(0,0,0,0.08);
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

/* APP LAYOUT */
.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

/* SIDEBAR (FIXED MENU BAR) */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    -webkit-background-clip:text;
    color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    text-decoration:none;
    color:var(--muted);
    padding:14px 16px;
    border-radius:14px;
    font-weight:700;
}

.menu a:hover{
    background:rgba(99,102,241,0.1);
    color:var(--text);
}

/* MAIN */
.main{
    overflow-y:auto;
    padding:24px 28px 140px;
}

/* TOP */
.topbar{
    display:flex;
    gap:16px;
    align-items:center;
}

.search-box{
    flex:1;
}

.search-box input{
    width:100%;
    padding:14px 20px;
    border-radius:30px;
    border:1px solid var(--border);
    outline:none;
}

/* SONG LIST */
.song-list{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    padding:14px;
    border-radius:18px;
    display:grid;
    grid-template-columns:50px 60px 1fr 120px;
    align-items:center;
    cursor:pointer;
}

.song-cover{
    width:55px;
    height:55px;
    border-radius:12px;
    background:var(--card2);
    overflow:hidden;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PLAYER */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:110px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 20px;
    z-index:10;
}

/* POPUP */
.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
}

.music-card-overlay.show{
    display:flex;
}

.music-card{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    width:320px;
}

@media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .player{left:0;}
}

</style>
</head>

<body>

<div class="app">

    <!-- SIDEBAR FIXED -->
    <aside class="sidebar">
        <div class="logo" onclick="location.href='home.html'">
            Audio<span>phile</span>
        </div>

        <div class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html">Favorites</a>
            <a href="settings.html">Settings</a>
        </div>
    </aside>

    <main class="main">

        <div class="topbar">
            <div class="search-box">
                <input id="searchInput" placeholder="Search songs...">
            </div>
        </div>

        <div class="song-list" id="favoriteList"></div>

    </main>
</div>

<!-- PLAYER -->
<div class="player">
    <div id="nowPlaying">Select Song</div>
    <button onclick="togglePlay()">Play</button>
</div>

<!-- POPUP -->
<div class="music-card-overlay" id="musicCardOverlay">
    <div class="music-card">
        <h3 id="popupTitle">Song</h3>
    </div>
</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>

/* ===== THEME FIX ===== */
function applyTheme(){
    let t = localStorage.getItem("audiophile_theme") || "white";
    document.body.classList.remove("theme-white","theme-musicred");
    document.body.classList.add("theme-"+t);
}
applyTheme();

window.addEventListener("storage",(e)=>{
    if(e.key==="audiophile_theme") applyTheme();
});

/* ===== SONG FIX ===== */
let audio = document.getElementById("audio");
let favoriteList = document.getElementById("favoriteList");

function getSongs(){
    return window.songs || [];
}

function getFavs(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

function render(){
    let songs = getSongs();
    let favs = getFavs();

    favoriteList.innerHTML = favs.map(i=>{
        let s = songs[i];
        if(!s) return "";
        return `
        <div class="song-row" onclick="playSong(${i})">
            <div>${i+1}</div>
            <div class="song-cover">
                <img src="${s.cover || ''}">
            </div>
            <div>${s.title}</div>
            <div>${s.artist}</div>
        </div>`;
    }).join("");
}

let current = 0;

function playSong(i){
    let s = getSongs()[i];
    if(!s) return;

    current = i;
    audio.src = s.audio;
    audio.play();

    document.getElementById("nowPlaying").innerText = s.title;
}

function togglePlay(){
    if(audio.paused) audio.play();
    else audio.pause();
}

render();

</script>

</body>
</html>
