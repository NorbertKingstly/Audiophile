<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audiophile - Artists</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        :root { --bg: #f5f5f7; --card: #ffffff; --text: #111827; --muted: #64748b; --border: rgba(0,0,0,0.08); }

        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .app { display: grid; grid-template-columns: 250px 1fr; height: 100vh; }

        /* Sidebar Styling */
        .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 20px; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 30px; }
        .menu a { display: block; padding: 12px; color: var(--muted); text-decoration: none; font-weight: 600; }
        .menu a.active { color: var(--text); background: #eee; border-radius: 10px; }

        /* Main Content */
        .main { padding: 20px; overflow-y: auto; height: 100vh; }
        .artist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; }
        .card img { width: 100%; border-radius: 50%; aspect-ratio: 1; object-fit: cover; }

        /* Mobile Responsive (Phone view) */
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; } /* Hide sidebar on mobile */
            .main { padding-bottom: 100px; }
            .artist-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <div class="logo">Audiophile</div>
        <div class="menu">
            <a href="home.html">Home</a>
            <a href="artists.html" class="active">Artists</a>
        </div>
    </div>
    
    <main class="main">
        <h2>Artists</h2>
        <div class="artist-grid" id="artistGrid">
            </div>
    </main>
</div>

<script>
    // Artist data and rendering logic
    const artists = [
        { name: "Artist 1", img: "https://via.placeholder.com/150" },
        { name: "Artist 2", img: "https://via.placeholder.com/150" }
    ];

    function renderArtists(data) {
        const grid = document.getElementById('artistGrid');
        grid.innerHTML = data.map(artist => `
            <div class="card">
                <img src="${artist.img}" alt="${artist.name}">
                <h3>${artist.name}</h3>
            </div>
        `).join('');
    }

    renderArtists(artists);
</script>
</body>
</html>
