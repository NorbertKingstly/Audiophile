<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --purple:#6366f1;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,#111827,#6366f1,#22d3ee);
    -webkit-background-clip:text;
    color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    text-decoration:none;
    color:var(--muted);
    padding:15px 18px;
    border-radius:18px;
    font-weight:700;
}

.menu a.active,
.menu a:hover{
    background:rgba(99,102,241,0.12);
    color:var(--text);
}

/* MAIN */
.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 170px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:16px 22px;
    border-radius:40px;
    border:1px solid var(--border);
}

.profile{
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(135deg,#111827,#6366f1);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-weight:900;
    cursor:pointer;
}

/* TITLE */
.page-title{
    background:rgba(99,102,241,0.08);
    padding:28px;
    border-radius:28px;
    margin-bottom:20px;
}

/* SONG LIST */
.song-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.song-row{
    display:grid;
    grid-template-columns:55px 70px 1fr 1fr 120px;
    gap:14px;
    padding:14px;
    border-radius:18px;
    background:var(--card);
    border:1px solid var(--border);
    cursor:pointer;
}

.song-row:hover{
    border-color:var(--purple);
}

.song-cover{
    width:60px;
    height:60px;
    border-radius:14px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-actions button{
    border:none;
    padding:10px 12px;
    border-radius:12px;
    background:linear-gradient(90deg,#111827,#6366f1);
    color:white;
    cursor:pointer;
}

/* PLAYER */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:120px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    padding:16px 30px;
}

.player-info{
    display:flex;
    gap:14px;
    cursor:pointer;
}

.player-cover{
    width:60px;
    height:60px;
    border-radius:14px;
    overflow:hidden;
    background:var(--card2);
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* MOBILE NAV */
.mobile-nav{
    display:none;
}

@media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}

    .player{
        left:0;
        height:70px;
        grid-template-columns:1fr 1fr;
    }

    .mobile-nav{
        display:flex;
        position:fixed;
        bottom:0;
        left:0;
        right:0;
        height:64px;
        background:#fff;
        border-top:1px solid var(--border);
        justify-content:space-around;
        align-items:center;
        z-index:999;
    }

    .mobile-nav a{
        text-decoration:none;
        color:var(--muted);
        font-size:12px;
        text-align:center;
    }

    .mobile-nav a.active{
        color:var(--purple);
    }
}
</style>
</head>

<body>

<div class="app">

<aside class="sidebar">
    <div class="logo" onclick="location.href='home.html'">Audio<span>phile</span></div>
    <nav class="menu">
        <a href="home.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="albums.html">Albums</a>
        <a href="artists.html">Artists</a>
        <a href="favorites.html" class="active">Favorites</a>
        <a href="settings.html">Settings</a>
    </nav>
</aside>

<main class="main">

<div class="topbar">
    <div class="search-box">
        <input id="searchInput" placeholder="Search favorites...">
    </div>
    <div class="profile">F</div>
</div>

<div class="page-title">
    <h1>Favorites</h1>
</div>

<div class="song-list" id="favoriteList"></div>

</main>
</div>

<!-- PLAYER -->
<div class="player">
    <div class="player-info" onclick="openMusicCard()">
        <div class="player-cover" id="playerCover"></div>
        <div>
            <h4 id="playerTitle">Select song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>
    </div>

    <div>
        <button onclick="prevSong()">⏮</button>
        <button onclick="togglePlay()" id="playBtn">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" min="0" max="1" step="0.01" oninput="changeVolume(this.value)">
</div>

<!-- MOBILE NAV -->
<nav class="mobile-nav">
    <a href="home.html"><i class="fa fa-home"></i><br>Home</a>
    <a href="songs.html"><i class="fa fa-music"></i><br>Songs</a>
    <a href="albums.html"><i class="fa fa-compact-disc"></i><br>Albums</a>
    <a href="artists.html"><i class="fa fa-user"></i><br>Artists</a>
    <a href="favorites.html" class="active"><i class="fa fa-heart"></i><br>Fav</a>
    <a href="settings.html"><i class="fa fa-gear"></i><br>Settings</a>
</nav>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>
let audio=document.getElementById("audio");
let favoriteList=document.getElementById("favoriteList");
let searchInput=document.getElementById("searchInput");

let songsData = typeof songs!=="undefined"?songs:[];

function getFavorites(){
    return JSON.parse(localStorage.getItem("audiophile_favorites"))||[];
}

function render(){
    let favs=getFavorites();
    let q=searchInput.value.toLowerCase();

    let list=favs.map(i=>({song:songsData[i],index:i}))
    .filter(x=>x.song)
    .filter(x=>x.song.title.toLowerCase().includes(q));

    favoriteList.innerHTML=list.map(x=>`
        <div class="song-row" onclick="playSong(${x.index})">
            <div>${x.index+1}</div>
            <div class="song-cover">${x.song.cover?`<img src="${x.song.cover}">`:"🎵"}</div>
            <div>${x.song.title}</div>
            <div>${x.song.artist||""}</div>
            <div class="song-actions">
                <button onclick="event.stopPropagation();playSong(${x.index})">Play</button>
            </div>
        </div>
    `).join("")||"<p>No Favorites</p>";
}

function playSong(i){
    let s=songsData[i];
    audio.src=s.audio;
    audio.play();
    playerTitle.innerText=s.title;
    playerArtist.innerText=s.artist;
}

function togglePlay(){
    if(audio.paused) audio.play();
    else audio.pause();
}

function nextSong(){}
function prevSong(){}
function changeVolume(v){audio.volume=v;}

searchInput.addEventListener("input",render);

render();
</script>

</body>
</html>
