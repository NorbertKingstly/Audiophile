<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

/* sidebar */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
}

.menu a{
    display:block;
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-weight:700;
}

.menu a.active,
.menu a:hover{
    background:rgba(99,102,241,0.12);
    color:var(--text);
}

/* main */
.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 150px;
}

/* song row */
.song-row{
    display:grid;
    grid-template-columns:55px 70px 1.5fr 1fr 120px;
    gap:16px;
    align-items:center;
    background:var(--card);
    padding:14px;
    border-radius:20px;
    border:1px solid var(--border);
}

/* player */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    padding:16px 34px;
    z-index:99;
}

/* popup */
.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    justify-content:center;
    align-items:center;
}

.music-card-overlay.show{display:flex;}

/* MOBILE FIX */
@media(max-width:900px){

    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}

    .player{
        left:0;
        height:auto;
    }

    .song-row{
        grid-template-columns:40px 1fr;
    }

    .song-artist{display:none;}

    /* bottom nav */
    .bottom-nav{
        position:fixed;
        bottom:0;
        left:0;
        right:0;
        height:65px;
        background:#fff;
        border-top:1px solid var(--border);
        display:flex;
        justify-content:space-around;
        align-items:center;
        z-index:9999;
    }

    .bottom-nav a{
        text-decoration:none;
        color:var(--muted);
        font-size:12px;
        text-align:center;
    }

    .bottom-nav a.active{
        color:var(--purple);
        font-weight:800;
    }

    .main{padding-bottom:200px;}
}

</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='home.html'">
            Audio<span>phile</span>
        </div>

        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="main">

        <div class="topbar">
            <div class="search-box">
                <input id="searchInput" type="text" placeholder="Search favorite songs...">
            </div>

            <div class="profile" onclick="window.location.href='settings.html'">
                <span id="profileInitial">L</span>
            </div>
        </div>

        <section class="page-title">
            <small>YOUR LIKED SONGS</small>
            <h1>Favorites</h1>
            <p>Favorite songs inga show aagum.</p>
        </section>

        <div class="song-list" id="favoriteList"></div>

    </main>
</div>

<!-- PLAYER -->
<div class="player">
    <div class="player-info">
        <div class="player-cover" id="playerCover">A</div>
        <div>
            <h4 id="playerTitle">Select a song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>
    </div>

    <div class="controls">
        <div class="buttons">
            <button onclick="prevSong()">⏮</button>
            <button onclick="togglePlay()" id="playBtn">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>
    </div>
</div>

<!-- bottom nav (mobile only) -->
<div class="bottom-nav">
    <a href="home.html">🏠<br>Home</a>
    <a href="songs.html">🎵<br>Songs</a>
    <a href="favorites.html" class="active">❤️<br>Fav</a>
    <a href="settings.html">⚙️<br>Settings</a>
</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>
let audio = document.getElementById("audio");
let favoriteList = document.getElementById("favoriteList");
let searchInput = document.getElementById("searchInput"); // ✅ FIX

let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;
let isPlaying = localStorage.getItem("globalIsPlaying") === "true";

function getSongs(){
    return window.songs || [];
}

function getFavorites(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

function renderFavorites(){
    let songs = getSongs();
    let fav = getFavorites();

    let data = fav.map(i => ({song:songs[i], index:i})).filter(x => x.song);

    favoriteList.innerHTML = data.map((item,i)=>`
        <div class="song-row" onclick="playSong(${item.index})">
            <div>${i+1}</div>
            <div>${item.song.title[0]}</div>
            <div>${item.song.title}</div>
            <div>${item.song.artist}</div>
            <button onclick="event.stopPropagation();playSong(${item.index})">▶</button>
        </div>
    `).join("");
}

function playSong(i){
    let song = getSongs()[i];
    if(!song) return;

    currentSongIndex = i;
    audio.src = song.audio;
    audio.play();

    isPlaying = true;
    localStorage.setItem("globalAudioSrc",song.audio);
}

function togglePlay(){
    if(audio.paused){
        audio.play();
        isPlaying = true;
    }else{
        audio.pause();
        isPlaying = false;
    }
}

function nextSong(){
    let fav = getFavorites();
    let idx = fav.indexOf(currentSongIndex);
    let next = fav[(idx+1)%fav.length];
    playSong(next);
}

function prevSong(){
    let fav = getFavorites();
    let idx = fav.indexOf(currentSongIndex);
    let prev = fav[(idx-1+fav.length)%fav.length];
    playSong(prev);
}

searchInput.addEventListener("input",renderFavorites);

renderFavorites();
</script>

</body>
</html>
