<!-- FAVORITES PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --cyan:#e60023;
    --purple:#ff2d55;
    --pink:#ff7b92;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    height:100vh;
    height:100dvh;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
    height:100dvh;
}

/* SIDEBAR */

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
    overflow-y:auto;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
    transition:.3s;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(90deg,
    color-mix(in srgb,var(--cyan) 16%,transparent),
    color-mix(in srgb,var(--purple) 16%,transparent));
    color:var(--text);
}

/* MAIN */

.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 180px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:100%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    font-weight:900;
    overflow:hidden;
    cursor:pointer;
    flex-shrink:0;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

/* TITLE */

.page-title{
    background:linear-gradient(135deg,
    color-mix(in srgb,var(--cyan) 10%,white),
    color-mix(in srgb,var(--purple) 10%,white));
    border:1px solid var(--border);
    border-radius:34px;
    padding:34px;
    margin-bottom:24px;
}

.page-title small{
    color:var(--purple);
    font-weight:900;
}

.page-title h1{
    font-size:48px;
    margin:10px 0;
}

.page-title p{
    color:var(--muted);
}

/* SONG LIST */

.song-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:14px 18px;
    display:grid;
    grid-template-columns:50px 65px minmax(0,1fr) minmax(0,1fr) 120px;
    gap:14px;
    align-items:center;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.song-row:hover{
    border-color:var(--purple);
    transform:translateY(-3px);
}

.song-no{
    font-weight:800;
    color:var(--muted);
}

.song-cover{
    width:60px;
    height:60px;
    border-radius:16px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:900;
    font-size:22px;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-title,
.song-artist{
    min-width:0;
    overflow:hidden;
}

.song-title h3,
.song-title p,
.song-artist{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-title p,
.song-artist{
    color:var(--muted);
    font-size:13px;
}

.song-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
}

.song-actions button{
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:800;
}

.play-small{
    padding:10px 14px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.unfav-btn{
    width:42px;
    height:42px;
    background:var(--card2);
    color:#f59e0b;
    font-size:20px;
}

/* PLAYER */

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:128px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:999;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    min-width:0;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    overflow:hidden;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:900;
    flex-shrink:0;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.player-details{
    min-width:0;
}

.player-details h4,
.player-details p{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.player-details p{
    color:var(--muted);
    font-size:13px;
}

.controls{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    margin-bottom:8px;
}

.buttons button{
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:var(--card2);
    color:var(--text);
    font-size:16px;
}

.buttons .play{
    width:58px;
    height:58px;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    color:white;
}

.progress,
.card-progress{
    height:6px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.progress-fill,
.card-progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
}

.time,
.card-time{
    display:flex;
    justify-content:space-between;
    color:var(--muted);
    font-size:13px;
    margin-top:6px;
}

.volume{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:14px;
}

.volume input{
    accent-color:var(--purple);
}

/* POPUP */

.music-popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(14px);
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.music-popup.show{
    display:flex;
}

.popup-card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border-radius:30px;
    padding:24px;
}

.popup-cover{
    width:100%;
    height:320px;
    border-radius:24px;
    overflow:hidden;
    background:var(--card2);
    margin-bottom:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:90px;
    font-weight:900;
}

.popup-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.popup-title{
    text-align:center;
    font-size:26px;
    font-weight:800;
    margin-bottom:6px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.popup-artist{
    text-align:center;
    color:var(--muted);
    margin-bottom:24px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.popup-controls{
    display:flex;
    justify-content:center;
    gap:16px;
    margin:22px 0;
}

.popup-controls button{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    background:var(--card2);
    font-size:18px;
}

.popup-play{
    width:74px !important;
    height:74px !important;
    background:linear-gradient(90deg,var(--cyan),var(--purple)) !important;
    color:white;
}

.card-volume{
    margin-top:20px;
}

.card-volume span{
    color:var(--muted);
    font-weight:800;
    font-size:14px;
}

.card-volume input{
    width:100%;
    margin-top:10px;
}

/* MOBILE */

.mobile-nav{
    display:none;
}

@media(max-width:900px){

    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .main{
        padding:20px 16px 200px;
    }

    .page-title{
        padding:22px;
        border-radius:24px;
    }

    .page-title h1{
        font-size:34px;
    }

    .song-row{
        grid-template-columns:34px 56px minmax(0,1fr) auto;
        padding:12px;
        gap:10px;
    }

    .song-artist{
        display:none;
    }

    .song-cover{
        width:56px;
        height:56px;
        border-radius:12px;
    }

    .song-title h3{
        font-size:14px;
    }

    .song-title p{
        font-size:12px;
    }

    .song-actions{
        flex-direction:column;
    }

    .play-small{
        padding:8px 10px;
        font-size:11px;
    }

    .unfav-btn{
        width:36px;
        height:36px;
        font-size:16px;
    }

    .player{
        left:0;
        bottom:64px;
        height:70px;
        grid-template-columns:1fr auto;
        padding:8px 16px;
    }

    .volume,
    .progress,
    .time{
        display:none;
    }

    .buttons button{
        display:none;
    }

    .buttons .play{
        display:flex;
        justify-content:center;
        align-items:center;
        width:44px;
        height:44px;
    }

    .player-cover{
        width:44px;
        height:44px;
        border-radius:10px;
    }

    .player-details h4{
        font-size:13px;
    }

    .player-details p{
        font-size:11px;
    }

    .mobile-nav{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:64px;
        background:var(--card);
        border-top:1px solid var(--border);
        justify-content:space-around;
        align-items:center;
        z-index:9999;
    }

    .mobile-nav-item{
        display:flex;
        flex-direction:column;
        align-items:center;
        text-decoration:none;
        color:var(--muted);
        font-size:10px;
        gap:4px;
    }

    .mobile-nav-item.active{
        color:var(--purple);
    }

    .mobile-nav-icon{
        font-size:18px;
    }
}

</style>
</head>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>

let audio =
document.getElementById("audio");

let favoriteList =
document.getElementById("favoriteList");

let searchInput =
document.getElementById("searchInput");

let currentSongIndex =
parseInt(localStorage.getItem("currentSongIndex")) || 0;

let isPlaying =
localStorage.getItem("globalIsPlaying") === "true";

/* THEME */

function applySavedTheme(){

    let theme =
    localStorage.getItem("audiophile_theme")
    || "white";

    document.body.classList.remove(
        "theme-white",
        "theme-musicred"
    );

    document.body.classList.add(
        "theme-" + theme
    );
}

/* PROFILE */

function loadProfile(){

    let user =
    localStorage.getItem(
        "audiophile_currentUser"
    ) || "A";

    let image =
    localStorage.getItem(
        "audiophile_profileImage"
    ) || "";

    let initial =
    document.getElementById(
        "profileInitial"
    );

    let img =
    document.getElementById(
        "profileImage"
    );

    initial.innerText =
    user.charAt(0).toUpperCase();

    if(image){

        img.src = image;

        img.style.display = "block";

        initial.style.display = "none";

    }else{

        img.style.display = "none";

        initial.style.display = "block";
    }
}

/* RESTORE */

let savedSrc =
localStorage.getItem("globalAudioSrc");

let savedTime =
parseFloat(
    localStorage.getItem(
        "globalAudioTime"
    )
) || 0;

if(savedSrc){

    audio.src = savedSrc;

    audio.currentTime = savedTime;
}

/* HELPERS */

function getSongs(){

    return typeof songs !== "undefined"
    ? songs : [];
}

function getFavorites(){

    return JSON.parse(
        localStorage.getItem(
            "audiophile_favorites"
        )
    ) || [];
}

function saveFavorites(favs){

    localStorage.setItem(
        "audiophile_favorites",
        JSON.stringify(favs)
    );
}

function getCurrentlyRenderedFavs(){

    let allSongs = getSongs();

    let value =
    searchInput.value.toLowerCase();

    return getFavorites()

    .map(index=>({

        song:allSongs[index],
        index:index

    }))

    .filter(item=>item.song)

    .filter(item=>

        item.song.title.toLowerCase()
        .includes(value)

        ||

        (item.song.artist || "")
        .toLowerCase()
        .includes(value)
    );
}

/* RENDER */

function renderFavorites(){

    let favSongs =
    getCurrentlyRenderedFavs();

    if(favSongs.length === 0){

        favoriteList.innerHTML = `
        <div class="song-row">
            No favorite songs
        </div>
        `;

        return;
    }

    favoriteList.innerHTML =
    favSongs.map((item,displayIndex)=>`

    <div class="song-row"
    onclick="playSong(${item.index},event)">

        <div class="song-no">
            ${displayIndex + 1}
        </div>

        <div class="song-cover">

            ${item.song.cover

            ? `<img src="${item.song.cover}"
            onerror="this.style.display='none';
            this.parentElement.innerHTML='${item.song.title.charAt(0)}';">`

            : item.song.title.charAt(0)}

        </div>

        <div class="song-title">

            <h3>
                ${item.song.title}
            </h3>

            <p>
                ${item.song.album || "Single"}
            </p>

        </div>

        <div class="song-artist">
            ${item.song.artist || ""}
        </div>

        <div class="song-actions">

            <button class="play-small"
            onclick="playSong(${item.index},event)">

                ▶ Play

            </button>

            <button class="unfav-btn"
            onclick="removeFav(${item.index},event)">

                ★

            </button>

        </div>

    </div>

    `).join("");
}

/* REMOVE */

function removeFav(index,event){

    event.stopPropagation();

    let favs =
    getFavorites().filter(i=>i!==index);

    saveFavorites(favs);

    renderFavorites();
}

/* PLAY */

function playSong(index,event){

    if(event) event.stopPropagation();

    let allSongs = getSongs();

    if(!allSongs[index]) return;

    currentSongIndex = index;

    let song =
    allSongs[currentSongIndex];

    audio.src = song.audio;

    audio.play().then(()=>{

        isPlaying = true;

        savePlayerState();

        updateUI(song);

    }).catch(()=>{

        isPlaying = false;

        savePlayerState();

        updateUI(song);
    });
}

/* SAVE */

function savePlayerState(){

    localStorage.setItem(
        "currentSongIndex",
        currentSongIndex
    );

    localStorage.setItem(
        "globalAudioSrc",
        audio.src
    );

    localStorage.setItem(
        "globalAudioTime",
        audio.currentTime
    );

    localStorage.setItem(
        "globalIsPlaying",
        isPlaying
    );
}

/* UPDATE UI */

function updateUI(song){

    if(!song) return;

    document.getElementById("playBtn")
    .innerText = isPlaying ? "⏸" : "▶";

    document.getElementById("popupPlayBtn")
    .innerText = isPlaying ? "⏸" : "▶";

    document.getElementById("playerTitle")
    .innerText = song.title;

    document.getElementById("playerArtist")
    .innerText = song.artist || "Unknown";

    document.getElementById("popupTitle")
    .innerText = song.title;

    document.getElementById("popupArtist")
    .innerText =
    (song.artist || "Unknown")
    + " • " +
    (song.album || "Single");

    if(song.cover){

        document.getElementById("playerCover")
        .innerHTML =
        `<img src="${song.cover}">`;

        document.getElementById("popupCover")
        .innerHTML =
        `<img src="${song.cover}">`;

    }else{

        document.getElementById("playerCover")
        .innerText =
        song.title.charAt(0);

        document.getElementById("popupCover")
        .innerText =
        song.title.charAt(0);
    }
}

/* TOGGLE */

function togglePlay(){

    if(!audio.src){

        playSong(currentSongIndex);

        return;
    }

    if(isPlaying){

        audio.pause();

        isPlaying = false;

    }else{

        audio.play();

        isPlaying = true;
    }

    savePlayerState();

    updateUI(
        getSongs()[currentSongIndex]
    );
}

/* NEXT */

function nextSong(){

    let favs =
    getCurrentlyRenderedFavs();

    if(favs.length === 0) return;

    let i =
    favs.findIndex(
        f=>f.index===currentSongIndex
    );

    playSong(
        favs[(i+1)%favs.length].index
    );
}

/* PREV */

function prevSong(){

    let favs =
    getCurrentlyRenderedFavs();

    if(favs.length === 0) return;

    let i =
    favs.findIndex(
        f=>f.index===currentSongIndex
    );

    playSong(
        favs[(i-1+favs.length)%favs.length].index
    );
}

/* TIME */

function formatTime(seconds){

    if(isNaN(seconds))
    return "0:00";

    let min =
    Math.floor(seconds / 60);

    let sec =
    Math.floor(seconds % 60);

    if(sec < 10) sec = "0" + sec;

    return min + ":" + sec;
}

audio.addEventListener("timeupdate",()=>{

    localStorage.setItem(
        "globalAudioTime",
        audio.currentTime
    );

    let percent =
    (audio.currentTime /
    audio.duration) * 100;

    if(isNaN(percent))
    percent = 0;

    document.getElementById(
        "progressFill"
    ).style.width =
    percent + "%";

    document.getElementById(
        "cardProgressFill"
    ).style.width =
    percent + "%";

    document.getElementById(
        "currentTime"
    ).innerText =
    formatTime(audio.currentTime);

    document.getElementById(
        "durationTime"
    ).innerText =
    formatTime(audio.duration);

    document.getElementById(
        "cardCurrentTime"
    ).innerText =
    formatTime(audio.currentTime);

    document.getElementById(
        "cardDurationTime"
    ).innerText =
    formatTime(audio.duration);
});

audio.addEventListener("ended",()=>{

    nextSong();
});

/* PROGRESS */

function setProgress(event){

    if(!audio.duration) return;

    let width =
    event.currentTarget.clientWidth;

    let clickX =
    event.offsetX;

    audio.currentTime =
    (clickX / width)
    * audio.duration;

    savePlayerState();
}

function setCardProgress(event){

    if(!audio.duration) return;

    let width =
    event.currentTarget.clientWidth;

    let clickX =
    event.offsetX;

    audio.currentTime =
    (clickX / width)
    * audio.duration;

    savePlayerState();
}

/* VOLUME */

function changeVolume(value){

    audio.volume = value;

    localStorage.setItem(
        "globalVolume",
        value
    );

    document.getElementById(
        "globalVolumeSlider"
    ).value = value;

    document.getElementById(
        "popupVolumeSlider"
    ).value = value;
}

/* POPUP */

let popup =
document.getElementById("musicPopup");

function openPopup(){

    if(!audio.src) return;

    popup.classList.add("show");
}

popup.addEventListener("click",(e)=>{

    if(e.target.id==="musicPopup"){

        popup.classList.remove("show");
    }
});

/* SEARCH */

searchInput.addEventListener(
    "input",
    renderFavorites
);

/* INIT */

applySavedTheme();

loadProfile();

renderFavorites();

let allSongs = getSongs();

let savedVolume =
localStorage.getItem(
    "globalVolume"
) || 0.8;

changeVolume(savedVolume);

if(allSongs[currentSongIndex]){

    updateUI(
        allSongs[currentSongIndex]
    );
}

if(savedSrc && isPlaying){

    setTimeout(()=>{

        audio.play().then(()=>{

            isPlaying = true;

            savePlayerState();

            updateUI(
                getSongs()[currentSongIndex]
            );

        }).catch(()=>{

            isPlaying = false;

            savePlayerState();

            updateUI(
                getSongs()[currentSongIndex]
            );
        });

    },300);
}

</script>
