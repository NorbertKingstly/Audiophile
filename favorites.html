<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --text:#111827;
    --muted:#64748b;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
}

/* layout */
.app{
    display:grid;
    grid-template-columns:250px 1fr;
    min-height:100vh;
}

/* sidebar */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:20px;
}

.logo{
    font-size:28px;
    font-weight:900;
    margin-bottom:20px;
}

.menu a{
    display:block;
    padding:12px;
    text-decoration:none;
    color:var(--muted);
    border-radius:10px;
}

.menu a.active{
    background:#eef2ff;
    color:var(--text);
}

/* main */
.main{
    padding:20px;
}

/* song */
.song-row{
    display:grid;
    grid-template-columns:50px 1fr auto;
    gap:10px;
    padding:12px;
    border:1px solid var(--border);
    border-radius:14px;
    margin-bottom:10px;
    align-items:center;
    background:white;
}

.song-cover{
    width:45px;height:45px;
    border-radius:10px;
    overflow:hidden;
    background:#eee;
}

.song-cover img{
    width:100%;height:100%;
    object-fit:cover;
}

.song-actions button{
    padding:8px 10px;
    border:none;
    border-radius:8px;
    background:#6366f1;
    color:white;
}

/* PLAYER FIX (mobile safe) */
.player{
    position:fixed;
    bottom:0;
    left:250px;
    right:0;
    background:white;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    z-index:999;
}

.player-info{
    display:flex;
    align-items:center;
    gap:10px;
}

.player-cover{
    width:45px;height:45px;
    border-radius:10px;
    background:#ddd;
    overflow:hidden;
}

.player-cover img{
    width:100%;height:100%;
    object-fit:cover;
}

/* MOBILE FIX */
@media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .player{left:0;}

    .song-row{
        grid-template-columns:45px 1fr;
    }

    .song-actions{
        grid-column:2;
        margin-top:5px;
    }
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Audio<span>phile</span></div>

    <div class="menu">
        <a href="home.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="albums.html">Albums</a>
        <a href="artists.html">Artists</a>
        <a href="favorites.html" class="active">Favorites</a>
        <a href="settings.html">Settings</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <h2>Favorites</h2>
    <div id="favoriteList"></div>
</div>

</div>

<!-- PLAYER -->
<div class="player">
    <div class="player-info">
        <div class="player-cover" id="playerCover">A</div>
        <div>
            <div id="playerTitle">Select song</div>
            <small id="playerArtist">-</small>
        </div>
    </div>

    <button onclick="togglePlay()" id="playBtn">▶</button>

    <audio id="audio"></audio>
</div>

<script src="songs.js"></script>

<script>
let audio=document.getElementById("audio");
let favList=document.getElementById("favoriteList");

let playBtn=document.getElementById("playBtn");
let pTitle=document.getElementById("playerTitle");
let pArtist=document.getElementById("playerArtist");
let pCover=document.getElementById("playerCover");

let songsData = typeof songs !== "undefined" ? songs : [];
let favs = JSON.parse(localStorage.getItem("audiophile_favorites")) || [];

let current=0;
let isPlaying=false;

/* RENDER */
function render(){
    if(favs.length===0){
        favList.innerHTML="<p>No favorites</p>";
        return;
    }

    favList.innerHTML=favs.map(i=>{
        let s=songsData[i];
        if(!s) return "";
        return `
        <div class="song-row">
            <div class="song-cover">
                ${s.cover?`<img src="${s.cover}">`:"A"}
            </div>

            <div>
                <b>${s.title}</b><br>
                <small>${s.artist}</small>
            </div>

            <div class="song-actions">
                <button onclick="play(${i})">Play</button>
            </div>
        </div>`;
    }).join("");
}

/* PLAY */
function play(i){
    current=i;
    let s=songsData[i];
    if(!s) return;

    audio.src=s.audio;
    audio.play();

    pTitle.innerText=s.title;
    pArtist.innerText=s.artist;
    pCover.innerHTML=s.cover?`<img src="${s.cover}">`:"A";

    playBtn.innerText="⏸";
    isPlaying=true;
}

/* TOGGLE */
function togglePlay(){
    if(!audio.src && songsData[current]){
        play(current);
        return;
    }

    if(audio.paused){
        audio.play();
        playBtn.innerText="⏸";
    }else{
        audio.pause();
        playBtn.innerText="▶";
    }
}

render();
</script>

</body>
</html>
