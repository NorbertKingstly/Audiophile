<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiophile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f5f5f7; --card:#ffffff; --card2:#eef0f4; --text:#111827; --muted:#64748b; --accent1:#111827; --accent2:#6366f1; --accent3:#22d3ee; --border:rgba(0,0,0,0.08); }
        body.theme-musicred { --bg:#ffffff; --card:#f7f7f8; --card2:#eeeeef; --text:#1d1d1f; --muted:#6e6e73; --accent1:#e60023; --accent2:#ff2d55; --accent3:#ff7b92; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        body { background:var(--bg); color:var(--text); }

        /* Fix: Ensure the row click doesn't trigger the album link */
        .song-row { display: grid; grid-template-columns: 50px 1fr 100px; align-items: center; padding: 15px; background: var(--card); border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
        
        /* Mobile Nav */
        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; background: var(--card); padding: 15px; justify-content: space-around; border-top: 1px solid var(--border); z-index: 1000; }
        @media(max-width:900px) { .mobile-nav { display: flex; } }
    </style>
</head>
<body>

    <div class="song-list">
        <div class="song-row" onclick="playMySong('song_url_here')">
            <span>1</span>
            <h3>Song Title</h3>
            <button onclick="event.stopPropagation(); console.log('Play clicked')">Play</button>
        </div>
    </div>

    <div class="mobile-nav">
        <a href="home.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="settings.html">Settings</a>
    </div>

    <script>
        // 1. Theme Logic
        function applyTheme() {
            const theme = localStorage.getItem("audiophile_theme") || "white";
            document.body.className = "theme-" + theme;
        }

        // 2. Play logic (Fixed: No auto-navigation)
        function playMySong(url) {
            const audio = document.getElementById("globalAudio");
            audio.src = url;
            audio.play();
            localStorage.setItem("globalAudioSrc", url);
            localStorage.setItem("globalIsPlaying", "true");
        }

        // 3. Initialize
        applyTheme();
    </script>
    <audio id="globalAudio"></audio>
</body>
</html>
