<!-- FIXED FAVORITES PAGE -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(90deg,rgba(99,102,241,0.12),rgba(34,211,238,0.12));
    color:var(--text);
}

.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 150px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:100%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:900;
    overflow:hidden;
    cursor:pointer;
    flex-shrink:0;
}

.page-title{
    background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(34,211,238,0.08));
    border:1px solid var(--border);
    border-radius:34px;
    padding:34px;
    margin-bottom:24px;
}

.page-title small{
    color:var(--cyan);
    font-weight:900;
    letter-spacing:1px;
}

.page-title h1{
    font-size:48px;
    margin:10px 0;
}

.page-title p{
    color:var(--muted);
}

.song-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:14px 18px;
    display:grid;
    grid-template-columns:55px 70px 1.5fr 1fr 120px;
    gap:16px;
    align-items:center;
    cursor:pointer;
    transition:0.25s ease;
}

.song-row:hover{
    transform:translateY(-3px);
    border-color:var(--purple);
}

.song-no{
    color:var(--muted);
    font-weight:900;
}

.song-cover{
    width:62px;
    height:62px;
    border-radius:16px;
    background:var(--card2);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--muted);
    font-weight:900;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

.song-title h3{
    font-size:18px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-title p,
.song-artist{
    color:var(--muted);
    font-size:14px;
}

.song-actions button{
    border:none;
    padding:10px 13px;
    border-radius:15px;
    font-weight:900;
    cursor:pointer;
    font-size:13px;
}

.play-small{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.empty{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:34px;
    color:var(--muted);
    text-align:center;
    font-weight:800;
}

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:99;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    background:var(--card2);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--muted);
    font-weight:900;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.controls{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:10px;
}

.buttons button{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    cursor:pointer;
}

.buttons .play{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.progress,
.card-progress{
    height:7px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.progress-fill,
.card-progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
}

.time,
.card-time{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
}

.volume{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:12px;
}

.volume input{
    width:130px;
}

/* MUSIC CARD */

.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(14px);
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.music-card-overlay.show{
    display:flex;
}

.music-card{
    width:100%;
    max-width:430px;
    background:var(--card);
    border-radius:34px;
    padding:24px;
}

.big-cover{
    width:100%;
    height:310px;
    border-radius:28px;
    background:var(--card2);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:22px;
}

.big-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.music-card h2{
    text-align:center;
    margin-bottom:8px;
}

.music-card p{
    text-align:center;
    color:var(--muted);
}

.card-buttons{
    display:flex;
    justify-content:center;
    gap:18px;
    margin:22px 0;
}

.card-buttons button{
    width:54px;
    height:54px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    cursor:pointer;
}

.big-play{
    width:70px !important;
    height:70px !important;
    background:linear-gradient(90deg,var(--cyan),var(--purple)) !important;
    color:white;
}

.card-volume{
    margin-top:20px;
}

.card-volume input{
    width:100%;
    margin-top:10px;
}

.mobile-nav{
    display:none;
}

@media(max-width:900px){

    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .main{
        padding:20px 16px 230px;
    }

    .song-row{
        grid-template-columns:40px 62px 1fr;
    }

    .song-artist{
        display:none;
    }

    .song-actions{
        grid-column:3;
    }

    .player{
        left:0;
        right:0;
        bottom:64px;
        height:78px;
        padding:10px 16px;
        grid-template-columns:1fr auto;
    }

    .player-cover{
        width:48px;
        height:48px;
        border-radius:12px;
    }

    .player-info h4{
        font-size:14px;
    }

    .player-info p{
        font-size:12px;
    }

    .buttons button{
        display:none;
    }

    .buttons .play{
        display:flex;
        justify-content:center;
        align-items:center;
        width:44px;
        height:44px;
    }

    .progress,
    .time,
    .volume{
        display:none;
    }

    .mobile-nav{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:64px;
        background:var(--card);
        border-top:1px solid var(--border);
        justify-content:space-around;
        align-items:center;
        z-index:1000;
    }

    .mobile-nav-item{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        text-decoration:none;
        color:var(--muted);
        font-size:10px;
        font-weight:700;
        flex:1;
        gap:3px;
    }

    .mobile-nav-item.active{
        color:var(--purple);
    }

}

</style>
</head>

<body>

<!-- KEEP YOUR EXISTING HTML BODY SAME -->

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>

let audio = document.getElementById("audio");
let favoriteList = document.getElementById("favoriteList");
let searchInput = document.getElementById("searchInput");

let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;
let isPlaying = localStorage.getItem("globalIsPlaying") === "true";

let savedSrc = localStorage.getItem("globalAudioSrc");
let savedTime = parseFloat(localStorage.getItem("globalAudioTime")) || 0;

if(savedSrc){
    audio.src = savedSrc;

    audio.addEventListener("loadedmetadata",function(){
        audio.currentTime = savedTime;
    });
}

function getSongs(){
    return typeof songs !== "undefined" ? songs : [];
}

function getFavorites(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

function getCurrentlyRenderedFavs(){

    let allSongs = getSongs();
    let value = searchInput.value.toLowerCase();

    return getFavorites()
    .map(index => ({
        song:allSongs[index],
        index:index
    }))
    .filter(item => item.song)
    .filter(item =>
        item.song.title.toLowerCase().includes(value) ||
        item.song.artist.toLowerCase().includes(value) ||
        item.song.album.toLowerCase().includes(value)
    );
}

function savePlayerState(){

    localStorage.setItem("currentSongIndex",currentSongIndex);
    localStorage.setItem("globalAudioSrc",audio.src);
    localStorage.setItem("globalAudioTime",audio.currentTime || 0);
    localStorage.setItem("globalIsPlaying",isPlaying);
}

function renderFavorites(){

    let favSongs = getCurrentlyRenderedFavs();

    if(favSongs.length === 0){

        favoriteList.innerHTML = `
        <div class="empty">
            No favorite songs found.
        </div>
        `;

        return;
    }

    favoriteList.innerHTML = favSongs.map((item,displayIndex)=>`

    <div class="song-row" onclick="playSong(${item.index},event)">

        <div class="song-no">${displayIndex + 1}</div>

        <div class="song-cover">

            ${
                item.song.cover
                ?

                `<img src="${item.song.cover}"
                onerror="this.remove();this.parentElement.innerHTML='${item.song.title.charAt(0)}';">`

                :

                item.song.title.charAt(0)
            }

        </div>

        <div class="song-title">
            <h3>${item.song.title}</h3>
            <p>${item.song.album}</p>
        </div>

        <div class="song-artist">
            ${item.song.artist}
        </div>

        <div class="song-actions">
            <button class="play-small"
            onclick="playSong(${item.index},event)">
            ▶ Play
            </button>
        </div>

    </div>

    `).join("");
}

function updatePlayerUI(song){

    if(!song) return;

    playBtn.innerText = isPlaying ? "⏸" : "▶";
    cardPlayBtn.innerText = isPlaying ? "⏸" : "▶";

    playerTitle.innerText = song.title;
    playerArtist.innerText = song.artist;

    cardSongTitle.innerText = song.title;
    cardSongArtist.innerText = song.artist + " • " + song.album;

    if(song.cover){

        playerCover.innerHTML = `
        <img src="${song.cover}"
        onerror="this.remove();this.parentElement.innerHTML='${song.title.charAt(0)}';">
        `;

        bigCover.innerHTML = `
        <img src="${song.cover}"
        onerror="this.remove();this.parentElement.innerHTML='${song.title.charAt(0)}';">
        `;
    }
    else{

        playerCover.innerText = song.title.charAt(0);
        bigCover.innerText = song.title.charAt(0);
    }
}

function playSong(index,event){

    if(event) event.stopPropagation();

    let allSongs = getSongs();

    if(!allSongs[index]) return;

    let song = allSongs[index];

    if(!song.audio){
        alert("Audio URL missing");
        return;
    }

    currentSongIndex = index;

    audio.src = song.audio;

    audio.play()
    .then(()=>{

        isPlaying = true;

        savePlayerState();
        updatePlayerUI(song);

    })
    .catch(()=>{

        isPlaying = false;

        savePlayerState();
        updatePlayerUI(song);

    });
}

function togglePlay(){

    if(!audio.src){

        playSong(currentSongIndex);
        return;
    }

    if(isPlaying){

        audio.pause();
        isPlaying = false;
    }
    else{

        audio.play()
        .then(()=>{

            isPlaying = true;

            savePlayerState();
            updatePlayerUI(getSongs()[currentSongIndex]);
        });

        return;
    }

    savePlayerState();
    updatePlayerUI(getSongs()[currentSongIndex]);
}

function nextSong(){

    let currentFavs = getCurrentlyRenderedFavs();

    if(currentFavs.length === 0) return;

    let currentMatchIndex = currentFavs.findIndex(
        item => item.index === currentSongIndex
    );

    let nextIndex =
    currentMatchIndex === -1
    ? 0
    : (currentMatchIndex + 1) % currentFavs.length;

    playSong(currentFavs[nextIndex].index);
}

function prevSong(){

    let currentFavs = getCurrentlyRenderedFavs();

    if(currentFavs.length === 0) return;

    let currentMatchIndex = currentFavs.findIndex(
        item => item.index === currentSongIndex
    );

    let prevIndex =
    currentMatchIndex === -1
    ? currentFavs.length - 1
    : (currentMatchIndex - 1 + currentFavs.length) % currentFavs.length;

    playSong(currentFavs[prevIndex].index);
}

function changeVolume(value){

    audio.volume = value;

    volumeRange.value = value;
    cardVolumeRange.value = value;

    localStorage.setItem("globalVolume",value);
}

function formatTime(seconds){

    if(isNaN(seconds)) return "0:00";

    let min = Math.floor(seconds / 60);
    let sec = Math.floor(seconds % 60);

    if(sec < 10) sec = "0" + sec;

    return min + ":" + sec;
}

audio.addEventListener("timeupdate",function(){

    localStorage.setItem(
        "globalAudioTime",
        audio.currentTime || 0
    );

    let percent =
    (audio.currentTime / audio.duration) * 100;

    if(isNaN(percent)) percent = 0;

    progressFill.style.width = percent + "%";
    cardProgressFill.style.width = percent + "%";

    currentTime.innerText = formatTime(audio.currentTime);
    durationTime.innerText = formatTime(audio.duration);

    cardCurrentTime.innerText = formatTime(audio.currentTime);
    cardDurationTime.innerText = formatTime(audio.duration);
});

audio.addEventListener("ended",function(){

    isPlaying = false;
    nextSong();
});

function setProgress(event){

    if(!audio.duration) return;

    let width = event.currentTarget.clientWidth;
    let clickX = event.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;
}

function setCardProgress(event){

    if(!audio.duration) return;

    let width = event.currentTarget.clientWidth;
    let clickX = event.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;
}

function openMusicCard(){

    if(!audio.src) return;

    musicCardOverlay.classList.add("show");
}

function closeMusicCard(){

    musicCardOverlay.classList.remove("show");
}

musicCardOverlay.addEventListener("click",function(e){

    if(e.target.id === "musicCardOverlay"){
        closeMusicCard();
    }
});

searchInput.addEventListener("input",function(){

    renderFavorites();
});

window.addEventListener("beforeunload",function(){

    savePlayerState();
});

renderFavorites();

let savedVolume =
localStorage.getItem("globalVolume") || 0.8;

changeVolume(savedVolume);

updatePlayerUI(getSongs()[currentSongIndex]);

if(savedSrc && isPlaying){

    setTimeout(function(){

        audio.play()
        .then(()=>{

            isPlaying = true;
            updatePlayerUI(getSongs()[currentSongIndex]);

        })
        .catch(()=>{

            isPlaying = false;
            updatePlayerUI(getSongs()[currentSongIndex]);
        });

    },300);
}

</script>

</body>
</html>
