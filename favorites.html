<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ===== YOUR CSS (UNCHANGED) ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
}

.menu{display:flex;flex-direction:column;gap:14px;}
.menu a{color:var(--muted);text-decoration:none;padding:15px 18px;border-radius:18px;font-size:16px;font-weight:700;}
.menu a.active,.menu a:hover{background:rgba(99,102,241,0.12);color:var(--text);}

.main{height:100vh;overflow-y:auto;padding:30px 34px 150px;}

.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:28px;}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
}

.profile{
    width:60px;height:60px;border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;justify-content:center;align-items:center;
    color:white;font-weight:900;
}

.page-title{background:rgba(99,102,241,0.08);border:1px solid var(--border);border-radius:34px;padding:34px;margin-bottom:24px;}

.song-list{display:flex;flex-direction:column;gap:12px;}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:14px 18px;
    display:grid;
    grid-template-columns:55px 70px 1.5fr 1fr 120px;
    gap:16px;
    align-items:center;
    cursor:pointer;
}

/* PLAYER */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    padding:16px 34px;
}

.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:none;
    justify-content:center;
    align-items:center;
}

.music-card-overlay.show{display:flex;}
</style>
</head>

<body>

<div class="app">

<aside class="sidebar">
<div class="logo">Audio<span>phile</span></div>
<nav class="menu">
<a href="home.html">Home</a>
<a href="songs.html">Songs</a>
<a href="albums.html">Albums</a>
<a href="artists.html">Artists</a>
<a href="favorites.html" class="active">Favorites</a>
<a href="settings.html">Settings</a>
</nav>
</aside>

<main class="main">

<div class="topbar">
<input id="searchInput" class="search-box" placeholder="Search favorite songs...">
<div class="profile">L</div>
</div>

<div class="page-title">
<h1>Favorites</h1>
<p>Your liked songs</p>
</div>

<div id="favoriteList" class="song-list"></div>

</main>
</div>

<!-- PLAYER -->
<div class="player">
<div class="player-info" onclick="openMusicCard()">
<div id="playerCover">A</div>
<div>
<h4 id="playerTitle">Select a song</h4>
<p id="playerArtist">Audiophile</p>
</div>
</div>

<div class="controls">
<button id="playBtn" onclick="togglePlay()">▶</button>
</div>

<div class="volume">
<input id="volumeRange" type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)">
<input id="cardVolumeRange" type="range" style="display:none">
</div>
</div>

<!-- POPUP -->
<div class="music-card-overlay" id="musicCardOverlay">
<div class="music-card">
<div id="bigCover">A</div>
<h2 id="cardSongTitle"></h2>
<p id="cardSongArtist"></p>
</div>
</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>
/* ===== FIX: ALL ELEMENTS DECLARED ===== */
const audio = document.getElementById("audio");
const favoriteList = document.getElementById("favoriteList");
const searchInput = document.getElementById("searchInput");

const playBtn = document.getElementById("playBtn");
const playerTitle = document.getElementById("playerTitle");
const playerArtist = document.getElementById("playerArtist");
const playerCover = document.getElementById("playerCover");

const cardSongTitle = document.getElementById("cardSongTitle");
const cardSongArtist = document.getElementById("cardSongArtist");
const bigCover = document.getElementById("bigCover");

const musicCardOverlay = document.getElementById("musicCardOverlay");
const volumeRange = document.getElementById("volumeRange");
const cardVolumeRange = document.getElementById("cardVolumeRange");

let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;
let isPlaying = localStorage.getItem("globalIsPlaying") === "true";

function getSongs(){
    return typeof songs !== "undefined" ? songs : [];
}

function getFavorites(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

function getFavSongs(){
    let all = getSongs();
    let favs = getFavorites();
    return favs.map(i => ({song:all[i], index:i})).filter(x => x.song);
}

/* ===== RENDER ===== */
function renderFavorites(){
    let value = searchInput.value.toLowerCase();
    let list = getFavSongs().filter(item =>
        item.song.title.toLowerCase().includes(value) ||
        (item.song.artist || "").toLowerCase().includes(value)
    );

    if(list.length === 0){
        favoriteList.innerHTML = `<div>No favorites found</div>`;
        return;
    }

    favoriteList.innerHTML = list.map((item, i) => `
        <div class="song-row" onclick="playSong(${item.index})">
            <div>${i+1}</div>
            <div>${item.song.title[0]}</div>
            <div>${item.song.title}</div>
            <div>${item.song.artist || ''}</div>
            <button onclick="event.stopPropagation();playSong(${item.index})">Play</button>
        </div>
    `).join("");
}

/* ===== PLAY ===== */
function playSong(index){
    let song = getSongs()[index];
    if(!song) return;

    currentSongIndex = index;
    audio.src = song.audio;

    audio.play();
    isPlaying = true;

    updateUI(song);
}

/* ===== UI ===== */
function updateUI(song){
    playBtn.innerText = isPlaying ? "⏸" : "▶";
    playerTitle.innerText = song.title;
    playerArtist.innerText = song.artist || "Unknown";

    cardSongTitle.innerText = song.title;
    cardSongArtist.innerText = song.artist || "";
}

/* ===== CONTROLS ===== */
function togglePlay(){
    if(isPlaying){
        audio.pause();
        isPlaying = false;
    }else{
        audio.play();
        isPlaying = true;
    }
}

function changeVolume(v){
    audio.volume = v;
}

/* ===== POPUP ===== */
function openMusicCard(){
    musicCardOverlay.classList.add("show");
}

/* ===== INIT ===== */
searchInput.addEventListener("input",renderFavorites);
renderFavorites();

let saved = localStorage.getItem("globalAudioSrc");
if(saved) audio.src = saved;
</script>

</body>
</html>
