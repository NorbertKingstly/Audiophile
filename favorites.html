<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#fff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --border:rgba(0,0,0,0.08);
    --cyan:#111827;
    --purple:#6366f1;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* APP */
.app{
    display:grid;
    grid-template-columns:250px 1fr;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:30px;
    font-weight:900;
    margin-bottom:30px;
    cursor:pointer;
}

.logo span{
    color:transparent;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    -webkit-background-clip:text;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu a{
    text-decoration:none;
    color:var(--muted);
    font-weight:700;
    padding:12px 14px;
    border-radius:14px;
}

.menu a:hover,
.menu a.active{
    background:rgba(99,102,241,0.12);
    color:var(--text);
}

/* MAIN */
.main{
    padding:24px;
}

/* TOPBAR */
.topbar{
    display:flex;
    gap:12px;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:14px 18px;
    border-radius:30px;
    border:1px solid var(--border);
    outline:none;
}

/* PROFILE ICON */
.profile{
    width:50px;
    height:50px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:900;
}

/* TITLE */
.page-title{
    background:#fff;
    border:1px solid var(--border);
    padding:24px;
    border-radius:20px;
    margin-bottom:20px;
}

.page-title h1{
    font-size:32px;
}

/* SONG LIST */
.song-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.song-row{
    display:grid;
    grid-template-columns:60px 60px 1fr 1fr auto;
    gap:10px;
    align-items:center;
    padding:12px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
}

.song-cover{
    width:55px;
    height:55px;
    border-radius:12px;
    background:var(--card2);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-title h3{
    font-size:16px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-artist{
    color:var(--muted);
    font-size:13px;
}

/* BUTTON */
.play-small{
    padding:8px 12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

/* EMPTY */
.empty{
    text-align:center;
    padding:30px;
    color:var(--muted);
    font-weight:700;
}

/* MOBILE NAV (HOME STYLE FIX) */
.mobile-nav{
    display:none;
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:65px;
    background:#fff;
    border-top:1px solid var(--border);
    justify-content:space-around;
    align-items:center;
}

.mobile-nav a{
    text-decoration:none;
    font-size:12px;
    color:var(--muted);
    font-weight:700;
}

.mobile-nav a.active{
    color:var(--text);
}

/* PLAYER FIX */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:90px;
    background:#fff;
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
}

/* RESPONSIVE FIX */
@media(max-width:900px){
    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .mobile-nav{
        display:flex;
    }

    .player{
        left:0;
    }

    .song-row{
        grid-template-columns:50px 1fr auto;
    }

    .song-artist{
        display:none;
    }
}
</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">Audio<span>phile</span></div>

        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="main">

        <div class="topbar">
            <div class="search-box">
                <input id="searchInput" placeholder="Search favorites...">
            </div>

            <div class="profile">
                A
            </div>
        </div>

        <div class="page-title">
            <h1>Favorites</h1>
        </div>

        <div class="song-list" id="favoriteList"></div>

    </main>

</div>

<!-- MOBILE NAV FIXED ICON STYLE -->
<nav class="mobile-nav">
    <a href="home.html">Home</a>
    <a href="songs.html">Songs</a>
    <a href="albums.html">Albums</a>
    <a href="artists.html">Artists</a>
    <a href="favorites.html" class="active">Favs</a>
</nav>

<script src="songs.js"></script>

<script>
let favoriteList = document.getElementById("favoriteList");
let searchInput = document.getElementById("searchInput");

function getSongs(){
    return typeof songs !== "undefined" ? songs : [];
}

function getFavorites(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

function renderFavorites(){

    let favs = getFavorites();
    let allSongs = getSongs();
    let value = searchInput.value.toLowerCase();

    let list = favs
    .map(i => ({song:allSongs[i], index:i}))
    .filter(x => x.song)
    .filter(x =>
        x.song.title.toLowerCase().includes(value) ||
        x.song.artist.toLowerCase().includes(value)
    );

    if(list.length === 0){
        favoriteList.innerHTML = `<div class="empty">No Favorites Found</div>`;
        return;
    }

    favoriteList.innerHTML = list.map((item,idx)=>`
        <div class="song-row">

            <div>${idx+1}</div>

            <div class="song-cover">
                ${item.song.cover 
                ? `<img src="${item.song.cover}">`
                : item.song.title[0]}
            </div>

            <div class="song-title">
                <h3>${item.song.title}</h3>
                <div class="song-artist">${item.song.artist}</div>
            </div>

            <button class="play-small" onclick="playSong(${item.index})">▶</button>

        </div>
    `).join("");
}

function playSong(i){
    let allSongs = getSongs();
    let audio = document.getElementById("audio");

    if(!audio){
        audio = document.createElement("audio");
        audio.id="audio";
        document.body.appendChild(audio);
    }

    audio.src = allSongs[i].audio;
    audio.play();
}

searchInput.addEventListener("input",renderFavorites);

renderFavorites();
</script>

</body>
</html>
