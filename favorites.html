<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --purple:#6366f1;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
}

.logo span{
    background:linear-gradient(90deg,#111827,#6366f1,#22d3ee);
    -webkit-background-clip:text;
    color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    text-decoration:none;
    color:var(--muted);
    padding:15px 18px;
    border-radius:18px;
    font-weight:700;
}

.menu a.active{
    background:rgba(99,102,241,0.12);
    color:var(--text);
}

.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 160px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:28px;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,#111827,#6366f1);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
}

.page-title{
    background:rgba(99,102,241,0.08);
    padding:34px;
    border-radius:34px;
    margin-bottom:24px;
}

.song-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    padding:14px 18px;
    border-radius:22px;
    display:grid;
    grid-template-columns:55px 70px 1fr 1fr 120px;
    gap:16px;
    align-items:center;
}

.song-cover{
    width:60px;
    height:60px;
    border-radius:14px;
    background:var(--card2);
    display:flex;
    align-items:center;
    justify-content:center;
}

.song-actions button{
    border:none;
    padding:10px 13px;
    border-radius:15px;
    font-weight:900;
    cursor:pointer;
}

.play-small{
    background:linear-gradient(90deg,#111827,#6366f1);
    color:white;
}

/* PLAYER */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:120px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    padding:16px 34px;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    background:var(--card2);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* MOBILE FIX */
@media(max-width:900px){

    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}

    .main{
        padding:20px 16px 200px;
    }

    .player{
        left:0;
        bottom:64px;
        height:70px;
        grid-template-columns:1fr 1fr;
        padding:8px 12px;
    }

    .song-artist{display:none;}
}

/* MOBILE NAV */
.mobile-nav{
    display:none;
}

@media(max-width:900px){
.mobile-nav{
    display:flex;
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:64px;
    background:var(--card);
    border-top:1px solid var(--border);
    justify-content:space-around;
    align-items:center;
    z-index:9999;
}

.mobile-nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:10px;
    color:var(--muted);
    text-decoration:none;
}

.mobile-nav-item i{
    font-size:18px;
}

.mobile-nav-item.active{
    color:var(--purple);
}
}
</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">Audio<span>phile</span></div>

        <div class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="settings.html">Settings</a>
        </div>
    </aside>

    <main class="main">

        <div class="topbar">
            <div class="search-box">
                <input id="searchInput" placeholder="Search favorites...">
            </div>
            <div class="profile">L</div>
        </div>

        <div class="page-title">
            <h1>Favorites</h1>
            <p>Your liked songs</p>
        </div>

        <div class="song-list" id="favoriteList"></div>

    </main>
</div>

<!-- PLAYER -->
<div class="player">
    <div class="player-cover">A</div>
    <div>
        <h4>Select song</h4>
        <p>Audiophile</p>
    </div>
</div>

<!-- MOBILE NAV -->
<nav class="mobile-nav">
    <a href="home.html" class="mobile-nav-item">
        <i class="fa fa-house"></i><span>Home</span>
    </a>
    <a href="songs.html" class="mobile-nav-item">
        <i class="fa fa-music"></i><span>Songs</span>
    </a>
    <a href="albums.html" class="mobile-nav-item">
        <i class="fa fa-compact-disc"></i><span>Albums</span>
    </a>
    <a href="artists.html" class="mobile-nav-item">
        <i class="fa fa-user"></i><span>Artists</span>
    </a>
    <a href="favorites.html" class="mobile-nav-item active">
        <i class="fa fa-heart"></i><span>Fav</span>
    </a>
    <a href="settings.html" class="mobile-nav-item">
        <i class="fa fa-gear"></i><span>Settings</span>
    </a>
</nav>

</body>
</html>
