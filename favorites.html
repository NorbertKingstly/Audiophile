<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites - Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

/* ================= THEME ================= */
:root{
    --bg:#f5f5f7;
    --card:#fff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --border:rgba(0,0,0,0.08);
    --accent:#6366f1;
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --border:rgba(0,0,0,0.08);
    --accent:#ff2d55;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

/* ================= APP ================= */
.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

/* sidebar */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:25px;
}

.logo{
    font-size:30px;
    font-weight:900;
    margin-bottom:25px;
}

.logo span{color:var(--accent);}

.menu a{
    display:block;
    padding:12px;
    margin:6px 0;
    text-decoration:none;
    color:var(--muted);
    border-radius:10px;
}

.menu a.active,
.menu a:hover{
    background:var(--card2);
    color:var(--text);
}

/* main */
.main{
    padding:20px;
    overflow-y:auto;
    padding-bottom:140px;
}

.top{
    display:flex;
    gap:10px;
    align-items:center;
}

.top input{
    flex:1;
    padding:12px 16px;
    border-radius:20px;
    border:1px solid var(--border);
    outline:none;
}

.profile{
    width:40px;
    height:40px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
}

/* title */
.title{
    margin:20px 0;
    padding:20px;
    background:var(--card);
    border-radius:15px;
    border:1px solid var(--border);
}

/* songs */
.song{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    margin-bottom:10px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    cursor:pointer;
}

.song img{
    width:50px;
    height:50px;
    border-radius:10px;
}

.song h4{font-size:14px;}
.song p{font-size:12px;color:var(--muted);}

/* ================= PLAYER ================= */
.player{
    position:fixed;
    bottom:0;
    left:250px;
    right:0;
    height:80px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
}

.controls button{
    background:var(--card2);
    border:none;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

.play{
    background:var(--accent);
    color:#fff;
}

/* ================= BOTTOM NAV (FIXED) ================= */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:70px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:999;
}

.bottom-nav a{
    text-decoration:none;
    color:var(--muted);
    font-size:12px;
    text-align:center;
}

.bottom-nav a.active{
    color:var(--accent);
    font-weight:700;
}

@media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .player{left:0;}
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Audio<span>phile</span></div>
    <div class="menu">
        <a href="home.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="albums.html">Albums</a>
        <a href="artists.html">Artists</a>
        <a class="active" href="favorites.html">Favorites</a>
        <a href="settings.html">Settings</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
    <input id="searchInput" placeholder="Search favorites...">
    <div class="profile">F</div>
</div>

<div class="title">
    <h2>Favorites</h2>
</div>

<div id="list"></div>

</div>
</div>

<!-- PLAYER -->
<div class="player">
    <div>
        <h4 id="title">Select song</h4>
        <p id="artist">---</p>
    </div>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button class="play" onclick="toggle()">▶</button>
        <button onclick="next()">⏭</button>
    </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <a href="home.html">🏠<br>Home</a>
    <a href="songs.html">🎵<br>Songs</a>
    <a href="albums.html">💿<br>Albums</a>
    <a href="artists.html">👤<br>Artists</a>
    <a class="active" href="favorites.html">❤️<br>Fav</a>
    <a href="settings.html">⚙️<br>Settings</a>
</div>

<audio id="audio"></audio>
<script src="songs.js"></script>

<script>

let audio=document.getElementById("audio");
let list=document.getElementById("list");

function getSongs(){return songs||[];}

function getFav(){
    return JSON.parse(localStorage.getItem("audiophile_favorites"))||[];
}

/* THEME FIX */
function applyTheme(){
    let t=localStorage.getItem("audiophile_theme")||"white";
    document.body.classList.add("theme-"+t);
}

/* RENDER */
function render(){
    let fav=getFav();
    let all=getSongs();

    if(fav.length==0){
        list.innerHTML="No favorites";
        return;
    }

    list.innerHTML=fav.map(i=>{
        let s=all[i];
        if(!s) return "";
        return `
        <div class="song" onclick="playSong(${i})">
            <img src="${s.cover||''}">
            <div>
                <h4>${s.title}</h4>
                <p>${s.artist}</p>
            </div>
        </div>`;
    }).join("");
}

/* PLAY FIX */
let current=0;

function playSong(i){
    let s=getSongs()[i];
    if(!s) return;

    current=i;
    audio.src=s.audio;
    audio.play();

    document.getElementById("title").innerText=s.title;
    document.getElementById("artist").innerText=s.artist;

    localStorage.setItem("globalAudioSrc",audio.src);
    localStorage.setItem("currentSongIndex",i);
}

/* CONTROLS */
function toggle(){
    if(audio.paused) audio.play();
    else audio.pause();
}

function next(){
    let all=getSongs();
    current=(current+1)%all.length;
    playSong(current);
}

function prev(){
    let all=getSongs();
    current=(current-1+all.length)%all.length;
    playSong(current);
}

/* SEARCH FIX */
document.getElementById("searchInput").addEventListener("input",function(e){
    let val=e.target.value.toLowerCase();
    let fav=getFav();
    let all=getSongs();

    list.innerHTML=fav
    .map(i=>({s:all[i],i}))
    .filter(x=>x.s && x.s.title.toLowerCase().includes(val))
    .map(x=>`
        <div class="song" onclick="playSong(${x.i})">
            <img src="${x.s.cover||''}">
            <div>
                <h4>${x.s.title}</h4>
                <p>${x.s.artist}</p>
            </div>
        </div>
    `).join("");
});

/* INIT */
applyTheme();
render();

</script>

</body>
</html>
