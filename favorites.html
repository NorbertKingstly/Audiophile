<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiophile - Favorites</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
        :root{--bg:#f5f5f7;--card:#ffffff;--text:#111827;--purple:#6366f1;--border:rgba(0,0,0,0.08);}
        body{background:var(--bg);color:var(--text);height:100vh;display:grid;grid-template-columns:250px 1fr;}
        .sidebar{background:var(--card);border-right:1px solid var(--border);padding:28px;}
        .main{padding:40px;overflow-y:auto;padding-bottom:150px;}
        .song-row{background:var(--card);border:1px solid var(--border);padding:15px;border-radius:20px;display:grid;grid-template-columns:50px 60px 1fr 100px 100px;align-items:center;margin-bottom:10px;gap:20px;}
        .star-btn{cursor:pointer;font-size:24px;background:none;border:none;color:gold;}
        .play-btn{padding:10px 20px;border-radius:15px;border:none;background:var(--purple);color:white;cursor:pointer;}
        .player{position:fixed;bottom:0;left:250px;right:0;background:white;padding:20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; z-index: 1000;}
    </style>
</head>
<body>

<aside class="sidebar">
    <div style="font-size:24px; font-weight:900; margin-bottom:30px;">Audio<span>phile</span></div>
    <nav><a href="home.html">Home</a><br><a href="favorites.html">Favorites</a></nav>
</aside>

<main class="main">
    <h1>Favorites</h1>
    <div id="favoriteList" style="margin-top:20px;"></div>
</main>

<div class="player">
    <div id="playerInfo">Playing from Favorites</div>
    <div class="controls">
        <button onclick="togglePlay()" id="playBtn">▶</button>
    </div>
</div>

<script src="songs.js"></script>
<script>
    // songs array load aagum varai wait panna setTimeout
    window.onload = function() {
        renderFavorites();
    };

    function renderFavorites() {
        if (typeof songs === 'undefined') {
            document.getElementById("favoriteList").innerHTML = "<p>Songs data not loaded.</p>";
            return;
        }

        let favorites = JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
        let list = document.getElementById("favoriteList");
        
        if(favorites.length === 0) {
            list.innerHTML = "<p>No favorites yet.</p>";
            return;
        }

        list.innerHTML = favorites.map(index => {
            let song = songs[index];
            let isFav = favorites.includes(index);
            return `
            <div class="song-row">
                <div>#</div>
                <div style="width:50px;height:50px;background:#eee;border-radius:10px;"></div>
                <div>${song ? song.title : 'Unknown'}</div>
                <button class="star-btn" onclick="toggleFavorite(${index})">
                    ${isFav ? "★" : "☆"}
                </button>
                <button class="play-btn" onclick="playSong(${index})">Play</button>
            </div>`;
        }).join("");
    }

    function toggleFavorite(index) {
        let favs = JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
        if(favs.includes(index)) {
            favs = favs.filter(i => i !== index);
        } else {
            favs.push(index);
        }
        localStorage.setItem("audiophile_favorites", JSON.stringify(favs));
        renderFavorites();
    }

    function playSong(index) {
        console.log("Playing:", songs[index].title);
        // Add your playback logic here
    }
</script>
</body>
</html>
