<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Audiophile - Favorites</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
/* CSS styles remain same as your original, just added star color */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
:root{--bg:#f5f5f7;--card:#ffffff;--card2:#eef0f4;--text:#111827;--muted:#64748b;--cyan:#111827;--purple:#6366f1;--pink:#22d3ee;--border:rgba(0,0,0,0.08);}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
.app{display:grid;grid-template-columns:250px 1fr;height:100vh;}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:28px 20px;}
.menu a{color:var(--muted);text-decoration:none;padding:15px;display:flex;align-items:center;gap:10px;font-weight:700;}
.menu a.active{color:var(--purple);}
.main{padding:30px;overflow-y:auto;}
.song-row{background:var(--card);border:1px solid var(--border);padding:14px;display:grid;grid-template-columns:50px 60px 1fr 100px;align-items:center;gap:15px;border-radius:18px;margin-bottom:10px;}
.star-btn{cursor:pointer;font-size:20px;color:#f59e0b;border:none;background:transparent;}
@media(max-width:900px){.app{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">Audio<span>phile</span></div>
        <nav class="menu">
            <a href="home.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="favorites.html" class="active"><i class="fa-solid fa-heart"></i> Favorites</a>
        </nav>
    </aside>

    <main class="main">
        <h1>Favorites</h1>
        <div class="song-list" id="favoriteList"></div>
    </main>
</div>

<script src="songs.js"></script>
<script>
function renderFavorites(){
    let favIndices = JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
    let allSongs = typeof songs !== "undefined" ? songs : [];
    let list = document.getElementById("favoriteList");

    if(favIndices.length === 0){
        list.innerHTML = "<p>No favorites yet!</p>";
        return;
    }

    list.innerHTML = favIndices.map(index => {
        let song = allSongs[index];
        if(!song) return "";
        // Indha area-la dhaan star logic iruku
        return `
            <div class="song-row">
                <div class="song-no">${index + 1}</div>
                <div>${song.title}</div>
                <div>${song.artist || "Unknown"}</div>
                <button class="star-btn" onclick="toggleFav(${index})">★</button>
            </div>
        `;
    }).join("");
}

function toggleFav(index){
    let favs = JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
    if(favs.includes(index)){
        favs = favs.filter(i => i !== index);
    } else {
        favs.push(index);
    }
    localStorage.setItem("audiophile_favorites", JSON.stringify(favs));
    renderFavorites();
}

renderFavorites();
</script>
</body>
</html>
