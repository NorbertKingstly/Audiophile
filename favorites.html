<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(90deg,rgba(99,102,241,0.12),rgba(34,211,238,0.12));
    color:var(--text);
}

.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 150px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{width:100%;}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:900;
    overflow:hidden;
    cursor:pointer;
    flex-shrink:0;
}

.page-title{
    background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(34,211,238,0.08));
    border:1px solid var(--border);
    border-radius:34px;
    padding:34px;
    margin-bottom:24px;
}

.page-title small{
    color:var(--cyan);
    font-weight:900;
    letter-spacing:1px;
}

.page-title h1{
    font-size:48px;
    margin:10px 0;
}

.page-title p{
    color:var(--muted);
}

.song-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:14px 18px;
    display:grid;
    grid-template-columns:55px 70px 1.5fr 1fr 120px;
    gap:16px;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.song-row:hover{
    transform:translateY(-3px);
    border-color:var(--purple);
}

.song-no{
    color:var(--muted);
    font-weight:900;
}

.song-cover{
    width:62px;
    height:62px;
    border-radius:16px;
    background:var(--card2);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--muted);
    font-weight:900;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

.song-title h3{
    font-size:18px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-title p,
.song-artist{
    color:var(--muted);
    font-size:14px;
}

.song-actions button{
    border:none;
    padding:10px 13px;
    border-radius:15px;
    font-weight:900;
    cursor:pointer;
    font-size:13px;
}

.play-small{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.empty{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:34px;
    color:var(--muted);
    text-align:center;
    font-weight:800;
}

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:99;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--muted);
    font-weight:900;
    overflow:hidden;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

.player-info h4{font-size:17px;}
.player-info p{color:var(--muted);font-size:14px;}

.controls{text-align:center;}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:10px;
}

.buttons button{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    font-size:16px;
    cursor:pointer;
}

.buttons .play{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.progress,
.card-progress{
    height:7px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.progress-fill,
.card-progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
}

.time,
.card-time{
    display:flex;
    justify-content:space-between;
    color:var(--muted);
    font-size:12px;
    margin-top:6px;
}

.volume{
    display:flex;
    align-items:center;
    gap:12px;
    justify-content:flex-end;
}

.volume h3{
    font-size:14px;
    color:var(--muted);
}

.volume input{width:130px;}

/* POPUP */

.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(14px);
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.music-card-overlay.show{
    display:flex;
}

.music-card{
    width:100%;
    max-width:430px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:34px;
    padding:24px;
    box-shadow:0 30px 80px rgba(0,0,0,0.25);
}

.big-cover{
    width:100%;
    height:310px;
    border-radius:28px;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--muted);
    font-size:90px;
    font-weight:900;
    overflow:hidden;
    margin-bottom:22px;
}

.big-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

.music-card h2{
    font-size:28px;
    margin-bottom:6px;
    text-align:center;
}

.music-card p{
    color:var(--muted);
    text-align:center;
    margin-bottom:20px;
}

.card-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    margin:22px 0;
}

.card-buttons button{
    width:54px;
    height:54px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    font-size:18px;
    cursor:pointer;
}

.card-buttons .big-play{
    width:70px;
    height:70px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
    font-size:24px;
}

.card-volume{
    margin-top:20px;
}

.card-volume span{
    color:var(--muted);
    font-weight:800;
    font-size:14px;
}

.card-volume input{
    width:100%;
    margin-top:10px;
}

@media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .main{padding:24px 18px 180px;}
    .song-row{grid-template-columns:40px 62px 1fr;}
    .song-artist{display:none;}
    .song-actions{grid-column:3;justify-content:flex-start;}
    .player{left:0;grid-template-columns:1fr;height:auto;}
    .volume{display:none;}
}
</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='home.html'">
            Audio<span>phile</span>
        </div>

        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="main">

        <div class="topbar">
            <div class="search-box">
                <input id="searchInput" type="text" placeholder="Search favorite songs...">
            </div>

            <div class="profile" onclick="window.location.href='settings.html'">
                <span id="profileInitial">L</span>
            </div>
        </div>

        <section class="page-title">
            <small>YOUR LIKED SONGS</small>
            <h1>Favorites</h1>
            <p>Favorite songs inga show aagum. Song click panna play aagum.</p>
        </section>

        <div class="song-list" id="favoriteList"></div>

    </main>

</div>

<div class="player">

    <div class="player-info" onclick="openMusicCard()">
        <div class="player-cover" id="playerCover">A</div>

        <div>
            <h4 id="playerTitle">Select a song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>
    </div>

    <div class="controls">
        <div class="buttons">
            <button onclick="prevSong()">⏮</button>
            <button class="play" id="playBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>

        <div class="progress" onclick="setProgress(event)">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
    </div>

    <div class="volume">
        <h3>Volume</h3>
        <input id="volumeRange" type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)">
    </div>

</div>

<div class="music-card-overlay" id="musicCardOverlay">

    <div class="music-card">

        <div class="big-cover" id="bigCover">A</div>

        <h2 id="cardSongTitle">Select a song</h2>
        <p id="cardSongArtist">Audiophile</p>

        <div class="card-buttons">
            <button onclick="prevSong()">⏮</button>
            <button class="big-play" id="cardPlayBtn" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>

        <div class="card-progress" onclick="setCardProgress(event)">
            <div class="card-progress-fill" id="cardProgressFill"></div>
        </div>

        <div class="card-time">
            <span id="cardCurrentTime">0:00</span>
            <span id="cardDurationTime">0:00</span>
        </div>

        <div class="card-volume">
            <span>Volume</span>
            <input id="cardVolumeRange" type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)">
        </div>

    </div>

</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>
let audio = document.getElementById("audio");
let favoriteList = document.getElementById("favoriteList");
let searchInput = document.getElementById("searchInput");

let playBtn = document.getElementById("playBtn");
let cardPlayBtn = document.getElementById("cardPlayBtn");

let playerTitle = document.getElementById("playerTitle");
let playerArtist = document.getElementById("playerArtist");

let cardSongTitle = document.getElementById("cardSongTitle");
let cardSongArtist = document.getElementById("cardSongArtist");

let playerCover = document.getElementById("playerCover");
let bigCover = document.getElementById("bigCover");

let progressFill = document.getElementById("progressFill");
let cardProgressFill = document.getElementById("cardProgressFill");

let currentTime = document.getElementById("currentTime");
let durationTime = document.getElementById("durationTime");

let cardCurrentTime = document.getElementById("cardCurrentTime");
let cardDurationTime = document.getElementById("cardDurationTime");

let volumeRange = document.getElementById("volumeRange");
let cardVolumeRange = document.getElementById("cardVolumeRange");

let musicCardOverlay = document.getElementById("musicCardOverlay");

let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;
let isPlaying = localStorage.getItem("globalIsPlaying") === "true";

let savedSrc = localStorage.getItem("globalAudioSrc");
let savedTime = parseFloat(localStorage.getItem("globalAudioTime")) || 0;

if(savedSrc){
    audio.src = savedSrc;
    audio.currentTime = savedTime;
}

function getSongs(){
    return typeof songs !== "undefined" && Array.isArray(songs) ? songs : [];
}

function getFavorites(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

function getCurrentlyRenderedFavs(){
    let allSongs = getSongs();
    let value = searchInput.value.toLowerCase();

    return getFavorites()
    .map(index => ({song:allSongs[index], index:index}))
    .filter(item => item.song)
    .filter(item =>
        item.song.title.toLowerCase().includes(value) ||
        item.song.artist.toLowerCase().includes(value) ||
        item.song.album.toLowerCase().includes(value)
    );
}

function savePlayerState(){
    localStorage.setItem("currentSongIndex",currentSongIndex);
    localStorage.setItem("globalAudioSrc",audio.src);
    localStorage.setItem("globalAudioTime",audio.currentTime || 0);
    localStorage.setItem("globalIsPlaying",isPlaying ? "true" : "false");
}

function renderFavorites(filteredSongs = null){
    let favSongs = filteredSongs ? filteredSongs : getCurrentlyRenderedFavs();

    if(favSongs.length === 0){
        favoriteList.innerHTML =
        `<div class="empty">No favorite songs found.</div>`;
        return;
    }

    favoriteList.innerHTML =
    favSongs.map((item,displayIndex)=>`
        <div class="song-row" onclick="playSong(${item.index}, event)">

            <div class="song-no">${displayIndex + 1}</div>

            <div class="song-cover">
                ${
                    item.song.cover
                    ? `<img src="${item.song.cover}" onerror="this.style.display='none';this.parentElement.innerHTML='${item.song.title.charAt(0)}';">`
                    : item.song.title.charAt(0)
                }
            </div>

            <div class="song-title">
                <h3>${item.song.title}</h3>
                <p>${item.song.album}</p>
            </div>

            <div class="song-artist">${item.song.artist}</div>

            <div class="song-actions">
                <button class="play-small" onclick="playSong(${item.index}, event)">
                    ▶ Play
                </button>
            </div>

        </div>
    `).join("");
}

function updatePlayerUI(song){
    if(!song) return;

    playBtn.innerText = isPlaying ? "⏸" : "▶";
    cardPlayBtn.innerText = isPlaying ? "⏸" : "▶";

    playerTitle.innerText = song.title;
    playerArtist.innerText = song.artist;

    cardSongTitle.innerText = song.title;
    cardSongArtist.innerText = song.artist + " • " + song.album;

    if(song.cover){
        playerCover.innerHTML = `<img src="${song.cover}" onerror="this.style.display='none';this.parentElement.innerHTML='${song.title.charAt(0)}';">`;

        bigCover.innerHTML = `<img src="${song.cover}" onerror="this.style.display='none';this.parentElement.innerHTML='${song.title.charAt(0)}';">`;
    }
    else{
        playerCover.innerText = song.title.charAt(0);
        bigCover.innerText = song.title.charAt(0);
    }
}

function playSong(index, event){

    if(event){
        event.stopPropagation();
    }

    let allSongs = getSongs();

    if(!allSongs[index]) return;

    if(!allSongs[index].audio){
        alert("Song audio URL missing in songs.js");
        return;
    }

    currentSongIndex = index;

    let song = allSongs[currentSongIndex];

    audio.src = song.audio;

    audio.play().then(function(){

        isPlaying = true;

        savePlayerState();

        updatePlayerUI(song);

    }).catch(function(){

        isPlaying = false;

        savePlayerState();

        updatePlayerUI(song);

        alert("Play dynamically blocked. Click play control button manually.");

    });
}

function togglePlay(){

    if(!audio.src){
        playSong(currentSongIndex);
        return;
    }

    if(isPlaying){

        audio.pause();

        isPlaying = false;

    }
    else{

        audio.play().then(function(){

            isPlaying = true;

            savePlayerState();

            updatePlayerUI(getSongs()[currentSongIndex]);

        }).catch(function(){

            isPlaying = false;

        });

        return;
    }

    savePlayerState();

    updatePlayerUI(getSongs()[currentSongIndex]);
}

function nextSong(){

    let currentFavs = getCurrentlyRenderedFavs();

    if(currentFavs.length === 0) return;

    let currentMatchIndex =
    currentFavs.findIndex(item => item.index === currentSongIndex);

    if(currentMatchIndex === -1){

        playSong(currentFavs[0].index);

    }
    else{

        let nextFavIndex =
        (currentMatchIndex + 1) % currentFavs.length;

        playSong(currentFavs[nextFavIndex].index);
    }
}

function prevSong(){

    let currentFavs = getCurrentlyRenderedFavs();

    if(currentFavs.length === 0) return;

    let currentMatchIndex =
    currentFavs.findIndex(item => item.index === currentSongIndex);

    if(currentMatchIndex === -1){

        playSong(currentFavs[currentFavs.length - 1].index);

    }
    else{

        let prevFavIndex =
        (currentMatchIndex - 1 + currentFavs.length) % currentFavs.length;

        playSong(currentFavs[prevFavIndex].index);
    }
}

function changeVolume(value){

    audio.volume = value;

    volumeRange.value = value;

    cardVolumeRange.value = value;

    localStorage.setItem("globalVolume",value);
}

function formatTime(seconds){

    if(isNaN(seconds)) return "0:00";

    let min = Math.floor(seconds / 60);

    let sec = Math.floor(seconds % 60);

    if(sec < 10){
        sec = "0" + sec;
    }

    return min + ":" + sec;
}

audio.addEventListener("timeupdate",function(){

    localStorage.setItem(
        "globalAudioTime",
        audio.currentTime || 0
    );

    let percent =
    (audio.currentTime / audio.duration) * 100;

    if(isNaN(percent)){
        percent = 0;
    }

    progressFill.style.width = percent + "%";
    cardProgressFill.style.width = percent + "%";

    currentTime.innerText =
    formatTime(audio.currentTime);

    durationTime.innerText =
    formatTime(audio.duration);

    cardCurrentTime.innerText =
    formatTime(audio.currentTime);

    cardDurationTime.innerText =
    formatTime(audio.duration);
});

audio.addEventListener("ended",function(){
    nextSong();
});

function setProgress(event){

    if(!audio.duration) return;

    let width = event.currentTarget.clientWidth;

    let clickX = event.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;

    savePlayerState();
}

function setCardProgress(event){

    if(!audio.duration) return;

    let width = event.currentTarget.clientWidth;

    let clickX = event.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;

    savePlayerState();
}

function openMusicCard(){

    if(!audio.src) return;

    musicCardOverlay.classList.add("show");
}

function closeMusicCard(){

    musicCardOverlay.classList.remove("show");
}

musicCardOverlay.addEventListener("click",function(e){

    if(e.target.id === "musicCardOverlay"){

        closeMusicCard();
    }
});

searchInput.addEventListener("input",function(){

    renderFavorites();
});

window.addEventListener("beforeunload",function(){

    savePlayerState();
});

renderFavorites();

let savedVolume =
localStorage.getItem("globalVolume") || 0.8;

changeVolume(savedVolume);

updatePlayerUI(getSongs()[currentSongIndex]);

if(savedSrc && isPlaying){

    setTimeout(function(){

        audio.play().then(function(){

            isPlaying = true;

            updatePlayerUI(getSongs()[currentSongIndex]);

        }).catch(function(){

            isPlaying = false;

            updatePlayerUI(getSongs()[currentSongIndex]);

        });

    },300);
}
</script>

</body>
</html>
