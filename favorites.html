<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --purple:#6366f1;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* LAYOUT */
.app{
    display:grid;
    grid-template-columns:250px 1fr;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:20px;
}

.logo{
    font-size:28px;
    font-weight:900;
    margin-bottom:30px;
}

.logo span{
    color:var(--purple);
}

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu a{
    text-decoration:none;
    color:var(--muted);
    padding:12px 14px;
    border-radius:12px;
    font-weight:700;
}

.menu a.active,
.menu a:hover{
    background:var(--card2);
    color:var(--text);
}

/* MAIN */
.main{
    padding:20px;
    padding-bottom:140px;
}

/* TOPBAR */
.topbar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.search-box{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:1px solid var(--border);
}

/* TITLE */
.page-title{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    border:1px solid var(--border);
}

/* LIST */
.song-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.song-row{
    display:grid;
    grid-template-columns:40px 60px 1fr 80px;
    gap:10px;
    background:var(--card);
    padding:12px;
    border-radius:16px;
    border:1px solid var(--border);
    align-items:center;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    left:250px;
    right:0;
    background:var(--card);
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    gap:10px;
}

.player-info{
    display:flex;
    gap:10px;
    align-items:center;
    min-width:120px;
}

.player-cover{
    width:45px;
    height:45px;
    border-radius:10px;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:900;
}

.controls button{
    padding:10px;
    border:none;
    border-radius:50%;
    background:var(--card2);
}

/* POPUP */
.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.music-card-overlay.show{
    display:flex;
}

.music-card{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:350px;
}

/* MOBILE FIX */
@media(max-width:768px){

    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .player{
        left:0;
        flex-direction:column;
        align-items:flex-start;
    }

    .song-row{
        grid-template-columns:30px 50px 1fr;
    }

    .song-row div:nth-child(4){
        display:none;
    }
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">Audio<span>phile</span></div>

<div class="menu">
<a href="home.html">Home</a>
<a href="songs.html">Songs</a>
<a href="albums.html">Albums</a>
<a href="artists.html">Artists</a>
<a class="active" href="favorites.html">Favorites</a>
<a href="settings.html">Settings</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<input id="searchInput" class="search-box" placeholder="Search favorites...">
</div>

<div class="page-title">
<h2>Favorites</h2>
<p>Your liked songs</p>
</div>

<div id="favoriteList" class="song-list"></div>

</div>
</div>

<!-- PLAYER -->
<div class="player">

<div class="player-info" onclick="openCard()">
<div class="player-cover" id="playerCover">A</div>
<div>
<h4 id="playerTitle">Select song</h4>
<p id="playerArtist">Audio</p>
</div>
</div>

<div class="controls">
<button onclick="togglePlay()">▶</button>
</div>

</div>

<!-- POPUP -->
<div class="music-card-overlay" id="card">
<div class="music-card">
<h3 id="cardTitle">Song</h3>
<p id="cardArtist">Artist</p>
</div>
</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>
const audio = document.getElementById("audio");
const list = document.getElementById("favoriteList");
const searchInput = document.getElementById("searchInput");

let current = 0;
let playing = false;

function songsData(){
    return typeof songs !== "undefined" ? songs : [];
}

function favs(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

function getFavSongs(){
    return favs()
    .map(i => ({song:songsData()[i], index:i}))
    .filter(x => x.song);
}

function render(){
    let val = searchInput.value.toLowerCase();

    let data = getFavSongs().filter(x =>
        x.song.title.toLowerCase().includes(val) ||
        (x.song.artist||"").toLowerCase().includes(val)
    );

    if(data.length === 0){
        list.innerHTML = "<p>No favorites</p>";
        return;
    }

    list.innerHTML = data.map((x,i)=>`
        <div class="song-row" onclick="play(${x.index})">
            <div>${i+1}</div>
            <div>${x.song.title[0]}</div>
            <div>${x.song.title}</div>
            <div>${x.song.artist||""}</div>
        </div>
    `).join("");
}

function play(i){
    let s = songsData()[i];
    if(!s) return;

    current = i;
    audio.src = s.audio;
    audio.play();

    document.getElementById("playerTitle").innerText = s.title;
    document.getElementById("playerArtist").innerText = s.artist;
}

function togglePlay(){
    if(audio.paused){
        audio.play();
        playing = true;
    }else{
        audio.pause();
        playing = false;
    }
}

function openCard(){
    document.getElementById("card").classList.add("show");
}

searchInput.addEventListener("input",render);

render();
</script>

</body>
</html>
