<!-- FAVORITES PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Audiophile - Favorites</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    height:100vh;
    height:100dvh;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
    height:100dvh;
}

/* SIDEBAR */
.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
    overflow-y:auto;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
    transition:0.3s;
    display:flex;
    align-items:center;
    gap:10px;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(90deg,
    color-mix(in srgb,var(--cyan) 16%,transparent),
    color-mix(in srgb,var(--purple) 16%,transparent));
    color:var(--text);
}

/* MAIN */
.main{
    height:100vh;
    height:100dvh;
    overflow-y:auto;
    padding:30px 34px 170px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{
    width:100%;
}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:900;
    color:white;
    overflow:hidden;
    flex-shrink:0;
}

/* HEADER */
.page-title{
    background:linear-gradient(135deg,
    color-mix(in srgb,var(--cyan) 10%,white),
    color-mix(in srgb,var(--purple) 10%,white));
    border:1px solid var(--border);
    border-radius:32px;
    padding:30px;
    margin-bottom:26px;
}

.page-title small{
    color:var(--purple);
    font-weight:800;
    letter-spacing:1px;
}

.page-title h1{
    font-size:44px;
    margin-top:8px;
    margin-bottom:10px;
}

.page-title p{
    color:var(--muted);
    font-size:15px;
}

/* SONG LIST */
.song-list{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:16px 18px;
    display:grid;
    grid-template-columns:70px 1fr auto;
    gap:18px;
    align-items:center;
    transition:0.3s;
}

.song-row:hover{
    transform:translateY(-4px);
    border-color:var(--purple);
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.song-left{
    display:flex;
    align-items:center;
    gap:16px;
    min-width:0;
}

.song-cover{
    width:68px;
    height:68px;
    border-radius:18px;
    overflow:hidden;
    background:var(--card2);
    flex-shrink:0;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-info{
    min-width:0;
}

.song-info h3{
    font-size:18px;
    margin-bottom:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-info p{
    color:var(--muted);
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-actions{
    display:flex;
    align-items:center;
    gap:10px;
}

.song-actions button{
    border:none;
    cursor:pointer;
    transition:0.2s;
}

.play-btn{
    width:46px;
    height:46px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    color:white;
    font-size:15px;
}

.star-btn{
    width:46px;
    height:46px;
    border-radius:50%;
    background:var(--card2);
    color:#f59e0b;
    font-size:18px;
}

.song-actions button:hover{
    transform:scale(1.08);
}

/* PLAYER */
.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:99;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    overflow:hidden;
    background:var(--card2);
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.player-details h4{
    font-size:16px;
    margin-bottom:4px;
}

.player-details p{
    font-size:13px;
    color:var(--muted);
}

.controls{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:10px;
}

.buttons button{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    cursor:pointer;
    font-size:16px;
}

.buttons .play{
    width:54px;
    height:54px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.progress{
    height:6px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
}

.progress-fill{
    width:45%;
    height:100%;
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
}

.volume{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:14px;
}

.volume input{
    accent-color:var(--purple);
}

/* MOBILE */
.mobile-nav{
    display:none;
}

@media(max-width:900px){

    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .main{
        padding:20px 16px 180px;
    }

    .page-title{
        padding:22px;
        border-radius:24px;
    }

    .page-title h1{
        font-size:34px;
    }

    .song-row{
        grid-template-columns:1fr;
        gap:14px;
        padding:14px;
        border-radius:20px;
    }

    .song-left{
        gap:12px;
    }

    .song-cover{
        width:60px;
        height:60px;
        border-radius:14px;
    }

    .song-info h3{
        font-size:15px;
    }

    .song-info p{
        font-size:12px;
    }

    .song-actions{
        justify-content:flex-end;
    }

    .player{
        left:0;
        bottom:64px;
        height:68px;
        grid-template-columns:1fr auto;
        padding:8px 16px;
    }

    .buttons button{
        display:none;
    }

    .buttons .play{
        display:flex;
        justify-content:center;
        align-items:center;
        width:42px;
        height:42px;
    }

    .progress,
    .volume{
        display:none;
    }

    .player-cover{
        width:44px;
        height:44px;
        border-radius:10px;
    }

    .player-details h4{
        font-size:14px;
    }

    .player-details p{
        font-size:11px;
    }

    .mobile-nav{
        display:flex;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        height:64px;
        background:var(--card);
        border-top:1px solid var(--border);
        justify-content:space-around;
        align-items:center;
        z-index:999;
    }

    .mobile-nav a{
        text-decoration:none;
        color:var(--muted);
        font-size:11px;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:4px;
    }

    .mobile-nav a.active{
        color:var(--purple);
    }

    .mobile-nav i{
        font-size:18px;
    }
}
</style>
</head>
