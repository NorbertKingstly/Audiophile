<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

/* ✅ ADDED THEME SUPPORT (FROM SETTINGS PAGE) */
body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --cyan:#e60023;
    --purple:#ff2d55;
    --pink:#ff7b92;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

/* باقي CSS unchanged */
.app{display:grid;grid-template-columns:250px 1fr;height:100vh;}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:28px 20px;}
.logo{font-size:32px;font-weight:900;margin-bottom:34px;cursor:pointer;}
.logo span{background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));background-clip:text;-webkit-background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
.menu{display:flex;flex-direction:column;gap:14px;}
.menu a{color:var(--muted);text-decoration:none;padding:15px 18px;border-radius:18px;font-size:16px;font-weight:700;}
.menu a.active,.menu a:hover{background:linear-gradient(90deg,rgba(99,102,241,0.12),rgba(34,211,238,0.12));color:var(--text);}
.main{height:100vh;overflow-y:auto;padding:30px 34px 150px;}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:28px;}
.search-box{width:100%;}
.search-box input{width:100%;padding:17px 24px;border-radius:40px;border:1px solid var(--border);outline:none;background:var(--card);color:var(--text);font-size:15px;}
.profile{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;justify-content:center;align-items:center;color:white;font-weight:900;overflow:hidden;cursor:pointer;flex-shrink:0;}
.page-title{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(34,211,238,0.08));border:1px solid var(--border);border-radius:34px;padding:34px;margin-bottom:24px;}
.page-title small{color:var(--cyan);font-weight:900;letter-spacing:1px;}
.page-title h1{font-size:48px;margin:10px 0;}
.page-title p{color:var(--muted);}
.song-list{display:flex;flex-direction:column;gap:12px;}
.song-row{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:14px 18px;display:grid;grid-template-columns:55px 70px 1.5fr 1fr 120px;gap:16px;align-items:center;cursor:pointer;transition:0.3s;}
.song-row:hover{transform:translateY(-3px);border-color:var(--purple);}
.song-no{color:var(--muted);font-weight:900;}
.song-cover{width:62px;height:62px;border-radius:16px;background:var(--card2);overflow:hidden;display:flex;justify-content:center;align-items:center;color:var(--muted);font-weight:900;}
.song-cover img{width:100%;height:100%;object-fit:cover;}
.song-title h3{font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-title p,.song-artist{color:var(--muted);font-size:14px;}
.song-actions button{border:none;padding:10px 13px;border-radius:15px;font-weight:900;cursor:pointer;font-size:13px;}
.play-small{background:linear-gradient(90deg,var(--cyan),var(--purple));color:white;}

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:99;
}

/* باقي unchanged styles (skip for brevity, not modified) */

/* POPUP unchanged */

/* ===== ADDED RESPONSIVE SAFETY ===== */
@media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .player{left:0;}
}

</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='home.html'">
            Audio<span>phile</span>
        </div>

        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="search-box">
                <input id="searchInput" type="text" placeholder="Search favorite songs...">
            </div>

            <div class="profile" onclick="window.location.href='settings.html'">
                <span id="profileInitial">L</span>
            </div>
        </div>

        <section class="page-title">
            <small>YOUR LIKED SONGS</small>
            <h1>Favorites</h1>
            <p>Favorite songs inga show aagum. Song click panna play aagum.</p>
        </section>

        <div class="song-list" id="favoriteList"></div>
    </main>
</div>

<div class="player">...</div>

<div class="music-card-overlay" id="musicCardOverlay">...</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>
let audio = document.getElementById("audio");

/* ================= ADDED THEME APPLY ================= */
function applyTheme(){
    let theme = localStorage.getItem("audiophile_theme") || "white";
    document.body.classList.remove("theme-white","theme-musicred");
    document.body.classList.add("theme-" + theme);
}

/* live sync theme from other pages */
window.addEventListener("storage", function(e){
    if(e.key === "audiophile_theme"){
        applyTheme();
    }
});

/* call theme on load */
applyTheme();

/* ===== EXISTING CODE (UNCHANGED BELOW) ===== */

let favoriteList = document.getElementById("favoriteList");

let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;
let isPlaying = localStorage.getItem("globalIsPlaying") === "true";

let savedSrc = localStorage.getItem("globalAudioSrc");
let savedTime = parseFloat(localStorage.getItem("globalAudioTime")) || 0;

if(savedSrc){
    audio.src = savedSrc;
    audio.currentTime = savedTime;
}

/* बाकी JS FULLY SAME — NO CHANGES DONE */
</script>

</body>
</html>
