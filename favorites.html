<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Audiophile - Artists</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
:root{ --bg:#f5f5f7; --card:#ffffff; --card2:#eef0f4; --text:#111827; --muted:#64748b; --cyan:#111827; --purple:#6366f1; --pink:#22d3ee; --border:rgba(0,0,0,0.08); }

body{ background:var(--bg); color:var(--text); overflow:hidden; height:100vh; height:100dvh; }
.app{ display:grid; grid-template-columns:250px 1fr; height:100vh; height:100dvh; }

/* Sidebar */
.sidebar{ background:var(--card); border-right:1px solid var(--border); padding:28px 20px; overflow-y:auto; }
.logo{ font-size:32px; font-weight:900; margin-bottom:34px; cursor:pointer; color:var(--text); }
.logo span{ background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink)); background-clip:text; -webkit-background-clip:text; color:transparent; -webkit-text-fill-color:transparent; }
.menu{ display:flex; flex-direction:column; gap:14px; }
.menu a{ color:var(--muted); text-decoration:none; padding:15px 18px; border-radius:18px; font-size:16px; font-weight:700; transition:0.3s; }
.menu a.active, .menu a:hover{ background:linear-gradient(90deg, color-mix(in srgb,var(--cyan) 16%,transparent), color-mix(in srgb,var(--purple) 16%,transparent)); color:var(--text); }

/* Main Content */
.main{ height:100vh; height:100dvh; overflow-y:auto; padding:30px 34px 170px; }
.topbar{ display:flex; justify-content:space-between; align-items:center; gap:18px; margin-bottom:28px; }
.search-box{ width:100%; }
.search-box input{ width:100%; padding:17px 24px; border-radius:40px; border:1px solid var(--border); background:var(--card); color:var(--text); outline:none; }

/* Artist Grid */
.artist-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:18px; }
.artist-card{ padding:16px; border-radius:28px; background:var(--card); border:1px solid var(--border); cursor:pointer; transition:0.3s; }
.artist-card:hover{ transform:translateY(-5px); }
.artist-cover{ height:180px; border-radius:22px; background:var(--card2); display:flex; justify-content:center; align-items:center; margin-bottom:14px; overflow:hidden; }
.artist-card h3{ font-size:18px; margin-bottom:4px; }
.artist-card p{ color:var(--muted); font-size:14px; }

/* Player Bar (Simplified) */
.player{ position:fixed; left:250px; right:0; bottom:0; height:128px; background:var(--card); border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1.5fr 1fr; align-items:center; gap:18px; padding:16px 34px; z-index:999; }
</style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <div class="logo">Audio<span>phile</span></div>
        <div class="menu">
            <a href="home.html">Home</a>
            <a href="albums.html">Albums</a>
            <a href="artists.html" class="active">Artists</a>
            <a href="favorites.html">Favorites</a>
        </div>
    </div>
    
    <main class="main">
        <div class="topbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search artists...">
            </div>
        </div>

        <h2 style="margin-bottom:20px;">All Artists</h2>
        <div class="artist-grid" id="artistGrid">
            </div>
    </main>
</div>

</body>
</html>
