<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiophile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}

:root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-white{
    --bg:#f5f5f7;
    --card:#ffffff;
    --card2:#eef0f4;
    --text:#111827;
    --muted:#64748b;
    --cyan:#111827;
    --purple:#6366f1;
    --pink:#22d3ee;
    --border:rgba(0,0,0,0.08);
}

body.theme-musicred{
    --bg:#ffffff;
    --card:#f7f7f8;
    --card2:#eeeeef;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --cyan:#e60023;
    --purple:#ff2d55;
    --pink:#ff7b92;
    --border:rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

.sidebar{
    background:var(--card);
    border-right:1px solid var(--border);
    padding:28px 20px;
}

.logo{
    font-size:32px;
    font-weight:900;
    margin-bottom:34px;
    cursor:pointer;
}

.logo span{
    background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));
    background-clip:text;
    -webkit-background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.menu a{
    color:var(--muted);
    text-decoration:none;
    padding:15px 18px;
    border-radius:18px;
    font-size:16px;
    font-weight:700;
}

.menu a.active,
.menu a:hover{
    background:linear-gradient(90deg,
    color-mix(in srgb,var(--cyan) 16%,transparent),
    color-mix(in srgb,var(--purple) 16%,transparent));
    color:var(--text);
}

.main{
    height:100vh;
    overflow-y:auto;
    padding:30px 34px 150px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
    margin-bottom:28px;
}

.search-box{width:100%;}

.search-box input{
    width:100%;
    padding:17px 24px;
    border-radius:40px;
    border:1px solid var(--border);
    outline:none;
    background:var(--card);
    color:var(--text);
    font-size:15px;
}

.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
    color:white;
    overflow:hidden;
    flex-shrink:0;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
}

.page-title{
    background:linear-gradient(135deg,
    color-mix(in srgb,var(--cyan) 10%,white),
    color-mix(in srgb,var(--purple) 10%,white));
    border:1px solid var(--border);
    border-radius:34px;
    padding:34px;
    margin-bottom:24px;
    display:flex;
    align-items:center;
    gap:28px;
}

.album-hero-cover{
    width:160px;
    height:160px;
    border-radius:26px;
    background:var(--card2);
    display:none;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:52px;
    font-weight:900;
    overflow:hidden;
    flex-shrink:0;
}

.album-hero-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    background:var(--card2);
    display:block;
}

.page-title small{
    color:var(--cyan);
    font-weight:900;
    letter-spacing:1px;
}

.page-title h1{
    font-size:48px;
    margin:10px 0;
}

.page-title p{color:var(--muted);}

.back-albums{
    display:none;
    border:none;
    padding:13px 22px;
    border-radius:22px;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    font-weight:900;
    cursor:pointer;
    margin-bottom:20px;
}

.album-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:18px;
}

.album-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:16px;
    cursor:pointer;
    transition:0.3s;
}

.album-card:hover{
    transform:translateY(-5px);
    border-color:var(--cyan);
}

.album-cover{
    height:180px;
    border-radius:22px;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:54px;
    font-weight:900;
    margin-bottom:14px;
    overflow:hidden;
}

.album-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    background:var(--card2);
    display:block;
}

.album-card h3{
    font-size:18px;
    margin-bottom:6px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.album-card p{
    color:var(--muted);
    font-size:14px;
}

.list-head{
    display:none;
    grid-template-columns:55px 70px 1.5fr 1fr 150px;
    gap:16px;
    padding:0 20px 12px;
    color:var(--muted);
    font-size:13px;
    font-weight:900;
}

.song-list{
    display:none;
    flex-direction:column;
    gap:12px;
}

.song-row{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    padding:14px 18px;
    display:grid;
    grid-template-columns:55px 70px 1.5fr 1fr 150px;
    gap:16px;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.song-row:hover{
    transform:translateY(-3px);
    border-color:var(--cyan);
}

.song-no{
    color:var(--muted);
    font-weight:900;
}

.song-cover{
    width:62px;
    height:62px;
    border-radius:16px;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:900;
    overflow:hidden;
    flex-shrink:0;
}

.song-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    background:var(--card2);
    display:block;
}

.song-title h3{
    font-size:18px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-artist{
    color:var(--muted);
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.song-actions{
    display:flex;
    gap:8px;
}

.song-actions button{
    border:none;
    padding:10px 13px;
    border-radius:15px;
    font-weight:900;
    cursor:pointer;
    font-size:13px;
}

.play-small{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.fav-small{
    background:var(--card2);
    color:#f59e0b;
    font-size:18px;
}

.player{
    position:fixed;
    left:250px;
    right:0;
    bottom:0;
    height:118px;
    background:var(--card);
    border-top:1px solid var(--border);
    display:grid;
    grid-template-columns:1fr 1.5fr 1fr;
    align-items:center;
    gap:18px;
    padding:16px 34px;
    z-index:99;
}

.player-info{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
}

.player-cover{
    width:64px;
    height:64px;
    border-radius:18px;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:900;
    overflow:hidden;
}

.player-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    background:var(--card2);
    display:block;
}

.player-info h4{font-size:17px;}
.player-info p{color:var(--muted);font-size:14px;}

.controls{text-align:center;}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-bottom:10px;
}

.buttons button{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    font-size:16px;
    cursor:pointer;
}

.buttons .play{
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
}

.progress,
.card-progress{
    height:7px;
    background:var(--card2);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.progress-fill,
.card-progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
}

.time,
.card-time{
    display:flex;
    justify-content:space-between;
    color:var(--muted);
    font-size:12px;
    margin-top:6px;
}

.volume{
    display:flex;
    align-items:center;
    gap:12px;
    justify-content:flex-end;
}

.volume h3{
    font-size:14px;
    color:var(--muted);
}

.volume input{width:130px;}

.mobile-nav {
    display: none;
    position: fixed;
    bottom: 80px; 
    left: 0;
    right: 0;
    height: 60px;
    background: var(--card);
    border-top: 1px solid var(--border);
    z-index: 98;
    justify-content: space-around;
    align-items: center;
    padding: 0 10px;
}

.mobile-nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 12px;
    border-radius: 12px;
}

.mobile-nav a.active {
    background: linear-gradient(90deg,
    color-mix(in srgb,var(--cyan) 16%,transparent),
    color-mix(in srgb,var(--purple) 16%,transparent));
    color: var(--text);
}

.music-card-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(14px);
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.music-card-overlay.show{display:flex;}

.music-card{
    width:100%;
    max-width:430px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:34px;
    padding:24px;
    box-shadow:0 30px 80px rgba(0,0,0,0.25);
}

.big-cover{
    width:100%;
    height:310px;
    border-radius:28px;
    background:var(--card2);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:90px;
    font-weight:900;
    overflow:hidden;
    margin-bottom:22px;
}

.big-cover img{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    background:var(--card2);
    display:block;
}

.music-card h2{
    font-size:28px;
    margin-bottom:6px;
    text-align:center;
}

.music-card p{
    color:var(--muted);
    text-align:center;
    margin-bottom:20px;
}

.card-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    margin:22px 0;
}

.card-buttons button{
    width:54px;
    height:54px;
    border:none;
    border-radius:50%;
    background:var(--card2);
    color:var(--text);
    font-size:18px;
    cursor:pointer;
}

.card-buttons .big-play{
    width:70px;
    height:70px;
    background:linear-gradient(90deg,var(--cyan),var(--purple));
    color:white;
    font-size:24px;
}

.card-volume{margin-top:20px;}

.card-volume span{
    color:var(--muted);
    font-weight:800;
    font-size:14px;
}

.card-volume input{
    width:100%;
    margin-top:10px;
}

@media(max-width:900px){
    body {
        overflow: auto;
    }
    .app{
        grid-template-columns:1fr;
        height: auto;
    }
    .sidebar{display:none;}
    .mobile-nav { display: flex; } 
    
    .main{
        padding:20px 16px 240px; 
        height: auto;
        overflow-y: visible;
    }
    .topbar {
        margin-bottom: 20px;
    }
    .page-title{
        flex-direction:column;
        align-items:center;
        text-align: center;
        padding: 24px;
        gap: 16px;
        border-radius: 24px;
    }
    .page-title h1 {
        font-size: 32px;
    }
    .album-hero-cover{
        width:120px;
        height:120px;
        border-radius: 20px;
    }
    .album-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 14px;
    }
    .album-card {
        border-radius: 20px;
        padding: 12px;
    }
    .album-cover {
        height: 140px;
        border-radius: 16px;
    }
    .album-card h3 {
        font-size: 16px;
    }
    
    .list-head{display:none !important;}
    
    .song-list {
        gap: 10px;
    }
    .song-row{
        grid-template-columns: 50px 1fr auto;
        gap:12px;
        padding: 10px 14px;
        border-radius: 16px;
    }
    .song-no { display: none; } 
    .song-cover {
        width: 50px;
        height: 50px;
        border-radius: 12px;
    }
    .song-title h3 {
        font-size: 16px;
    }
    .song-artist{
        grid-column: 2;
        font-size:13px;
        margin-top: 2px;
    }
    .song-actions{
        grid-column: 3;
        grid-row: 1 / span 2;
        align-items: center;
        gap: 6px;
    }
    .song-actions button {
        padding: 8px 12px;
        border-radius: 12px;
    }
    
    .player{
        left:0;
        grid-template-columns: 1fr auto;
        height: 80px;
        padding: 10px 20px;
        gap: 10px;
    }
    .player-info {
        max-width: 200px;
    }
    .player-cover {
        width: 50px;
        height: 50px;
        border-radius: 12px;
    }
    .player-info h4 {
        font-size: 15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .controls {
        grid-column: 2;
    }
    .buttons button:not(.play) {
        display: none; 
    }
    .buttons {
        margin-bottom: 0;
    }
    .progress, .time, .volume {
        display: none !important; 
    }
}

@media(max-width: 400px) {
    .album-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    }
    .song-row {
        grid-template-columns: 42px 1fr auto;
    }
    .song-cover {
        width: 42px;
        height: 42px;
    }
    .play-small {
        font-size: 11px;
    }
}
</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo" onclick="window.location.href='home.html'">
            Audio<span>phile</span>
        </div>

        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="songs.html">Songs</a>
            <a href="albums.html" class="active">Albums</a>
            <a href="artists.html">Artists</a>
            <a href="favorites.html">Favorites</a>
            <a href="settings.html">Settings</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="search-box">
                <input id="searchInput" type="text" placeholder="Search albums, songs, artists...">
            </div>

            <div class="profile" onclick="window.location.href='settings.html'">
                <span id="homeProfileInitial">L</span>
                <img id="homeProfileImage" src="">
            </div>
        </div>

        <section class="page-title">
            <div class="album-hero-cover" id="albumHeroCover"></div>

            <div>
                <small id="pageSmall">ALBUM FOLDERS</small>
                <h1 id="pageHeading">Albums</h1>
                <p id="pageText">Album folder click panna andha movie oda songs open agum.</p>
            </div>
        </section>

        <button class="back-albums" id="backAlbums" onclick="showAlbums()">
            ← Back to Albums
        </button>

        <div class="album-grid" id="albumGrid"></div>

        <div class="list-head" id="listHead">
            <span>#</span>
            <span>Poster</span>
            <span>Title</span>
            <span>Artist</span>
            <span>Action</span>
        </div>

        <div class="song-list" id="songList"></div>
    </main>

</div>

<nav class="mobile-nav">
    <a href="home.html">Home</a>
    <a href="songs.html">Songs</a>
    <a href="albums.html" class="active">Albums</a>
    <a href="artists.html">Artists</a>
    <a href="favorites.html">Favs</a>
</nav>

<div class="player">

    <div class="player-info" onclick="openMusicCard()">
        <div class="player-cover" id="playerCover">A</div>

        <div>
            <h4 id="playerTitle">Select a song</h4>
            <p id="playerArtist">Audiophile</p>
        </div>
    </div>

    <div class="controls">
        <div class="buttons">
            <button onclick="prevSong()">\u23ee</button>
            <button class="play" id="playBtn" onclick="togglePlay()">\u25b6</button>
            <button onclick="nextSong()">\u23ed</button>
        </div>

        <div class="progress" onclick="setProgress(event)">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
    </div>

    <div class="volume">
        <h3>Volume</h3>
        <input type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)">
    </div>

</div>

<div class="music-card-overlay" id="musicCardOverlay">

    <div class="music-card">
        <div class="big-cover" id="bigCover">A</div>

        <h2 id="cardSongTitle">Select a song</h2>
        <p id="cardSongArtist">Audiophile</p>

        <div class="card-buttons">
            <button onclick="prevSong()">\u23ee</button>
            <button class="big-play" id="cardPlayBtn" onclick="togglePlay()">\u25b6</button>
            <button onclick="nextSong()">\u23ed</button>
        </div>

        <div class="card-progress" onclick="setCardProgress(event)">
            <div class="card-progress-fill" id="cardProgressFill"></div>
        </div>

        <div class="card-time">
            <span id="cardCurrentTime">0:00</span>
            <span id="cardDurationTime">0:00</span>
        </div>

        <div class="card-volume">
            <span>Volume</span>
            <input type="range" min="0" max="1" step="0.01" value="0.8" oninput="changeVolume(this.value)">
        </div>
    </div>

</div>

<audio id="audio"></audio>

<script src="songs.js"></script>

<script>
let currentSongIndex = parseInt(localStorage.getItem("currentSongIndex")) || 0;
let isPlaying = localStorage.getItem("globalIsPlaying") === "true";
let currentAlbumSongs = [];

let audio = document.getElementById("audio");
let albumGrid = document.getElementById("albumGrid");
let songList = document.getElementById("songList");
let albumHeroCover = document.getElementById("albumHeroCover");
let homeProfileInitial = document.getElementById("homeProfileInitial");
let homeProfileImage = document.getElementById("homeProfileImage");
let playBtn = document.getElementById("playBtn");
let cardPlayBtn = document.getElementById("cardPlayBtn");
let playerTitle = document.getElementById("playerTitle");
let playerArtist = document.getElementById("playerArtist");
let cardSongTitle = document.getElementById("cardSongTitle");
let cardSongArtist = document.getElementById("cardSongArtist");
let playerCover = document.getElementById("playerCover");
let bigCover = document.getElementById("bigCover");
let progressFill = document.getElementById("progressFill");
let cardProgressFill = document.getElementById("cardProgressFill");
let currentTime = document.getElementById("currentTime");
let durationTime = document.getElementById("durationTime");
let cardCurrentTime = document.getElementById("cardCurrentTime");
let cardDurationTime = document.getElementById("cardDurationTime");
let searchInput = document.getElementById("searchInput");
let listHead = document.getElementById("listHead");
let backAlbums = document.getElementById("backAlbums");
let pageSmall = document.getElementById("pageSmall");
let pageHeading = document.getElementById("pageHeading");
let pageText = document.getElementById("pageText");
let musicCardOverlay = document.getElementById("musicCardOverlay");

let savedSrc = localStorage.getItem("globalAudioSrc");
let savedTime = parseFloat(localStorage.getItem("globalAudioTime")) || 0;

if(savedSrc){
    audio.src = savedSrc;
    audio.currentTime = savedTime;
}

function applySavedTheme(){
    let theme = localStorage.getItem("audiophile_theme") || "white";
    document.body.classList.remove("theme-white","theme-musicred");
    document.body.classList.add("theme-" + theme);
}

function loadHomeProfile(){
    let currentUser = localStorage.getItem("audiophile_currentUser") || "Liyo Clevert";
    let profileImage = localStorage.getItem("audiophile_profileImage") || "";

    homeProfileInitial.innerText = currentUser.charAt(0).toUpperCase();

    if(profileImage){
        homeProfileImage.src = profileImage;
        homeProfileImage.style.display = "block";
        homeProfileInitial.style.display = "none";
    }else{
        homeProfileImage.style.display = "none";
        homeProfileInitial.style.display = "block";
    }
}

function getSongs(){
    return (typeof songs !== "undefined" && Array.isArray(songs)) ? songs : [];
}

function getAlbums(){
    let albumMap = {};

    getSongs().forEach(function(song){
        let albumName = song.album || song.movie || "Unknown Album";

        if(!albumMap[albumName]){
            albumMap[albumName] = {
                name: albumName,
                artist: song.artist,
                cover: song.cover,
                songs: []
            };
        }

        albumMap[albumName].songs.push(song);
    });

    return Object.values(albumMap);
}

function getFavorites(){
    return JSON.parse(localStorage.getItem("audiophile_favorites")) || [];
}

// Fixed target signature issue
function toggleFavorite(index,event){
    if(event) event.stopPropagation();

    let favorites = getFavorites();

    if(favorites.includes(index)){
        favorites = favorites.filter(item => item !== index);
    }else{
        favorites.push(index);
    }

    localStorage.setItem("audiophile_favorites",JSON.stringify(favorites));
    renderAlbumSongs(currentAlbumSongs);
}

function renderAlbums(albumArray){
    if(albumArray.length === 0){
        albumGrid.innerHTML = "<p style='padding:20px; color:var(--muted);'>No albums available</p>";
        return;
    }
    albumGrid.innerHTML = albumArray.map(function(album){
        return `
        <div class="album-card" onclick="openAlbum('${encodeURIComponent(album.name)}')">
            <div class="album-cover">
                ${
                    album.cover
                    ? `<img src="${album.cover}" onerror="this.style.display='none';this.parentElement.innerHTML='${album.name.charAt(0)}';">`
                    : album.name.charAt(0)
                }
            </div>
            <h3>${album.name}</h3>
            <p>${album.songs.length} Songs • ${album.artist}</p>
        </div>`;
    }).join("");
}

function openAlbum(albumNameEncoded){
    let albumName = decodeURIComponent(albumNameEncoded);

    let album = getAlbums().find(item => item.name === albumName);
    if(!album) return;

    currentAlbumSongs = album.songs;

    pageSmall.innerText = "ALBUM SONGS";
    pageHeading.innerText = album.name;
    pageText.innerText = album.songs.length + " songs available in this album.";

    albumHeroCover.style.display = "flex";

    if(album.cover){
        albumHeroCover.innerHTML = `<img src="${album.cover}" onerror="this.style.display='none';this.parentElement.innerHTML='${album.name.charAt(0)}';">`;
    }else{
        albumHeroCover.innerHTML = album.name.charAt(0);
    }

    backAlbums.style.display = "inline-block";
    albumGrid.style.display = "none";
    listHead.style.display = "grid";
    songList.style.display = "flex";

    renderAlbumSongs(album.songs);
}

function showAlbums(){
    currentAlbumSongs = [];

    pageSmall.innerText = "ALBUM FOLDERS";
    pageHeading.innerText = "Albums";
    pageText.innerText = "Album folder click panna andha movie oda songs open agum.";

    albumHeroCover.style.display = "none";
    albumHeroCover.innerHTML = "";

    backAlbums.style.display = "none";
    albumGrid.style.display = "grid";
    listHead.style.display = "none";
    songList.style.display = "none";
    songList.innerHTML = "";

    searchInput.value = "";
    renderAlbums(getAlbums());
}

function renderAlbumSongs(songArray){
    let allSongs = getSongs();
    let favorites = getFavorites();

    if(songArray.length === 0){
        songList.innerHTML = "<p style='padding:20px; color:var(--muted);'>No songs found</p>";
        return;
    }

    songList.innerHTML = songArray.map(function(song,displayIndex){
        let realIndex = allSongs.indexOf(song);
        let isFav = favorites.includes(realIndex);

        return `
        <div class="song-row" onclick="playSong(${realIndex})">
            <div class="song-no">${displayIndex + 1}</div>

            <div class="song-cover">
                ${
                    song.cover
                    ? `<img src="${song.cover}" onerror="this.style.display='none';this.parentElement.innerHTML='${song.title.charAt(0)}';">`
                    : song.title.charAt(0)
                }
            </div>

            <div class="song-title">
                <h3>${song.title}</h3>
            </div>

            <div class="song-artist">${song.artist}</div>

            <div class="song-actions">
                <button class="play-small" onclick="playSong(${realIndex}); event.stopPropagation();">\u25b6 Play</button>
                <button class="fav-small" onclick="toggleFavorite(${realIndex},event)">
                    ${isFav ? "\u2605" : "\u2606"}
                </button>
            </div>
        </div>`;
    }).join("");
}

function updatePlayerUI(song){
    playBtn.innerText = isPlaying ? "\u23f8" : "\u25b6";
    cardPlayBtn.innerText = isPlaying ? "\u23f8" : "\u25b6";

    if(!song) {
        playerTitle.innerText = "Select a song";
        playerArtist.innerText = "Audiophile";
        cardSongTitle.innerText = "Select a song";
        cardSongArtist.innerText = "Audiophile";
        playerCover.innerText = "A";
        bigCover.innerText = "A";
        return;
    }

    playerTitle.innerText = song.title;
    playerArtist.innerText = song.artist;

    cardSongTitle.innerText = song.title;
    cardSongArtist.innerText = song.artist + " \u2022 " + (song.album || song.movie || "");

    if(song.cover){
        playerCover.innerHTML = `<img src="${song.cover}" onerror="this.style.display='none';this.parentElement.innerHTML='${song.title.charAt(0)}';">`;
        bigCover.innerHTML = `<img src="${song.cover}" onerror="this.style.display='none';this.parentElement.innerHTML='${song.title.charAt(0)}';">`;
    }else{
        playerCover.innerText = song.title.charAt(0);
        bigCover.innerText = song.title.charAt(0);
    }
}

function savePlayerState(){
    localStorage.setItem("currentSongIndex",currentSongIndex);
    localStorage.setItem("globalAudioSrc",audio.src || "");
    localStorage.setItem("globalAudioTime",audio.currentTime || 0);
    localStorage.setItem("globalIsPlaying",isPlaying ? "true" : "false");
}

function playSong(index){
    let allSongs = getSongs();
    if(allSongs.length === 0 || !allSongs[index]) return;

    if(!allSongs[index].audio){
        alert("Song audio URL missing in songs.js");
        return;
    }

    currentSongIndex = index;
    let song = allSongs[currentSongIndex];

    audio.src = song.audio;

    audio.play().then(function(){
        isPlaying = true;
        savePlayerState();
        updatePlayerUI(song);
    }).catch(function(){
        isPlaying = false;
        savePlayerState();
        updatePlayerUI(song);
    });
}

function togglePlay(){
    let allSongs = getSongs();
    if(allSongs.length === 0) return;

    if(!audio.src){
        playSong(currentSongIndex);
        return;
    }

    if(isPlaying){
        audio.pause();
        isPlaying = false;
    }else{
        audio.play().then(function(){
            isPlaying = true;
        }).catch(function(){
            isPlaying = false;
        });
    }

    savePlayerState();
    updatePlayerUI(allSongs[currentSongIndex]);
}

function nextSong(){
    let allSongs = getSongs();
    if(allSongs.length === 0) return;

    currentSongIndex++;

    if(currentSongIndex >= allSongs.length){
        currentSongIndex = 0;
    }

    playSong(currentSongIndex);
}

function prevSong(){
    let allSongs = getSongs();
    if(allSongs.length === 0) return;

    currentSongIndex--;

    if(currentSongIndex < 0){
        currentSongIndex = allSongs.length - 1;
    }

    playSong(currentSongIndex);
}

function changeVolume(value){
    audio.volume = value;
    localStorage.setItem("globalVolume",value);
}

function formatTime(seconds){
    if(isNaN(seconds)) return "0:00";

    let min = Math.floor(seconds / 60);
    let sec = Math.floor(seconds % 60);

    if(sec < 10) sec = "0" + sec;

    return min + ":" + sec;
}

audio.addEventListener("timeupdate",function(){
    localStorage.setItem("globalAudioTime",audio.currentTime || 0);

    let percent = (audio.currentTime / audio.duration) * 100;
    if(isNaN(percent)) percent = 0;

    progressFill.style.width = percent + "%";
    cardProgressFill.style.width = percent + "%";

    currentTime.innerText = formatTime(audio.currentTime);
    durationTime.innerText = formatTime(audio.duration);

    cardCurrentTime.innerText = formatTime(audio.currentTime);
    cardDurationTime.innerText = formatTime(audio.duration);
});

audio.addEventListener("ended",function(){
    nextSong();
});

function setProgress(event){
    if(!audio.duration) return;

    let width = event.currentTarget.clientWidth;
    let clickX = event.offsetX;

    audio.currentTime = (clickX / width) * audio.duration;
    savePlayerState();
}

function setCardProgress(event){
    if(!audio.duration) return;

    let width = event.currentTarget.clientWidth;
    let clickX = event.offsetX;

    audio.currentTime = (clickX / width) * audio.duration;
    savePlayerState();
}

function openMusicCard(){
    if(!audio.src) return;
    musicCardOverlay.classList.add("show");
}

function closeMusicCard(){
    musicCardOverlay.classList.remove("show");
}

musicCardOverlay.addEventListener("click",function(e){
    if(e.target.id === "musicCardOverlay"){
        closeMusicCard();
    }
});

searchInput.addEventListener("input",function(){
    let value = this.value.toLowerCase();

    if(albumGrid.style.display !== "none"){
        let filteredAlbums = getAlbums().filter(function(album){
            return album.name.toLowerCase().includes(value)
            || album.artist.toLowerCase().includes(value);
        });

        renderAlbums(filteredAlbums);
    }else{
        let filteredSongs = currentAlbumSongs.filter(function(song){
            return song.title.toLowerCase().includes(value)
            || song.artist.toLowerCase().includes(value);
        });

        renderAlbumSongs(filteredSongs);
    }
});

window.addEventListener("beforeunload",function(){
    savePlayerState();
});

// Safeguarded Boot sequence
applySavedTheme();
loadHomeProfile();
renderAlbums(getAlbums());

let savedVolume = localStorage.getItem("globalVolume") || 0.8;
changeVolume(savedVolume);

// Check if songs exist array-level safely before passing UI setup
let globalSongsList = getSongs();
if(globalSongsList.length > 0 && globalSongsList[currentSongIndex]) {
    updatePlayerUI(globalSongsList[currentSongIndex]);
} else {
    updatePlayerUI(null);
}

if(savedSrc && isPlaying && globalSongsList.length > 0){
    setTimeout(function(){
        audio.play().then(function(){
            isPlaying = true;
            updatePlayerUI(globalSongsList[currentSongIndex]);
        }).catch(function(){
            isPlaying = false;
            updatePlayerUI(globalSongsList[currentSongIndex]);
        });
    },300);
}
</script>
